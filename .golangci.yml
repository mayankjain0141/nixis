# golangci-lint v2 configuration for aegis
# Based on Uber Go Style Guide + Google Go Best Practices
# Run: golangci-lint run ./...
version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  relative-path-mode: gomod

output:
  formats:
    text:
      print-linter-name: true
      colors: true
  sort-order:
    - linter
    - severity
    - file

linters:
  default: standard

  enable:
    # Style & correctness
    - revive
    - misspell
    - unconvert
    - unparam
    - wastedassign

    # Bug-finding
    - bodyclose
    - durationcheck
    - nilerr
    - nilnil
    - copyloopvar
    - sqlclosecheck

    # Performance
    - prealloc

    # Error handling (Uber guide: always handle errors)
    - errchkjson
    - errorlint

    # Concurrency & complexity
    - gocritic
    - cyclop
    - gocognit
    - nestif

    # Security
    - gosec

  disable:
    - depguard
    - exhaustruct
    - varnamelen
    - wrapcheck
    - ireturn
    - nonamedreturns
    - mnd

  settings:
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam
        - rangeValCopy
        - unnamedResult

    cyclop:
      max-complexity: 15

    gocognit:
      min-complexity: 20

    nestif:
      min-complexity: 5

    gosec:
      excludes:
        - G104
        - G304

    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - (io.Closer).Close
        - (net.Conn).Close
        - fmt.Fprintf
        - fmt.Printf
        - fmt.Print

    prealloc:
      simple: true
      for-loops: true

    misspell:
      locale: US

    errorlint:
      errorf: true
      asserts: true
      comparison: true

  exclusions:
    presets:
      - comments
      - std-error-handling
      - common-false-positives
    rules:
      # Test files get more leeway
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - gocritic
          - cyclop
          - gocognit
          - prealloc
          - unparam

      # Main/CLI files often have long switch statements
      - path: cmd/
        linters:
          - cyclop
          - gocognit

      # Generated or embedded code
      - path: embed\.go
        linters:
          - revive

    paths:
      - .claude/

formatters:
  enable:
    - goimports
    - gofmt
  settings:
    goimports:
      local-prefixes:
        - github.com/mayjain/aegis
