[allowlist]
  description = "Known safe example/documentation credential patterns"
  regexTarget = "match"
  regexes = [
    "AKIAIOSFODNN7EXAMPLE",
    "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY",
    "your-api-key-here",
    "YOUR_API_KEY",
    "<API_KEY>",
    "PLACEHOLDER",
    "xxxxxxxxxxxx",
  ]
