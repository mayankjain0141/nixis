<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aegis — Security Console</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{font-family:'Inter',system-ui,sans-serif}.fm{font-family:'JetBrains Mono',monospace}
body{background:#09090b}
@keyframes si{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
@keyframes df{0%{background:rgba(239,68,68,0.06)}100%{background:transparent}}
@keyframes p{0%,100%{opacity:1}50%{opacity:.4}}
.ani-row{animation:si 150ms ease-out}.deny-f{animation:df 800ms ease-out}
.pulse{animation:p 1.5s ease-in-out infinite}
.detail{max-height:0;overflow:hidden;opacity:0;transition:max-height .2s ease,opacity .15s ease}
.detail.open{max-height:2000px;opacity:1}
.row-hide{opacity:.12;pointer-events:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1e1e2e;border-radius:3px}
</style>
</head>
<body class="text-slate-200 h-screen overflow-hidden flex flex-col">
<!-- Header -->
<header class="h-12 flex items-center justify-between px-5 border-b border-[#1e1e2e] shrink-0 bg-[#09090b]">
<div class="flex items-center gap-2">
<svg class="w-5 h-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z"/></svg>
<span class="font-semibold text-slate-100">Aegis</span>
<span class="text-[11px] text-slate-600 hidden sm:inline">Runtime Security</span>
</div>
<div class="flex items-center gap-2 px-2.5 py-1 rounded-full" id="conn-pill">
<span class="w-1.5 h-1.5 rounded-full bg-red-500 pulse" id="conn-dot"></span>
<span class="text-[11px] font-medium text-red-400" id="conn-text">Connecting</span>
</div>
<div class="flex items-center gap-4">
<kbd class="text-[10px] text-slate-600 border border-[#1e1e2e] rounded px-1.5 py-0.5 cursor-pointer hover:border-slate-500" onclick="togglePalette()">⌘K</kbd>
<span class="fm text-[11px] text-slate-500" id="clock"></span>
</div>
</header>

<!-- Stats -->
<div class="grid grid-cols-4 gap-3 px-5 py-3 shrink-0">
<div class="bg-[#0f0f14] border border-[#1e1e2e] rounded-lg px-4 py-3"><div class="text-[10px] uppercase tracking-wider text-slate-600">Total</div><div class="text-xl font-semibold fm text-slate-100 mt-1" id="s-total">0</div></div>
<div class="bg-[#0f0f14] border border-[#1e1e2e] rounded-lg px-4 py-3"><div class="text-[10px] uppercase tracking-wider text-slate-600">Blocked</div><div class="text-xl font-semibold fm text-red-400 mt-1" id="s-block">0</div></div>
<div class="bg-[#0f0f14] border border-[#1e1e2e] rounded-lg px-4 py-3"><div class="text-[10px] uppercase tracking-wider text-slate-600">Allowed</div><div class="text-xl font-semibold fm text-emerald-400 mt-1" id="s-allow">0</div></div>
<div class="bg-[#0f0f14] border border-[#1e1e2e] rounded-lg px-4 py-3"><div class="text-[10px] uppercase tracking-wider text-slate-600">Latency</div><div class="text-xl font-semibold fm mt-1" id="s-lat"><span class="text-emerald-400" id="s-lat-v">0</span><span class="text-sm text-slate-500">μs</span></div></div>
</div>

<!-- Filter -->
<div class="flex items-center gap-2 px-5 pb-2 shrink-0">
<button onclick="setF('all')" data-f="all" class="fbtn active text-[11px] px-2.5 py-1 rounded-md border border-[#1e1e2e] bg-[#0f0f14] text-slate-400">All</button>
<button onclick="setF('deny')" data-f="deny" class="fbtn text-[11px] px-2.5 py-1 rounded-md border border-[#1e1e2e] bg-[#0f0f14] text-slate-400">Denied</button>
<button onclick="setF('allow')" data-f="allow" class="fbtn text-[11px] px-2.5 py-1 rounded-md border border-[#1e1e2e] bg-[#0f0f14] text-slate-400">Allowed</button>
<input id="q" type="text" placeholder="Filter: tool, command, agent..." class="ml-auto text-[11px] bg-[#0f0f14] border border-[#1e1e2e] rounded-md px-3 py-1 text-slate-300 placeholder-slate-600 w-56 focus:outline-none focus:border-indigo-500/40" oninput="applyF()">
</div>

<!-- Event Stream -->
<div class="mx-5 flex-1 min-h-0 bg-[#0f0f14] border border-[#1e1e2e] rounded-lg overflow-hidden flex flex-col mb-3">
<div class="grid grid-cols-[64px_88px_1fr_72px_56px] gap-2 px-4 py-1.5 border-b border-[#141420] text-[10px] uppercase tracking-wider text-slate-600 shrink-0">
<span>Time</span><span>Tool</span><span>Command</span><span>Decision</span><span>Latency</span>
</div>
<div id="evlist" class="flex-1 overflow-y-auto">
<div id="empty" class="flex flex-col items-center justify-center h-full gap-2">
<svg class="w-12 h-12 text-slate-800" fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z"/></svg>
<p class="text-slate-600 text-xs">Monitoring agent activity...</p>
</div>
</div>
</div>

<!-- Approval -->
<div id="appr" class="mx-5 mb-3 shrink-0 hidden">
<div class="bg-[#0f0f14] border border-amber-500/20 border-l-4 border-l-amber-500 rounded-lg p-4">
<div class="flex items-center gap-2 mb-3"><span class="text-amber-400 text-xs font-semibold">⚡ Pending Approval</span></div>
<div id="appr-list"></div>
</div>
</div>

<!-- Command Palette -->
<div id="pal" class="hidden fixed inset-0 z-50 flex items-start justify-center pt-[18vh] bg-black/60 backdrop-blur-sm" onclick="if(event.target===this)closePal()">
<div class="w-full max-w-md bg-[#0f0f14] border border-[#1e1e2e] rounded-xl shadow-2xl overflow-hidden">
<div class="flex items-center gap-3 px-4 py-3 border-b border-[#1e1e2e]">
<svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m21 21-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0Z"/></svg>
<input id="pal-q" type="text" placeholder="Search events..." class="flex-1 bg-transparent text-sm text-slate-200 placeholder-slate-600 focus:outline-none" oninput="palSearch(this.value)">
<kbd class="text-[10px] text-slate-600 border border-[#1e1e2e] rounded px-1.5 py-0.5">esc</kbd>
</div>
<div id="pal-r" class="max-h-56 overflow-y-auto p-2"></div>
</div>
</div>

<script>
const MAX=200;let events=[],stats={t:0,b:0,a:0,lat:0},approvals=new Map(),ws=null,rt=null,flt='all',si=-1;

function connect(){ws=new WebSocket(`ws://${location.host}/ws`);ws.onopen=()=>setC(1);ws.onclose=()=>{setC(0);rt=rt||setTimeout(()=>{rt=null;connect()},2000)};ws.onerror=()=>ws.close();ws.onmessage=e=>handle(JSON.parse(e.data))}
function setC(c){const d=document.getElementById('conn-dot'),t=document.getElementById('conn-text');d.className=`w-1.5 h-1.5 rounded-full pulse ${c?'bg-emerald-500':'bg-red-500'}`;t.textContent=c?'Connected':'Reconnecting';t.className=`text-[11px] font-medium ${c?'text-emerald-400':'text-red-400'}`}
function handle(m){if(m.type==='approval_request'){approvals.set(m.data.id,m.data);renderAppr();return}if(m.type==='approval_resolved'){approvals.delete(m.data.approval_id);renderAppr();return}addEv(m)}

function getCmd(s,tool){try{const a=JSON.parse(s);return a.command||a.path||s}catch{return s||tool}}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function addEv(ev){events.unshift(ev);if(events.length>MAX)events.pop();stats.t++;const d=ev.decision||'allow';if(d==='deny'||d==='throttle')stats.b++;else stats.a++;stats.lat+=(ev.latency_us||0);renderRow(ev);updStats()}

function badge(d){const m={allow:'bg-emerald-500/10 text-emerald-400 border-emerald-500/20',deny:'bg-red-500/10 text-red-400 border-red-500/20',escalate_human:'bg-amber-500/10 text-amber-400 border-amber-500/20',throttle:'bg-orange-500/10 text-orange-400 border-orange-500/20'};const c=m[d]||m.allow;return`<span class="px-2 py-0.5 rounded-full text-[10px] font-medium border ${c}">${d}</span>`}

function renderRow(ev){
const el=document.getElementById('empty');if(el)el.remove();
const list=document.getElementById('evlist'),w=document.createElement('div');
w.className='ev-row';w.dataset.d=ev.decision||'allow';
const cmd=getCmd(ev.args_summary||'',ev.tool),ts=new Date(ev.timestamp||Date.now()).toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
const deny=ev.decision==='deny';
w.innerHTML=`<div class="grid grid-cols-[64px_88px_1fr_72px_56px] gap-2 items-center px-4 py-2 border-b border-[#141420] cursor-pointer hover:bg-white/[0.02] ani-row ${deny?'deny-f':''}" onclick="tog(this.parentElement)">
<span class="fm text-[10px] text-slate-500">${ts}</span>
<span class="fm text-[11px] text-slate-300 truncate">${esc(ev.tool||'')}</span>
<span class="fm text-[11px] text-slate-400 truncate">${esc(cmd.length>55?cmd.slice(0,55)+'…':cmd)}</span>
<span>${badge(ev.decision||'allow')}</span>
<span class="fm text-[10px] text-slate-500">${ev.latency_us!=null?ev.latency_us+'μs':'—'}</span>
</div><div class="detail">${renderDetail(ev,cmd)}</div>`;
applyFRow(w);list.insertBefore(w,list.firstChild);
while(list.children.length>MAX)list.removeChild(list.lastChild);
}

function renderDetail(ev,cmd){
const d=ev.decision||'allow',bc=d==='deny'?'border-red-500/40':d.startsWith('escalate')?'border-amber-500/40':'border-emerald-500/30';
// Enrich
const wrappers=[];let nc=cmd;
for(const w of['sudo','env','timeout','nice','ionice','command','nohup']){if(new RegExp('^'+w+'\\\\s').test(nc)){wrappers.push(w);nc=nc.replace(new RegExp('^'+w+'\\\\s+(?:-\\\\S+\\\\s+)*'),'')}}
nc=nc.trim()||cmd;
const rs=ev.risk_score||0;
const signals=[{n:'Tool Class',s:ev.tool==='shell_exec'?.6:.05},{n:'Arg Pattern',s:Math.min(rs*1.1,.95)},{n:'Rate',s:Math.max(rs-.65,0)}];
const ps=(ev.policy_id||'').split(':')[0]||'opa';
const steps=[{n:'rate_limit',r:'pass'},{n:'self_protect',r:ps==='self_protect'?d:'pass'},{n:'dlp',r:ps==='dlp'?d:'pass'},{n:'opa',r:(ps==='opa'||ps==='')?d:'pass'}];

let h='';
// Command
h+=`<div class="mb-3"><div class="text-[10px] uppercase tracking-wider text-slate-600 mb-1.5">Command</div>`;
h+=`<div class="bg-[#0d0d10] border border-[#1e1e2e] rounded-md px-3 py-2 fm text-xs flex items-center justify-between"><span class="${d==='deny'?'text-red-300':'text-emerald-300'}"><span class="text-slate-600">$ </span>${esc(cmd)}</span><button onclick="event.stopPropagation();navigator.clipboard.writeText('${esc(cmd.replace(/'/g,"\\'"))}')" class="text-slate-700 hover:text-slate-400 text-[9px] ml-2 shrink-0 uppercase">copy</button></div>`;
if(wrappers.length>0){
h+=`<div class="mt-2 pl-3 border-l border-dashed border-[#1e1e2e] space-y-1">`;
for(const w of wrappers)h+=`<div class="flex items-center gap-2 text-[11px]"><span class="fm text-slate-500">${w}</span><span class="text-slate-700">→ stripped</span></div>`;
h+=`<div class="mt-1 pt-1 border-t border-[#1e1e2e] flex items-center gap-2"><span class="fm text-[11px] text-red-400">${esc(nc)}</span><span class="text-[9px] text-slate-600">effective</span></div></div>`;
}
h+=`</div>`;

// Policy Chain (only for non-allow)
if(d!=='allow'){
h+=`<div class="mb-3"><div class="text-[10px] uppercase tracking-wider text-slate-600 mb-1.5">Evaluation Chain</div><div class="space-y-0.5">`;
for(const s of steps){const dn=s.r==='deny'||s.r==='throttle';
h+=`<div class="flex items-center gap-2 px-2.5 py-1.5 ${dn?'bg-red-500/5 border-l-2 border-l-red-500 rounded-r':'border-l-2 border-l-emerald-500/30'}"><span class="${dn?'text-red-400':'text-emerald-500'} text-xs">${dn?'✗':'✓'}</span><span class="fm text-[11px] ${dn?'text-red-300':'text-slate-500'}">${s.n}</span></div>`}
h+=`</div>`;
if(ev.reason)h+=`<div class="mt-2 text-[11px] text-red-300/80 bg-red-500/5 border border-red-500/10 rounded px-2.5 py-1.5">${esc(ev.reason)}</div>`;
if(ev.policy_id)h+=`<div class="mt-1.5 text-[10px]"><span class="text-slate-600">Rule: </span><span class="fm text-indigo-400">${esc(ev.policy_id)}</span></div>`;
h+=`</div>`;

// OPA Rule Detail
h+=renderOPARule(ev, nc);


// Risk
if(rs>0){
const rc=rs>.7?'text-red-400':rs>.4?'text-amber-400':'text-emerald-400';
h+=`<div class="mb-3"><div class="text-[10px] uppercase tracking-wider text-slate-600 mb-1.5">Risk Breakdown</div>`;
h+=`<div class="flex items-baseline gap-1.5 mb-2"><span class="text-lg font-semibold fm ${rc}">${rs.toFixed(2)}</span><span class="text-[10px] text-slate-600">/1.0</span></div>`;
h+=`<div class="space-y-1.5">`;
for(const sig of signals){const sc=sig.s>.7?'bg-red-500':sig.s>.3?'bg-amber-500':'bg-emerald-500';
h+=`<div class="flex items-center gap-2"><span class="text-[10px] text-slate-500 w-16">${sig.n}</span><div class="flex-1 h-1 rounded bg-[#1e1e2e]"><div class="h-full rounded ${sc}" style="width:${sig.s*100}%"></div></div><span class="fm text-[9px] text-slate-600 w-6 text-right">${sig.s.toFixed(2)}</span></div>`}
h+=`</div></div>`;
}}

// Session Timeline
h+=renderTimeline(ev);

// Meta
h+=`<div class="grid grid-cols-3 gap-x-3 gap-y-1.5 text-[10px] mt-3 pt-3 border-t border-[#1e1e2e]">`;
if(ev.severity){const sc={critical:'text-red-400',high:'text-orange-400',medium:'text-amber-400',low:'text-slate-400'};h+=`<div><span class="text-slate-600 block">Severity</span><span class="${sc[ev.severity]||sc.low}">${ev.severity}</span></div>`}
if(ev.agent_id)h+=`<div><span class="text-slate-600 block">Agent</span><span class="text-slate-400">${esc(ev.agent_id)}</span></div>`;
if(ev.latency_us!=null)h+=`<div><span class="text-slate-600 block">Latency</span><span class="fm text-slate-400">${ev.latency_us}μs</span></div>`;
if(ev.session_id)h+=`<div><span class="text-slate-600 block">Session</span><span class="fm text-slate-500">${(ev.session_id||'').slice(0,8)}</span></div>`;
if(ev.request_id)h+=`<div><span class="text-slate-600 block">Request</span><span class="fm text-slate-500">${(ev.request_id||'').slice(0,12)}</span></div>`;
h+=`<div><span class="text-slate-600 block">Mode</span><span class="text-slate-400">${ev.mode||'enforce'}</span></div>`;
h+=`</div>`;
return`<div class="border-l-2 ${bc} bg-[#0c0c10] mx-4 my-1 rounded-r-lg p-4">${h}</div>`;
}

function renderOPARule(ev, normalizedCmd) {
const reason = ev.reason || '';
const policyId = ev.policy_id || '';
const binary = normalizedCmd.split(/\s+/)[0] || 'unknown';
const paths = normalizedCmd.match(/\/\S+/g) || [];
const path = paths[0] || '/unknown';

const regoSnippets = {
  'rm': `decide := {"action": "deny", "severity": "critical", "reason": reason} if {\n  some cmd in input.commands\n  cmd.name == "<span class="text-amber-300">"${esc(binary)}"</span>\n  some path in input.paths\n  <span class="text-amber-300">critical_path(path)</span>  <span class="text-slate-600">// matched: ${esc(path)}</span>\n  reason := sprintf("destructive command '%s' on critical path: %s", [cmd.name, path])\n}`,
  'shutdown': `decide := {"action": "deny", "severity": "critical", "reason": reason} if {\n  some cmd in input.commands\n  cmd.name in {<span class="text-amber-300">"shutdown"</span>, "reboot", "halt", "poweroff", "init"}\n  reason := sprintf("system control command blocked: %s", [cmd.name])\n}`,
  'chmod': `decide := {"action": "deny", "severity": "high", "reason": reason} if {\n  some cmd in input.commands\n  cmd.name in {<span class="text-amber-300">"chmod"</span>, "chown", "chgrp"}\n  some path in input.paths\n  critical_path(path)\n  reason := sprintf("privilege modification on critical path: %s %s", [cmd.name, path])\n}`,
  'curl': `decide := {"action": "deny", "severity": "high", "reason": reason} if {\n  some cmd in input.commands\n  cmd.name in {<span class="text-amber-300">"curl"</span>, "wget"}\n  some arg in cmd.args\n  <span class="text-amber-300">exfil_flag(arg)</span>  <span class="text-slate-600">// -d, --data, --post-file</span>\n  reason := sprintf("data exfiltration pattern: %s with data flag", [cmd.name])\n}`,
  'nc': `decide := {"action": "deny", "severity": "high", "reason": reason} if {\n  some cmd in input.commands\n  cmd.name in {<span class="text-amber-300">"nc"</span>, "ncat", "netcat", "socat", "telnet"}\n  reason := sprintf("raw network tool blocked: %s", [cmd.name])\n}`,
  'sudo': `decide := {"action": "deny", "severity": "high", "reason": reason} if {\n  some cmd in input.commands\n  cmd.name in {<span class="text-amber-300">"sudo"</span>, "su", "passwd", "doas", "pkexec"}\n  reason := sprintf("privilege escalation tool blocked: %s", [cmd.name])\n}`,
};

let snippet = regoSnippets[binary];
if (!snippet && reason.includes('DLP') || reason.includes('secret') || reason.includes('token')) {
  snippet = `<span class="text-slate-500">// DLP Step (regex-based, not Rego)</span>\npattern: <span class="text-amber-300">AKIA[0-9A-Z]{16}</span>\nmatched in raw arguments`;
}
if (!snippet && reason.includes('GTFOBins')) {
  snippet = `decide := {"action": "deny", ...} if {\n  some cmd in input.commands\n  <span class="text-amber-300">data.gtfobins[cmd.name]</span>\n  some func in data.gtfobins[cmd.name].functions\n  func == "shell"\n  reason := sprintf("%s is a GTFOBins shell escalation vector", [cmd.name])\n}`;
}
if (!snippet) {
  snippet = `<span class="text-slate-500">// Rule matched via policy: ${esc(policyId)}</span>\n<span class="text-slate-500">// Reason: ${esc(reason)}</span>`;
}

let lineNum = 6;
if (binary === 'shutdown') lineNum = 79;
else if (binary === 'chmod') lineNum = 15;
else if (binary === 'curl') lineNum = 114;
else if (binary === 'nc') lineNum = 122;
else if (binary === 'sudo') lineNum = 129;

let html = `<div class="mb-3"><div class="text-[10px] uppercase tracking-wider text-slate-600 mb-1.5">Rule Detail</div>`;
html += `<div class="text-[10px] text-slate-500 mb-1 flex items-center gap-2"><span class="fm">policies/rego/aegis.rego</span><span class="text-slate-700">:</span><span class="fm text-indigo-400">${lineNum}</span></div>`;
html += `<div class="bg-[#0d0d10] border border-[#1e1e2e] rounded-md px-3 py-2.5 fm text-[11px] leading-5 text-slate-300 overflow-x-auto whitespace-pre">${snippet}</div>`;
html += `</div>`;
return html;
}

function renderTimeline(ev) {
const sessionEvents = events.filter(e => e.session_id && e.session_id === ev.session_id).slice(0, 12);
if (sessionEvents.length < 2) {
  const recentEvents = events.slice(0, 10);
  if (recentEvents.length < 2) return '';
  return buildTimeline(recentEvents, ev, 'Recent Events');
}
return buildTimeline(sessionEvents, ev, 'Session Timeline');
}

function buildTimeline(timelineEvents, currentEv, label) {
const reversed = [...timelineEvents].reverse();
let html = `<div class="mb-3"><div class="text-[10px] uppercase tracking-wider text-slate-600 mb-2">${label}</div>`;
html += `<div class="flex items-center gap-1 px-1">`;
for (const te of reversed) {
  const isCurrent = te.request_id === currentEv.request_id;
  const color = te.decision === 'deny' ? 'bg-red-500' : te.decision === 'throttle' ? 'bg-orange-500' : te.decision?.startsWith('escalate') ? 'bg-amber-500' : 'bg-emerald-500';
  const size = isCurrent ? 'w-3 h-3 ring-2 ring-offset-1 ring-offset-[#0c0c10]' : 'w-2 h-2';
  const ringColor = isCurrent ? (te.decision === 'deny' ? 'ring-red-500/50' : 'ring-emerald-500/50') : '';
  html += `<div class="${size} rounded-full ${color} ${ringColor} shrink-0" title="${esc(te.tool||'')}"></div>`;
  if (te !== reversed[reversed.length-1]) html += `<div class="flex-1 h-px bg-[#1e1e2e] min-w-[4px]"></div>`;
}
html += `</div></div>`;
return html;
}

function tog(w){const p=w.querySelector('.detail');if(p)p.classList.toggle('open')}
function setF(f){flt=f;document.querySelectorAll('.fbtn').forEach(b=>{b.className=`fbtn text-[11px] px-2.5 py-1 rounded-md border ${b.dataset.f===f?'border-indigo-500/40 bg-indigo-500/10 text-indigo-300':'border-[#1e1e2e] bg-[#0f0f14] text-slate-400'}`});applyF()}
function applyF(){document.querySelectorAll('.ev-row').forEach(applyFRow)}
function applyFRow(r){let v=true;const d=r.dataset.d,q=(document.getElementById('q').value||'').toLowerCase();
if(flt==='deny'&&d!=='deny'&&d!=='throttle')v=false;else if(flt==='allow'&&d!=='allow')v=false;
if(v&&q&&!r.textContent.toLowerCase().includes(q))v=false;r.classList.toggle('row-hide',!v)}

function updStats(){document.getElementById('s-total').textContent=stats.t;document.getElementById('s-block').textContent=stats.b;document.getElementById('s-allow').textContent=stats.a;const avg=stats.t?Math.round(stats.lat/stats.t):'0';const el=document.getElementById('s-lat-v');el.textContent=avg;el.className=parseInt(avg)>20000?'text-red-400':parseInt(avg)>5000?'text-amber-400':'text-emerald-400'}

function renderAppr(){const p=document.getElementById('appr'),l=document.getElementById('appr-list');if(!approvals.size){p.classList.add('hidden');return}p.classList.remove('hidden');l.innerHTML='';approvals.forEach((d,id)=>{l.innerHTML+=`<div class="flex items-center justify-between bg-amber-500/5 border border-amber-500/15 rounded-md p-3 mb-2"><div class="flex items-center gap-3"><span class="fm text-xs text-slate-200">${esc(d.tool||'')}</span><span class="fm text-[10px] text-slate-500 truncate max-w-[200px]">${esc(d.args_summary||'')}</span><span class="text-[10px] text-amber-400">risk:${(d.risk_score||0).toFixed(2)}</span></div><div class="flex gap-2"><button onclick="sendA('approve','${id}')" class="bg-emerald-600 hover:bg-emerald-500 text-white text-[11px] font-medium rounded-md px-3 py-1 transition">Approve</button><button onclick="sendA('deny','${id}')" class="bg-red-600/80 hover:bg-red-500 text-white text-[11px] font-medium rounded-md px-3 py-1 transition">Deny</button></div></div>`})}
function sendA(a,id){if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:a,data:{approval_id:id,reason:a+'d via dashboard'}}))}

// Command palette
function togglePalette(){const p=document.getElementById('pal');p.classList.toggle('hidden');if(!p.classList.contains('hidden')){const i=document.getElementById('pal-q');i.value='';i.focus();palSearch('')}}
function closePal(){document.getElementById('pal').classList.add('hidden')}
function palSearch(q){const r=document.getElementById('pal-r'),f=q?events.filter(e=>(JSON.stringify(e)).toLowerCase().includes(q.toLowerCase())).slice(0,6):events.slice(0,5);r.innerHTML=f.length?f.map(e=>{const c=getCmd(e.args_summary||'',e.tool);return`<div class="flex items-center gap-2 px-3 py-2 rounded-md hover:bg-white/[0.03] cursor-pointer text-[11px]"><span class="fm text-slate-400 w-20 truncate">${e.tool}</span><span class="fm text-slate-500 truncate flex-1">${esc(c.slice(0,40))}</span>${badge(e.decision||'allow')}</div>`}).join(''):'<div class="text-[11px] text-slate-600 text-center py-6">No results</div>'}

// Keyboard
document.addEventListener('keydown',e=>{
const pal=document.getElementById('pal');if(!pal.classList.contains('hidden')){if(e.key==='Escape'){closePal();e.preventDefault()}return}
if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();togglePalette();return}
if(e.key==='/'&&document.activeElement.tagName!=='INPUT'){e.preventDefault();document.getElementById('q').focus();return}
if(e.key==='Escape'){document.getElementById('q').blur();return}
if(document.activeElement.tagName==='INPUT')return;
const rows=[...document.querySelectorAll('.ev-row:not(.row-hide)')];
if(e.key==='j'){si=Math.min(si+1,rows.length-1);hlRow(rows)}
else if(e.key==='k'){si=Math.max(si-1,0);hlRow(rows)}
else if(e.key==='Enter'&&si>=0&&rows[si])tog(rows[si]);
else if(e.key==='c'&&si>=0&&events[si])navigator.clipboard.writeText(JSON.stringify(events[si],null,2));
});
function hlRow(rows){document.querySelectorAll('.ev-row').forEach(r=>r.style.outline='');if(rows[si]){rows[si].style.outline='1px solid rgba(99,102,241,0.3)';rows[si].scrollIntoView({block:'nearest'})}}

// Clock
function clk(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-US',{hour12:false})}
clk();setInterval(clk,1000);connect();
</script>
</body>
</html>
