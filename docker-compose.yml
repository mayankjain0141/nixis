services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aegis
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis"]
      interval: 2s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  daemon:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AEGIS_PG_URL: "postgres://aegis:aegis@postgres:5432/aegis?sslmode=disable"
    volumes:
      - /tmp/aegis.sock:/tmp/aegis.sock
    ports:
      - "8080:8080"

volumes:
  pgdata:
