version: 2

builds:
  - id: nixis
    main: ./cmd/nixis
    binary: nixis
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    flags:
      - -trimpath

  - id: nixis-hook
    main: ./cmd/nixis-hook
    binary: nixis-hook
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    flags:
      - -trimpath

archives:
  - id: default
    builds:
      - nixis
      - nixis-hook
    format: tar.gz
    name_template: "aegis_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

brews:
  - name: nixis
    repository:
      owner: mayjain
      name: homebrew-tap
    directory: Formula
    homepage: https://github.com/mayjain/nixis
    description: "Real-time governance engine for AI coding agents"
    install: |
      bin.install "nixis"
      bin.install "nixis-hook"
    test: |
      system "#{bin}/nixis", "version"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: mayjain
    name: nixis
  header: |
    ## Install

    ```bash
    # Homebrew (macOS)
    brew install mayjain/tap/nixis

    # Or curl one-liner
    curl -sSfL https://raw.githubusercontent.com/mayjain/nixis/main/install.sh | sh

    # Then configure
    nixis setup
    ```
