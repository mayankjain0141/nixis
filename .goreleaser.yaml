version: 2

builds:
  - id: nixis
    main: ./cmd/nixis
    binary: nixis
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    flags:
      - -trimpath

  - id: nixis-hook
    main: ./cmd/nixis-hook
    binary: nixis-hook
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    flags:
      - -trimpath

  - id: nixis-daemon
    main: ./cmd/nixis-daemon
    binary: nixis-daemon
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    flags:
      - -trimpath

archives:
  - id: default
    builds:
      - nixis
      - nixis-hook
      - nixis-daemon
    format: tar.gz
    name_template: "nixis_{{ .Os }}_{{ .Arch }}"
    files:
      - src: policies/builtin/**
        dst: policies/builtin
        strip_parent: true

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: mayankjain0141
    name: nixis
  header: |
    ## Install

    ```bash
    # Curl one-liner
    curl -sSfL https://raw.githubusercontent.com/mayankjain0141/nixis/main/install.sh | sh

    # Or via go install
    go install github.com/mayankjain0141/nixis/cmd/nixis@{{ .Tag }}

    # Then configure
    nixis setup
    ```
