rules:
  - name: evasion_with_danger
    priority: 90
    action: escalate
    severity: high
    confidence: 0.85
    description: >
      Escalates commands where evasion score > 0.3 AND max verb danger > 0.7.
      High evasion combined with dangerous verbs is a strong signal of an obfuscated
      attack that warrants human review before execution.
    tags: [evasion, danger, escalate]
    condition:
      evasion:
        score:
          gt: 0.3
      verb_danger:
        "*":
          gt: 0.7

  - name: unknown_network_write
    priority: 91
    action: escalate
    severity: medium
    confidence: 0.70
    description: >
      Escalates commands where network score > 0.5 and all detected hosts are unknown
      (not marked safe or internal). Commands communicating with unrecognized external
      endpoints warrant human review.
    tags: [network, escalate, unknown-host]
    condition:
      expr: >
        b.Network.Score > 0.5 &&
        len(b.Network.Hosts) > 0 &&
        allHostsUnknown(b)

  - name: shell_no_rule_matched
    priority: 92
    action: escalate
    severity: medium
    confidence: 0.60
    description: >
      Escalates shell commands where max verb danger > 0.30 and no earlier rule
      (deny or allow) has matched. Acts as a catch-all for dangerous-but-unclassified
      shell activity.
    tags: [shell, escalate, catch-all]
    condition:
      tool_category: shell
      verb_danger:
        "*":
          gt: 0.30

  - name: default_uncertain_shell
    priority: 99
    action: escalate
    severity: low
    confidence: 0.50
    description: >
      Escalates any shell command that has not been matched by a higher-priority rule.
      Provides a safe default for shell activity that falls through all deny and allow rules.
    tags: [shell, escalate, default]
    condition:
      tool_category: shell

  - name: default_allow
    priority: 100
    action: allow
    severity: ""
    confidence: 0.80
    description: >
      Allows any non-shell tool invocation that has not been matched by a higher-priority rule.
      Non-shell tools (file_read, file_write, search, etc.) that didn't trigger any deny rule
      are considered safe by default.
    tags: [non-shell, default, allow]
    condition:
      expr: b.ToolClass.Category != "shell"
