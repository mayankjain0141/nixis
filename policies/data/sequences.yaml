# Known attack sequence patterns for Aegis behavioral analysis.
# Each sequence defines a multi-step pattern that indicates malicious intent.
# window: how far back in session history to look
# steps: ordered list of conditions that must appear in sequence

sequences:
  - name: exfil_after_sensitive_read
    description: >
      Sensitive file read followed by a network write — classic data exfiltration.
      The read must happen BEFORE the network write for this to trigger.
    window: 30s
    risk: 0.90
    steps:
      - path_sensitive: true
        network_write: false
      - network_write: true
        current: true  # this step matches the current (incoming) call

  - name: encoded_exfil
    description: >
      Sensitive file read -> base64/encoding -> network write.
      The encoding step obscures the exfiltration.
    window: 60s
    risk: 0.85
    steps:
      - path_sensitive: true
      - tool_category: shell
        verb_hint: base64
      - network_write: true
        current: true

  - name: escalating_access
    description: >
      Progressing from non-critical to critical path access within a session.
      Indicates reconnaissance followed by targeted attack.
    window: 120s
    risk: 0.75
    steps:
      - path_sensitive: true
        path_critical: false
      - path_critical: true
        current: true
