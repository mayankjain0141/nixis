version: "2026-05-08-v1"
policies:
  - name: block-destructive-shell
    match:
      tool: shell_exec
      args_pattern: "(rm -rf|DROP TABLE|shutdown|reboot|mkfs|dd if=)"
    action: deny
    severity: critical

  - name: block-secret-access
    match:
      tool: file_read
      args_pattern: "(\\.env|credentials|secrets|private_key|id_rsa)"
    action: deny
    severity: high

  - name: rate-limit-all
    match:
      tool: "*"
    rate_limit:
      max_per_minute: 60
    action: throttle

  - name: default-allow
    match:
      tool: "*"
      agent_id: "*"
    action: allow
    severity: low
