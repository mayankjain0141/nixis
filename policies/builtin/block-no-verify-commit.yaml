# Source: Community research — claude-code-hardened
# Gate: G4 (CEL function tests)
# Default: ENABLED — shipped as default-on in the built-in bundle
#
# Behavior:
#   git commit --no-verify -m "..."    → DENY (bypass pre-commit hooks)
#   git commit -n -m "..."             → DENY (-n is alias for --no-verify)
#   git push --no-verify               → DENY (bypass pre-push hooks)
#   git commit -m "fix bug"            → ALLOW (normal commit)
#   git push origin main               → ALLOW (normal push)
#   git rebase --no-verify             → DENY (bypass hooks during rebase)
#
# Rationale:
#   Git hooks enforce quality gates: linting, testing, secret scanning.
#   Bypassing them defeats security and quality controls. If hooks are
#   failing, the underlying issue should be fixed, not bypassed.

apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
  name: block-no-verify-commit
  annotations:
    nixis.io/default-enabled: "true"
    nixis.io/bundle: builtin
spec:
  description: "Block git operations that bypass pre-commit and pre-push hooks"
  matchConstraints:
    tools: ["Bash"]
  variables:
    - name: isGitNoVerify
      # --no-verify flag or -n short form on commit/push/rebase
      expression: >-
        request.args.command.matches("(?i)\\bgit\\s+(commit|push|rebase)\\b.*--no-verify") ||
        request.args.command.matches("(?i)\\bgit\\s+commit\\b.*\\s-[a-zA-Z]*n[a-zA-Z]*\\s")
    - name: isGitNoGpgSign
      # --no-gpg-sign bypasses commit signing requirements
      expression: >-
        request.args.command.matches("(?i)\\bgit\\s+commit\\b.*--no-gpg-sign")
  validations:
    - expression: 'isGitNoVerify'
      message: 'Bypassing git hooks (--no-verify) is blocked — fix the underlying issue instead'
      action: DENY
    - expression: 'isGitNoGpgSign'
      message: 'Bypassing commit signing (--no-gpg-sign) is blocked'
      action: DENY
  defaultAction: ALLOW
