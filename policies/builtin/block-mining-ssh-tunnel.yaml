apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
  name: block-mining-ssh-tunnel
  annotations:
    aegis.io/default-enabled: "true"
    aegis.io/bundle: builtin
spec:
  description: "Block SSH tunnels to known mining pool ports and domains"
  matchConstraints:
    tools: ["Bash"]
  validations:
    - expression: >-
        request.args.command.matches("(?i)\\bssh\\b.*-L\\b") &&
        (request.args.command.matches("(?i)\\b(xmr|btc|eth|monero|bitcoin|stratum|minergate|nanopool|supportxmr|ethermine|f2pool|antpool|slushpool|2miners|nicehash|miningpoolhub)\\b") ||
         request.args.command.matches("(?i):(3333|4444|5555|7777|8888|9999|14444|45700|14433|4450)\\b"))
      message: "Blocked: SSH tunnel to cryptocurrency mining pool"
      action: DENY
    - expression: >-
        request.args.command.matches("(?i)\\bkill\\b.*-9\\b.*\\$\\(pgrep") ||
        request.args.command.matches("(?i)\\bkill\\b.*-SIGKILL\\b.*\\$\\(pgrep")
      message: "Blocked: force-killing production processes via pgrep"
      action: DENY
    - expression: >-
        request.args.command.matches("(?i)\\bkillall\\b.*-9\\b.*\\b(nginx|apache|postgres|mysql|redis|mongodb|elasticsearch|docker)\\b") ||
        request.args.command.matches("(?i)\\bkillall\\b.*-SIGKILL\\b.*\\b(nginx|apache|postgres|mysql|redis|mongodb)\\b")
      message: "Blocked: force-killing production service processes"
      action: DENY
    - expression: >-
        request.args.command.matches("(?i)\\bterraform\\s+apply\\b") &&
        request.args.command.matches("(?i)\\b-auto-approve\\b") &&
        (request.args.command.matches("(?i)block_public=false") ||
         request.args.command.matches("(?i)publicly.accessible") ||
         request.args.command.matches("(?i)ingress.*0\\.0\\.0\\.0"))
      message: "Blocked: terraform apply --auto-approve opening public access to resources"
      action: DENY
    - expression: >-
        request.args.command.matches("(?i)\\bcat\\s+>\\s+/etc/systemd/system/") ||
        (request.args.command.matches("(?i)\\bcat\\b") &&
         request.args.command.matches("(?i)>\\s*/etc/systemd/system/.*\\.timer$"))
      message: "Blocked: writing systemd timer/service units (persistence mechanism)"
      action: DENY
  defaultAction: ALLOW
