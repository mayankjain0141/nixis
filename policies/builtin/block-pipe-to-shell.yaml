# Source: Community research — claude-guardrails, claude-on-a-leash
# Gate: G5 (security tests)
# Default: ENABLED — shipped as default-on in the built-in bundle
#
# Behavior:
#   curl https://install.rustup.rs | sh              → REQUIRE_APPROVAL (legit install script)
#   curl https://get.brew.sh | bash                  → REQUIRE_APPROVAL (legit install script)
#   curl -sSL https://get.docker.com | sudo sh       → REQUIRE_APPROVAL (review URL before approving)
#   eval "$(curl -s https://site.com/setup)"         → DENY (eval of remote content)
#   python -c "import urllib; exec(...)"             → DENY (Python remote exec)
#   source /tmp/script.sh                            → DENY (source from temp/shared path)
#   source <(curl ...)                               → DENY (process substitution from remote)
#   curl https://example.com/data.json               → ALLOW (no pipe to shell)
#   wget script.sh && bash script.sh                 → ALLOW (download then execute separately)
#
# Rationale:
#   Piping from http/https to a shell is how many legitimate tools install (Rust, Homebrew,
#   oh-my-zsh). Blocking unconditionally breaks standard dev setup. Instead, require approval
#   so the developer can review the URL. Keep hard DENY for patterns that bypass review:
#   eval of remote content, Python remote exec, sourcing from temp paths.

apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
  name: block-pipe-to-shell
  annotations:
    nixis.io/default-enabled: "true"
    nixis.io/bundle: builtin
spec:
  description: "Require approval for piping https install scripts to shell; deny eval/exec of remote content"
  matchConstraints:
    tools: ["Bash"]
  variables:
    - name: isPipeToShellHttps
      # curl/wget output from http/https piped to a shell — legitimate install scripts
      expression: >-
        request.args.command.matches("(?i)\\b(curl|wget)\\b.*https?://.*\\|\\s*(sudo\\s+)?(ba)?sh\\b") ||
        request.args.command.matches("(?i)\\b(curl|wget)\\b.*https?://.*\\|\\s*(sudo\\s+)?(python[23]?|perl|ruby|node)\\b")
    - name: isEvalRemote
      # eval "$(curl ...)" or eval $(wget ...) — bypasses inspection
      expression: >-
        request.args.command.matches("(?i)\\beval\\s+[\"']?\\$\\((curl|wget)")
    - name: isPythonRemoteExec
      # python -c "import urllib... exec(" pattern
      expression: >-
        request.args.command.matches("(?i)\\bpython[23]?\\s+-c\\s+[\"'].*urllib.*exec\\s*\\(")
    - name: isSourceTempPath
      # source /tmp/... or source /dev/shm/... — executing content from shared temp paths
      expression: >-
        request.args.command.matches("(?i)(source|\\.)\\s+(/tmp/|/dev/shm/|/var/tmp/)") ||
        request.args.command.matches("(?i)(source|\\.)\\s+<\\((curl|wget)")
  validations:
    - expression: 'isEvalRemote'
      message: "Blocked: eval of remote content bypasses inspection — download and review first"
      action: DENY
    - expression: 'isPythonRemoteExec'
      message: "Blocked: Python remote code execution pattern detected"
      action: DENY
    - expression: 'isSourceTempPath'
      message: "Blocked: sourcing scripts from temp paths or remote streams is not permitted"
      action: DENY
    - expression: 'isPipeToShellHttps'
      message: "Piping remote content to shell — review the URL before approving"
      action: REQUIRE_APPROVAL
  defaultAction: ALLOW
