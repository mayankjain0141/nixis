# Source: Community research — claude-code-hardened pre-push scanner
# Gate: G5 (security tests)
# Default: ENABLED — shipped as default-on in the built-in bundle
#
# Behavior:
#   git commit -m "Add API key sk-ant-api03-..."              → REQUIRE_APPROVAL (Anthropic key)
#   git commit -m "Set AWS_ACCESS_KEY_ID=AKIA..."             → REQUIRE_APPROVAL (AWS key)
#   git commit -m "Using token ghp_..."                       → REQUIRE_APPROVAL (GitHub PAT)
#   git commit -m "Slack token xoxb-..."                      → REQUIRE_APPROVAL (Slack token)
#   git commit -m "Fix authentication bug"                    → AUDIT (normal commit, audit trail)
#   git commit -m "Update config"                             → AUDIT (normal commit)
#
# Token patterns detected:
#   - Anthropic: sk-ant-api, sk-ant-
#   - OpenAI: sk-proj-, sk-
#   - AWS: AKIA, ASIA (access keys)
#   - GitHub: ghp_, gho_, ghu_, ghs_, ghr_
#   - Slack: xoxb-, xoxp-, xoxa-, xoxs-
#   - Generic: api_key=, api-key=, apikey=, secret=, password=, token=
#
# Rationale:
#   Secrets in commit messages are often copy-paste accidents. Catching
#   them at commit time prevents secrets from entering git history.

apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
  name: block-secrets-in-commits
  annotations:
    aegis.io/default-enabled: "true"
    aegis.io/bundle: builtin
spec:
  description: "Detect potential secrets in git commit messages and require approval"
  matchConstraints:
    tools: ["Bash"]
  variables:
    - name: isGitCommit
      expression: 'request.args.command.matches("(?i)\\bgit\\s+commit\\b")'
    - name: hasAnthropicKey
      # sk-ant-api, sk-ant-
      expression: >-
        request.args.command.matches("(?i)sk-ant-")
    - name: hasOpenAIKey
      # sk-proj-, sk- followed by alphanumeric (but not sk-ant which is Anthropic)
      expression: >-
        request.args.command.matches("(?i)sk-proj-") ||
        (request.args.command.matches("(?i)\\bsk-[a-zA-Z0-9]{20,}") && !request.args.command.matches("(?i)sk-ant-"))
    - name: hasAWSKey
      # AKIA or ASIA followed by 16 alphanumeric chars
      expression: >-
        request.args.command.matches("(?i)(AKIA|ASIA)[A-Z0-9]{16}")
    - name: hasGitHubToken
      # ghp_, gho_, ghu_, ghs_, ghr_ followed by alphanumeric
      expression: >-
        request.args.command.matches("(?i)gh[pours]_[a-zA-Z0-9]{30,}")
    - name: hasSlackToken
      # xoxb-, xoxp-, xoxa-, xoxs-
      expression: >-
        request.args.command.matches("(?i)xox[bpas]-")
    - name: hasGenericSecret
      # api_key=, api-key=, apikey=, secret=, password=, token= followed by value
      expression: >-
        request.args.command.matches("(?i)(api[_-]?key|secret|password|token)\\s*[=:]\\s*[\"']?[a-zA-Z0-9_-]{10,}")
  validations:
    - expression: 'isGitCommit && hasAnthropicKey'
      message: 'Potential Anthropic API key detected in commit message — review before proceeding'
      action: REQUIRE_APPROVAL
    - expression: 'isGitCommit && hasOpenAIKey'
      message: 'Potential OpenAI API key detected in commit message — review before proceeding'
      action: REQUIRE_APPROVAL
    - expression: 'isGitCommit && hasAWSKey'
      message: 'Potential AWS access key detected in commit message — review before proceeding'
      action: REQUIRE_APPROVAL
    - expression: 'isGitCommit && hasGitHubToken'
      message: 'Potential GitHub token detected in commit message — review before proceeding'
      action: REQUIRE_APPROVAL
    - expression: 'isGitCommit && hasSlackToken'
      message: 'Potential Slack token detected in commit message — review before proceeding'
      action: REQUIRE_APPROVAL
    - expression: 'isGitCommit && hasGenericSecret'
      message: 'Potential secret pattern detected in commit message — review before proceeding'
      action: REQUIRE_APPROVAL
    - expression: 'isGitCommit && !hasAnthropicKey && !hasOpenAIKey && !hasAWSKey && !hasGitHubToken && !hasSlackToken && !hasGenericSecret'
      message: 'Git commit audit trail'
      action: AUDIT
  defaultAction: ALLOW
