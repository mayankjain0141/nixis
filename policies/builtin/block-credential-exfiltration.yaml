# Source: Community research — dwarvesf/claude-guardrails (40 deny rules)
# Gate: G5 (security tests)
# Default: ENABLED — shipped as default-on in the built-in bundle
#
# Behavior:
#   Read .env                     → DENY (environment secrets)
#   Read ~/.ssh/id_rsa            → DENY (SSH private key)
#   Read ~/.aws/credentials       → DENY (AWS credentials)
#   Edit /path/to/secrets/api.key → DENY (secrets directory)
#   Read config.yaml              → ALLOW (regular config file)
#   Read ~/.bashrc                → ALLOW (shell config, not credentials)
#
# Patterns covered:
#   - Environment files: .env, .env.local, .env.production, etc.
#   - Private keys: .pem, .key, .p12, .pfx, .ppk, id_rsa*, id_ed25519*, id_ecdsa*
#   - Cloud credentials: .aws/credentials, .azure/credentials, .gcp/*.json
#   - Package manager auth: .netrc, .npmrc, .pypirc, .docker/config.json
#   - Secrets directories: /secrets/, /credentials/, /.ssh/
#
# Rationale:
#   AI agents should never directly read credential files. These should be
#   injected via environment variables or credential managers at runtime.

apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
  name: block-credential-exfiltration
  annotations:
    aegis.io/default-enabled: "true"
    aegis.io/bundle: builtin
spec:
  description: "Block direct read/edit access to credential files and secrets directories"
  matchConstraints:
    tools: ["Read", "Edit"]
  variables:
    - name: isEnvFile
      # .env, .env.local, .env.production, .env.development, etc.
      expression: >-
        request.args.path.matches("(?i)\\.env(\\..*)?$")
    - name: isPrivateKey
      # .pem, .key, .p12, .pfx, .ppk, id_rsa, id_ed25519, id_ecdsa
      expression: >-
        request.args.path.matches("(?i)\\.(pem|key|p12|pfx|ppk)$") ||
        request.args.path.matches("(?i)(id_rsa|id_ed25519|id_ecdsa|id_dsa)(\\.[a-z]+)?$")
    - name: isCloudCredential
      # .aws/credentials, .azure/credentials, .gcp/*.json, .config/gcloud/
      expression: >-
        request.args.path.matches("(?i)\\.(aws|azure)/credentials") ||
        request.args.path.matches("(?i)\\.gcp/.*\\.json$") ||
        request.args.path.matches("(?i)\\.config/gcloud/")
    - name: isPackageManagerAuth
      # .netrc, .npmrc, .pypirc, .docker/config.json, .gem/credentials
      expression: >-
        request.args.path.matches("(?i)\\.(netrc|npmrc|pypirc)$") ||
        request.args.path.matches("(?i)\\.docker/config\\.json$") ||
        request.args.path.matches("(?i)\\.gem/credentials$")
    - name: isSecretsDirectory
      # /secrets/, /credentials/, /.ssh/ (hidden or not)
      expression: >-
        request.args.path.matches("(?i)/(secrets|credentials)/") ||
        request.args.path.matches("(?i)/\\.ssh/")
    - name: isKubeConfig
      # .kube/config, kubeconfig files with tokens
      expression: >-
        request.args.path.matches("(?i)\\.kube/config$") ||
        request.args.path.matches("(?i)kubeconfig")
  validations:
    - expression: 'isEnvFile'
      message: 'Direct access to .env files is blocked — use environment variables instead'
      action: DENY
    - expression: 'isPrivateKey'
      message: 'Direct access to private key files is blocked — use SSH agent or credential manager'
      action: DENY
    - expression: 'isCloudCredential'
      message: 'Direct access to cloud credential files is blocked — use IAM roles or credential providers'
      action: DENY
    - expression: 'isPackageManagerAuth'
      message: 'Direct access to package manager auth files is blocked'
      action: DENY
    - expression: 'isSecretsDirectory'
      message: 'Direct access to secrets directories is blocked'
      action: DENY
    - expression: 'isKubeConfig'
      message: 'Direct access to kubeconfig is blocked — use KUBECONFIG env var'
      action: DENY
  defaultAction: ALLOW
