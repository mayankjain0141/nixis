# Unknown tool schema bypass policy — operator opt-in, disabled by default.
# Enable this to require approval for any tool not in the arg schema catalog.
# Default off: backward compat with MCP tools and community tools.
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
  name: unknown-tool-schema-bypass
  annotations:
    aegis.io/default-enabled: "false"
    aegis.io/bundle: builtin
spec:
  description: "Require approval for tool calls from tools not registered in the arg schema catalog"
  validations:
    - expression: 'resource_unknown_tool'
      message: 'Tool not in schema catalog — requires approval. Add the tool schema or explicitly allowlist this tool.'
      action: REQUIRE_APPROVAL
  defaultAction: ALLOW
