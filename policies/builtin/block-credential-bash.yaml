apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
  name: block-credential-bash
  annotations:
    nixis.io/default-enabled: "true"
    nixis.io/bundle: builtin
spec:
  description: "Block Bash commands that read, search, or exfiltrate credential material from the system"
  matchConstraints:
    tools: ["Bash"]
  validations:
    - expression: >-
        request.args.command.matches("(?i)\\bcat\\b.*/etc/(shadow|gshadow|passwd|group)") ||
        request.args.command.matches("(?i)\\bcat\\b.*/root/\\.(bash_history|ssh/|gnupg/)") ||
        request.args.command.matches("(?i)\\bcat\\b.*/proc/[0-9]+/cmdline")
      message: "Blocked: reading system credential files via cat"
      action: DENY
    - expression: >-
        request.args.command.matches("(?i)\\bvault\\s+kv\\s+get\\b") ||
        request.args.command.matches("(?i)\\bvault\\s+read\\b.*secret/prod")
      message: "Blocked: reading production secrets from Vault"
      action: DENY
    - expression: >-
        request.args.command.matches("(?i)\\bkubectl\\s+get\\s+secret") ||
        request.args.command.matches("(?i)\\bkubectl\\s+get\\s+secrets")
      message: "Blocked: dumping Kubernetes secrets"
      action: DENY
    - expression: >-
        request.args.command.matches("(?i)\\benv\\b.*\\|.*grep.*-[iE].*\\b(password|passwd|secret|token|api.?key)\\b") ||
        request.args.command.matches("(?i)\\bprintenv\\b.*\\|.*grep.*\\b(password|secret|token)\\b")
      message: "Blocked: searching environment variables for credential material"
      action: DENY
    - expression: >-
        request.args.command.matches("(?i)\\bfind\\b.*/home.*\\.(netrc|npmrc|pypirc|aws)") ||
        request.args.command.matches("(?i)\\bfind\\b.*\\.(pem|key|p12|pfx).*\\bcat\\b") ||
        request.args.command.matches("(?i)\\bfind\\b.*/.*-name\\s+'?\\*\\.pem'?") ||
        request.args.command.matches("(?i)\\bfind\\b.*/.*\\b-name\\b.*\\.(pem|key|p12)")
      message: "Blocked: searching filesystem for credential files"
      action: DENY
    - expression: >-
        request.args.command.matches("(?i)\\bcat\\b.*/proc/1/cmdline") ||
        request.args.command.matches("(?i)\\bcat\\b.*/proc/[0-9]+/environ")
      message: "Blocked: reading process credential material from /proc"
      action: DENY
    - expression: >-
        request.args.command.matches("(?i)\\bchpasswd\\b") ||
        request.args.command.matches("(?i)\\bpasswd\\b.*root")
      message: "Blocked: changing root or system account passwords"
      action: DENY
    - expression: 'request.args.command.matches("(?i)echo.*>>\\s*/etc/passwd")'
      message: "Blocked: injecting entries into /etc/passwd"
      action: DENY
  defaultAction: ALLOW
