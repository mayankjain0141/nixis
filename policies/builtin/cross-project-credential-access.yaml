# Source: FINAL_SPEC_HARDENING.md P1-5
# Gate: G4 (CEL function tests)

# Behavior:
#   find /code/other-project -name "*.env"   → REQUIRE_APPROVAL (cross-project + credential pattern)
#   find . -name "*.env"                     → ALLOW (within project)
#   find /code/other-project -name "*.go"    → ALLOW (cross-project but not credential pattern)
#   find . -name "*.pem"                     → ALLOW (within project, even though credential)
#
# Project root is established at session start via:
#   1. NIXIS_PROJECT_ROOT environment variable (if set, takes precedence)
#   2. CWD at session start (captured in CheckRequest.SessionContext.StartCWD)
#   3. Neither available → no boundary protection (documented limitation)
#
# Project root is IMMUTABLE for the session lifetime; subsequent cd commands do not change it.
#
# Path canonicalization: filepath.EvalSymlinks() is applied to all paths before comparison
# to prevent symlink traversal bypasses.
#
# Credential patterns matched (command text):
#   *.env, *.pem, *.key, *.p12, *.pfx
#   id_rsa*, id_ed25519*, *.ppk
#   credentials*, secrets*, tokens*
#   .aws/credentials, .netrc, .npmrc
#
# Documented limitation — find -exec blind spot:
#   find commands with -exec are evaluated on the find command arguments only.
#   The -exec subcommand runs within find's process and does not generate a
#   separate tool call. Content accessed via -exec is not separately governed.

apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
  name: cross-project-credential-access
  annotations:
    nixis.io/bundle: builtin
spec:
  description: "Gate reconnaissance-pattern file enumeration for credentials outside project boundary"
  matchConstraints:
    tools: ["Bash"]
  variables:
    - name: searchRoot
      # bash.findSearchRoot extracts the search root from find commands.
      # For find /code/anton/ -name "*.env" → returns "/code/anton/"
      # For find . -name "*.pem" → returns resolved CWD
      # Returns empty string if command is not a find command.
      expression: 'bash.findSearchRoot(request.args.command)'
    - name: isCrossProject
      # path.isWithinProject applies filepath.EvalSymlinks() canonicalization
      # before comparison. Fails secure: unknown/unresolvable paths → false (outside).
      expression: '!path.isWithinProject(searchRoot, session.projectRoot)'
    - name: targetsCredentials
      # Matches the expanded credential pattern list from FINAL_SPEC_HARDENING.md P1-5.
      # Patterns: .env, .pem, .key, .p12, .pfx, id_rsa, id_ed25519, .ppk,
      #           credentials, secrets, tokens, .aws/credentials, .netrc, .npmrc
      expression: >-
        request.args.command.matches(".*\\.(env|pem|key|p12|pfx|ppk).*") ||
        request.args.command.matches(".*(id_rsa|id_ed25519).*") ||
        request.args.command.matches(".*(credentials|secrets|tokens).*") ||
        request.args.command.matches(".*(\\.(aws|netrc|npmrc)).*")
  validations:
    - expression: 'isCrossProject && targetsCredentials'
      message: 'Searching for credential files outside current project requires approval'
      action: REQUIRE_APPROVAL
  defaultAction: ALLOW
