# imported from: rules via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-launch-suspicious-network-tool-on-host
    annotations:
        nixis.io/falco-tags: maturity_incubating,host,network,process,mitre_execution,T1059
        nixis.io/imported-from: nixis-import-2621062960.yaml
        nixis.io/severity: low
        nixis.io/llm-confidence: medium
        nixis.io/source-rule: Launch Suspicious Network Tool on Host
spec:
    description: |
        Detect network tools (like netcat, nmap, tcpdump, socat, and more) launched within containers without any additional filters. This serves as a valuable general detection, but it's recommended to invest engineering effort to fine-tune it and prevent a high volume of legitimate logs. The host equivalent of "Launch Suspicious Network Tool in Container.".
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: 'tool == "Bash" && (request.args.command.matches(".*\\b(netcat|ncat|nmap|tcpdump|wireshark|socat|tshark)\\b.*") || request.args.command.matches(".*\\bnc\\s+.*"))'
          message: 'Falco rule violated: Launch Suspicious Network Tool on Host'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
