# IMPORT_TODO: Falco condition uses kernel or macro fields that cannot be automatically translated — manual review required. Original condition: spawned_process and (proc.exe startswith "/dev/shm/" or
    (proc.cwd startswith "/dev/shm/" and proc.exe startswith "./...
# imported from: main via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-execution-from--dev-shm
    annotations:
        aegis.io/falco-tags: maturity_stable,host,container,mitre_execution,T1059.004
        aegis.io/imported-from: aegis-import-2766262408.yaml
        aegis.io/severity: medium
        aegis.io/source-rule: Execution from /dev/shm
spec:
    description: |
        This rule detects file execution in the /dev/shm directory, a tactic often used by threat actors to store their readable, writable, and occasionally executable files. /dev/shm acts as a link to the host or other containers, creating vulnerabilities for their compromise as well. Notably, /dev/shm remains unchanged even after a container restart. Consider this rule alongside the newer "Drop and execute new binary in container" rule.
    matchConstraints:
        tools: []
    validations:
        - expression: "false"
          message: 'Falco rule violated: Execution from /dev/shm'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
