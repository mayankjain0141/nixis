# imported from: rules via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-db-program-spawned-process
    annotations:
        aegis.io/falco-tags: maturity_incubating,host,container,process,database,mitre_execution,T1190
        aegis.io/imported-from: aegis-import-2621062960.yaml
        aegis.io/severity: low
        aegis.io/source-rule: DB program spawned process
spec:
    description: |
        A program related to the database server creates an unexpected child process (other than itself). This is not supposed to happen and often follows SQL injection attacks. This behavioral detection could indicate potential unauthorized data extraction or tampering with the database.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)\\b(mysqld|postgres|sqlplus)\\b")
          message: 'Falco rule violated: DB program spawned process'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
