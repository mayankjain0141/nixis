# imported from: rules via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-db-program-spawned-process
    annotations:
        nixis.io/falco-tags: maturity_incubating,host,container,process,database,mitre_execution,T1190
        nixis.io/imported-from: nixis-import-2621062960.yaml
        nixis.io/severity: low
        nixis.io/source-rule: DB program spawned process
spec:
    description: |
        A program related to the database server creates an unexpected child process (other than itself). This is not supposed to happen and often follows SQL injection attacks. This behavioral detection could indicate potential unauthorized data extraction or tampering with the database.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: 'tool == "Bash" && (request.args.command.matches(".*\\b(mysql|psql|sqlplus|mongosh)\\b.*\\bSYSTEM\\s*\\(.*") || request.args.command.matches(".*\\b(mysql|psql|sqlplus|mongosh)\\b.*\\binto\\s+outfile\\b.*") || request.args.command.matches(".*\\b(mysql|psql|sqlplus|mongosh)\\b.*(;|\\|)\\s*(bash|sh|python3?|perl|ruby|curl|wget|nc|ncat)\\s.*"))'
          message: 'Falco rule violated: DB program spawned process'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
