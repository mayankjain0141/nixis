# IMPORT_REVIEW: translated by Claude — verify semantics
# imported from: rules via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-write-below-binary-dir
    annotations:
        aegis.io/falco-tags: maturity_sandbox,host,container,filesystem,mitre_persistence,T1543
        aegis.io/imported-from: aegis-import-1470842712.yaml
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source-rule: Write below binary dir
spec:
    description: |
        Trying to write to any file below specific binary directories can serve as an auditing rule to track general system changes. Such rules can be noisy and challenging to interpret, particularly if your system frequently undergoes updates. However, careful profiling of your environment can transform this rule into an effective rule for detecting unusual behavior associated with system changes, including compliance-related cases.
    matchConstraints:
        tools:
            - Read
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && (request.args.path.startsWith("/bin/") || request.args.path.startsWith("/sbin/") || request.args.path.startsWith("/usr/bin/") || request.args.path.startsWith("/usr/sbin/")) || tool == "Bash" && request.args.command.matches(".*cp.*(/(usr/)?(bin|sbin))/.*")'
          message: 'Falco rule violated: Write below binary dir'
          action: DENY
    defaultAction: ALLOW
