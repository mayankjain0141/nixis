# IMPORT_TODO: Falco condition uses kernel or macro fields that cannot be automatically translated — manual review required. Original condition: spawned_process and container and shell_procs and proc.tty != 0 and container_entrypoint and not user_expected_terminal_...
# imported from: rules via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-terminal-shell-in-container
    annotations:
        aegis.io/falco-tags: maturity_stable,container,shell,mitre_execution,T1059
        aegis.io/imported-from: aegis-import-999705196.yaml
        aegis.io/severity: low
        aegis.io/source-rule: Terminal shell in container
spec:
    description: |
        A shell was used as the entrypoint/exec point into a container with an attached terminal. Parent process may have legitimately already exited and be null (read container_entrypoint macro). Common when using "kubectl exec" in Kubernetes. Correlate with k8saudit exec logs if possible to find user or serviceaccount token used (fuzzy correlation by namespace and pod name). Rather than considering it a standalone rule, it may be best used as generic auditing rule while examining other triggered rules in this container/tty.
    matchConstraints:
        tools: []
    validations:
        - expression: "false"
          message: 'Falco rule violated: Terminal shell in container'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
