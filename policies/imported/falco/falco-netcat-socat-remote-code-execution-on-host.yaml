# imported from: rules via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-netcat-socat-remote-code-execution-on-host
    annotations:
        nixis.io/falco-tags: maturity_sandbox,host,network,process,mitre_execution,T1059
        nixis.io/imported-from: nixis-import-1470842712.yaml
        nixis.io/severity: medium
        nixis.io/source-rule: Netcat/Socat Remote Code Execution on Host
spec:
    description: |
        Netcat/Socat Program runs on host that allows remote code execution and may be utilized as a part of a variety of reverse shell payload https://github.com/swisskyrepo/PayloadsAllTheThings/. These programs are of higher relevance as they are commonly installed on UNIX-like operating systems.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: 'tool == "Bash" && (request.args.command.matches(".*\\b(nc|netcat|ncat)\\b.*-e.*(bash|sh|/bin).*") || request.args.command.matches(".*\\bsocat\\b.*[Ee][Xx][Ee][Cc]:(bash|sh|/bin/bash|/bin/sh).*"))'
          message: 'Falco rule violated: Netcat/Socat Remote Code Execution on Host'
          action: DENY
    defaultAction: ALLOW
