# imported from: main via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-netcat-socat-remote-code-execution-on-host
    annotations:
        aegis.io/falco-tags: maturity_sandbox,host,network,process,mitre_execution,T1059
        aegis.io/imported-from: aegis-import-3595951451.yaml
        aegis.io/severity: medium
        aegis.io/source-rule: Netcat/Socat Remote Code Execution on Host
spec:
    description: |
        Netcat/Socat Program runs on host that allows remote code execution and may be utilized as a part of a variety of reverse shell payload https://github.com/swisskyrepo/PayloadsAllTheThings/. These programs are of higher relevance as they are commonly installed on UNIX-like operating systems.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.contains("-e")
          message: 'Falco rule violated: Netcat/Socat Remote Code Execution on Host'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
