# imported from: rules via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-reverse-shell-from-web-server
    annotations:
        nixis.io/falco-tags: maturity_sandbox,host,container,process,network,mitre_execution,T1059
        nixis.io/imported-from: nixis-import-1470842712.yaml
        nixis.io/severity: critical
        nixis.io/source-rule: Reverse Shell from Web Server
spec:
    description: |
        Detects common reverse shell patterns spawned from web server processes. Attackers frequently establish reverse shells after exploiting web vulnerabilities to maintain interactive access to the compromised system. This rule looks for specific command patterns known to create reverse shells, including bash /dev/tcp redirects, netcat with -e flag, and common scripting language reverse shell idioms.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: 'tool == "Bash" && (request.args.command.matches(".*bash\\s+-[ic].*>&\\s*/dev/tcp/.*") || request.args.command.matches(".*exec\\s+[0-9]+<>/dev/tcp/.*") || request.args.command.matches(".*\\b(nc|netcat|ncat)\\b.*-e.*(bash|sh).*") || request.args.command.matches(".*python[23]?.*socket.*\\.connect\\(.*") || request.args.command.matches(".*perl.*-e.*socket.*fork.*"))'
          message: 'Falco rule violated: Reverse Shell from Web Server'
          action: DENY
    defaultAction: ALLOW
