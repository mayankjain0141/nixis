# IMPORT_TODO: Falco condition uses kernel or macro fields that cannot be automatically translated — manual review required. Original condition: container_started and not allowed_containers
# imported from: main via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-launch-disallowed-container
    annotations:
        aegis.io/falco-tags: maturity_sandbox,container,mitre_lateral_movement,T1610
        aegis.io/imported-from: aegis-import-3595951451.yaml
        aegis.io/severity: medium
        aegis.io/source-rule: Launch Disallowed Container
spec:
    description: |
        Detect the initial process launched within a container that is not in a list of allowed containers. This rule holds value for generic auditing; however, this rule requires a good understanding of your setup and consistent effort to keep the list of allowed containers current. In some situations, this can be challenging to manage.
    matchConstraints:
        tools: []
    validations:
        - expression: "false"
          message: 'Falco rule violated: Launch Disallowed Container'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
