# imported from: rules via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-write-below-etc
    annotations:
        aegis.io/falco-tags: maturity_sandbox,host,container,filesystem,mitre_persistence,T1098
        aegis.io/imported-from: aegis-import-3210576666.yaml
        aegis.io/severity: high
        aegis.io/source-rule: Write below etc
spec:
    description: |
        Trying to write to any file below /etc can serve as an auditing rule to track general system changes. Such rules can be noisy and challenging to interpret, particularly if your system frequently undergoes updates. However, careful profiling of your environment can transform this rule into an effective rule for detecting unusual behavior associated with system changes, including compliance-related cases.
    matchConstraints:
        tools:
            - Read
            - Write
            - Edit
    validations:
        - expression: "false"
          message: 'Falco rule violated: Write below etc'
          action: DENY
    defaultAction: ALLOW
