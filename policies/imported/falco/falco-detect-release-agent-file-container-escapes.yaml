# IMPORT_TODO: Falco condition uses kernel or macro fields that cannot be automatically translated — manual review required. Original condition: open_write and container and fd.name endswith release_agent and (user.uid=0 or thread.cap_effective contains CAP_DAC_OVE...
# imported from: rules via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-detect-release-agent-file-container-escapes
    annotations:
        aegis.io/falco-tags: maturity_stable,container,process,mitre_privilege_escalation,T1611
        aegis.io/imported-from: aegis-import-999705196.yaml
        aegis.io/severity: critical
        aegis.io/source-rule: Detect release_agent File Container Escapes
spec:
    description: |
        Detect an attempt to exploit a container escape using release_agent file. By running a container with certains capabilities, a privileged user can modify release_agent file and escape from the container.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: "false"
          message: 'Falco rule violated: Detect release_agent File Container Escapes'
          action: DENY
    defaultAction: ALLOW
