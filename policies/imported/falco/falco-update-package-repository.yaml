apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-update-package-repository
    annotations:
        aegis.io/falco-tags: maturity_sandbox,host,container,filesystem,mitre_execution,T1072
        aegis.io/imported-from: aegis-import-1470842712.yaml
        aegis.io/severity: low
        aegis.io/llm-confidence: medium
        aegis.io/source-rule: Update Package Repository
spec:
    description: |
        This rule generically detects updates to package repositories and can be seen as an auditing measure. Recommend evaluating its relevance for your specific environment.
    matchConstraints:
        tools:
            - Read
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && (request.args.path.startsWith("/etc/apt/") || request.args.path.startsWith("/etc/yum.repos.d/")) || tool == "Bash" && request.args.command.matches(".*>\\s*/etc/(apt|yum|dnf).*")'
          message: 'Falco rule violated: Update Package Repository'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
