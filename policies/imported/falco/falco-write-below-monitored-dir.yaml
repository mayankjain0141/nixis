# IMPORT_TODO: Falco condition uses kernel or macro fields that cannot be automatically translated — manual review required. Original condition: open_write and monitored_dir and not package_mgmt_procs and not coreos_write_ssh_dir and not exe_running_docker_save and...
# imported from: main via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-write-below-monitored-dir
    annotations:
        aegis.io/falco-tags: maturity_sandbox,host,container,filesystem,mitre_persistence,T1543
        aegis.io/imported-from: aegis-import-3595951451.yaml
        aegis.io/severity: high
        aegis.io/source-rule: Write below monitored dir
spec:
    description: |
        Trying to write to any file below a set of monitored directories can serve as an auditing rule to track general system changes. Such rules can be noisy and challenging to interpret, particularly if your system frequently undergoes updates. However, careful profiling of your environment can transform this rule into an effective rule for detecting unusual behavior associated with system changes, including compliance-related cases.
    matchConstraints:
        tools:
            - Read
            - Write
            - Edit
    validations:
        - expression: "false"
          message: 'Falco rule violated: Write below monitored dir'
          action: DENY
    defaultAction: ALLOW
