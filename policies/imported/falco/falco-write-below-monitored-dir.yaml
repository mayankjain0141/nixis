# imported from: rules via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-write-below-monitored-dir
    annotations:
        nixis.io/falco-tags: maturity_sandbox,host,container,filesystem,mitre_persistence,T1543
        nixis.io/imported-from: nixis-import-1470842712.yaml
        nixis.io/severity: high
        nixis.io/llm-confidence: medium
        nixis.io/source-rule: Write below monitored dir
spec:
    description: |
        Trying to write to any file below a set of monitored directories can serve as an auditing rule to track general system changes. Such rules can be noisy and challenging to interpret, particularly if your system frequently undergoes updates. However, careful profiling of your environment can transform this rule into an effective rule for detecting unusual behavior associated with system changes, including compliance-related cases.
    matchConstraints:
        tools:
            - Read
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*(/(boot|lib|usr/lib|usr/local/lib|var/lib/dpkg|var/lib/rpm|var/lib/pacman))/.*") || tool == "Bash" && request.args.command.matches(".*>\\s*/(boot|lib|usr/lib)/.*")'
          message: 'Falco rule violated: Write below monitored dir'
          action: DENY
    defaultAction: ALLOW
