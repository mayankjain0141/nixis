     (proc.name = "find" and (proc.args contains "id...
# imported from: main via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-search-private-keys-or-passwords
    annotations:
        aegis.io/falco-tags: maturity_stable,host,container,process,filesystem,mitre_credential_access,T1552.001
        aegis.io/imported-from: aegis-import-2766262408.yaml
        aegis.io/severity: medium
        aegis.io/source-rule: Search Private Keys or Passwords
spec:
    description: |
        Detect attempts to search for private keys or passwords using the grep or find command. This is often seen with unsophisticated attackers, as there are many ways to access files using bash built-ins that could go unnoticed. Regardless, this serves as a solid baseline detection that can be tailored to cover these gaps while maintaining an acceptable noise level.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: "false"
          message: 'Falco rule violated: Search Private Keys or Passwords'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
