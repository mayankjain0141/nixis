# imported from: rules via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-kubernetes-client-tool-launched-in-container
    annotations:
        aegis.io/falco-tags: maturity_sandbox,container,mitre_execution,T1610
        aegis.io/imported-from: aegis-import-1470842712.yaml
        aegis.io/severity: medium
        aegis.io/source-rule: Kubernetes Client Tool Launched in Container
spec:
    description: |
        Detect the execution of a Kubernetes client tool (like docker, kubectl, crictl) within a container, which is typically not expected behavior. Although this rule targets container workloads, monitoring the use of tools like crictl on the host over interactive access could also be valuable for broader auditing objectives.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: 'tool == "Bash" && request.args.command.matches(".*\\b(docker|kubectl|crictl|helm|k9s)\\b.*") && request.args.command.matches(".*(exec|run|apply|delete|scale|port-forward).*")'
          message: 'Falco rule violated: Kubernetes Client Tool Launched in Container'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
