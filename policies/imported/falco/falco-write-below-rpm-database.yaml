# IMPORT_TODO: Falco condition uses kernel or macro fields that cannot be automatically translated — manual review required. Original condition: open_write and fd.name startswith /var/lib/rpm and not rpm_procs and not ansible_running_python and not python_running_c...
# imported from: rules via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-write-below-rpm-database
    annotations:
        aegis.io/falco-tags: maturity_sandbox,host,container,filesystem,software_mgmt,mitre_persistence,T1072
        aegis.io/imported-from: aegis-import-1470842712.yaml
        aegis.io/severity: high
        aegis.io/source-rule: Write below rpm database
spec:
    description: |
        Trying to write to the rpm database by any non-rpm related program can serve as an auditing rule to track general system changes. Such rules can be noisy and challenging to interpret, particularly if your system frequently undergoes updates. However, careful profiling of your environment can transform this rule into an effective rule for detecting unusual behavior associated with system changes, including compliance-related cases.
    matchConstraints:
        tools:
            - Read
            - Write
            - Edit
    validations:
        - expression: "false"
          message: 'Falco rule violated: Write below rpm database'
          action: DENY
    defaultAction: ALLOW
