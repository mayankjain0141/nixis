# IMPORT_REVIEW: translated by Claude — verify semantics
# imported from: rules via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-fileless-execution-via-memfd-create
    annotations:
        aegis.io/falco-tags: maturity_stable,host,container,process,mitre_defense_evasion,T1620
        aegis.io/imported-from: aegis-import-999705196.yaml
        aegis.io/severity: critical
        aegis.io/llm-confidence: medium
        aegis.io/source-rule: Fileless execution via memfd_create
spec:
    description: |
        Detect if a binary is executed from memory using the memfd_create technique. This is a well-known defense evasion technique for executing malware on a victim machine without storing the payload on disk and to avoid leaving traces about what has been executed. Adopters can whitelist processes that may use fileless execution for benign purposes by adding items to the list known_memfd_execution_processes.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: 'tool == "Bash" && (request.args.command.contains("memfd_create") || request.args.command.matches(".*python.*-c.*memfd.*"))'
          message: 'Falco rule violated: Fileless execution via memfd_create'
          action: DENY
    defaultAction: ALLOW
