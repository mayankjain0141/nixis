# imported from: rules via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-read-sensitive-file-trusted-after-startup
    annotations:
        aegis.io/falco-tags: maturity_stable,host,container,filesystem,mitre_credential_access,T1555
        aegis.io/imported-from: aegis-import-999705196.yaml
        aegis.io/severity: medium
        aegis.io/llm-confidence: medium
        aegis.io/source-rule: Read sensitive file trusted after startup
spec:
    description: |
        An attempt to read any sensitive file (e.g. files containing user/password/authentication information) by a trusted program after startup. Trusted programs might read these files at startup to load initial state, but not afterwards. Can be customized as needed. In modern containerized cloud infrastructures, accessing traditional Linux sensitive files might be less relevant, yet it remains valuable for baseline detections. While we provide additional rules for SSH or cloud vendor-specific credentials, you can significantly enhance your security program by crafting custom rules for critical application credentials unique to your environment.
    matchConstraints:
        tools:
            - Read
            - Write
            - Edit
    validations:
        - expression: '(tool == "Read" || tool == "Bash") && (request.args.path.matches(".*(shadow|gshadow|sudoers|ssh_host_.*_key).*") || request.args.command.matches(".*\\bcat\\b.*(shadow|passwd|sudoers|gshadow).*"))'
          message: 'Falco rule violated: Read sensitive file trusted after startup'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
