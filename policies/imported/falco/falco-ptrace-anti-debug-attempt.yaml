# imported from: rules via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-ptrace-anti-debug-attempt
    annotations:
        nixis.io/falco-tags: maturity_stable,host,container,process,mitre_defense_evasion,T1622
        nixis.io/imported-from: nixis-import-999705196.yaml
        nixis.io/severity: low
        nixis.io/llm-confidence: medium
        nixis.io/source-rule: PTRACE anti-debug attempt
spec:
    description: |
        Detect usage of the PTRACE system call with the PTRACE_TRACEME argument, indicating a program actively attempting to avoid debuggers attaching to the process. This behavior is typically indicative of malware activity. Read more about PTRACE in the "PTRACE attached to process" rule.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: 'tool == "Bash" && (request.args.command.contains("ptrace") || request.args.command.contains("PTRACE_TRACEME"))'
          message: 'Falco rule violated: PTRACE anti-debug attempt'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
