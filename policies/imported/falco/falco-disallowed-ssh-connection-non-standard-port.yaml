# IMPORT_TODO: Falco condition uses kernel or macro fields that cannot be automatically translated — manual review required. Original condition: outbound and proc.exe endswith ssh and fd.l4proto=tcp and ssh_non_standard_ports_network
# imported from: main via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-disallowed-ssh-connection-non-standard-port
    annotations:
        aegis.io/falco-tags: maturity_stable,host,container,network,process,mitre_execution,T1059
        aegis.io/imported-from: aegis-import-2766262408.yaml
        aegis.io/severity: low
        aegis.io/source-rule: Disallowed SSH Connection Non Standard Port
spec:
    description: |
        Detect any new outbound SSH connection from the host or container using a non-standard port. This rule holds the potential to detect a family of reverse shells that cause the victim machine to connect back out over SSH, with STDIN piped from the SSH connection to a shell's STDIN, and STDOUT of the shell piped back over SSH. Such an attack can be launched against any app that is vulnerable to command injection. The upstream rule only covers a limited selection of non-standard ports. We suggest adding more ports, potentially incorporating ranges based on your environment's knowledge and custom SSH port configurations. This rule can complement the "Redirect STDOUT/STDIN to Network Connection in Container" or "Disallowed SSH Connection" rule.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: "false"
          message: 'Falco rule violated: Disallowed SSH Connection Non Standard Port'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
