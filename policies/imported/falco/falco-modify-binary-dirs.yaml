# imported from: rules via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-modify-binary-dirs
    annotations:
        nixis.io/falco-tags: maturity_sandbox,host,container,filesystem,mitre_defense_evasion,T1222.002
        nixis.io/imported-from: nixis-import-1470842712.yaml
        nixis.io/severity: high
        nixis.io/llm-confidence: medium
        nixis.io/source-rule: Modify binary dirs
spec:
    description: |
        Trying to modify any file below a set of binary directories can serve as an auditing rule to track general system changes. Such rules can be noisy and challenging to interpret, particularly if your system frequently undergoes updates. However, careful profiling of your environment can transform this rule into an effective rule for detecting unusual behavior associated with system changes, including compliance-related cases.
    matchConstraints:
        tools:
            - Bash
            - Write
            - Edit
    validations:
        - expression: 'tool == "Bash" && request.args.command.matches(".*\\b(mv|cp|rename|install)\\b.*\\s/(usr/(bin|sbin|lib|lib64)|bin|sbin|lib|lib64)(/|\\s|$).*")'
          message: 'Falco rule violated: Modify binary dirs (shell)'
          action: DENY
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches("^/(usr/(bin|sbin|lib|lib64)|bin|sbin|lib|lib64)/.*")'
          message: 'Falco rule violated: Modify binary dirs (file write)'
          action: DENY
    defaultAction: ALLOW
