# imported from: rules via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-create-hardlink-over-sensitive-files
    annotations:
        nixis.io/falco-tags: maturity_stable,host,container,filesystem,mitre_credential_access,T1555
        nixis.io/imported-from: nixis-import-999705196.yaml
        nixis.io/severity: medium
        nixis.io/llm-confidence: medium
        nixis.io/source-rule: Create Hardlink Over Sensitive Files
spec:
    description: |
        Detect hardlink created over a curated list of sensitive files or subdirectories under /etc/ or root directories. Can be customized as needed. Refer to further and equivalent guidance within the rule "Read sensitive file untrusted".
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: 'tool == "Bash" && request.args.command.matches(".*\\bln\\b.*(shadow|sudoers|pam\\.conf|pwquality\\.conf|passwd|gshadow).*") && !request.args.command.matches(".*\\bln\\s+-s\\b.*")'
          message: 'Falco rule violated: Create Hardlink Over Sensitive Files'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
