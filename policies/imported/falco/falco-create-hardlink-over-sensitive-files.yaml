apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-create-hardlink-over-sensitive-files
    annotations:
        aegis.io/falco-tags: maturity_stable,host,container,filesystem,mitre_credential_access,T1555
        aegis.io/imported-from: aegis-import-2766262408.yaml
        aegis.io/severity: medium
        aegis.io/source-rule: Create Hardlink Over Sensitive Files
spec:
    description: |
        Detect hardlink created over a curated list of sensitive files or subdirectories under /etc/ or root directories. Can be customized as needed. Refer to further and equivalent guidance within the rule "Read sensitive file untrusted".
    matchConstraints:
        tools:
            - Read
            - Write
            - Edit
    validations:
        - expression: "false"
          message: 'Falco rule violated: Create Hardlink Over Sensitive Files'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
