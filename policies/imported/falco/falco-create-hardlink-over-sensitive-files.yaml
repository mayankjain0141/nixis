# IMPORT_TODO: Falco condition uses kernel or macro fields that cannot be automatically translated — manual review required. Original condition: create_hardlink and (evt.arg.oldpath in (/etc/shadow, /etc/sudoers, /etc/pam.conf, /etc/security/pwquality.conf))
