# IMPORT_REVIEW: translated by Claude — verify semantics
# imported from: rules via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-launch-ingress-remote-file-copy-tools-in-container
    annotations:
        aegis.io/falco-tags: maturity_incubating,container,network,process,mitre_command_and_control,TA0011
        aegis.io/imported-from: aegis-import-2621062960.yaml
        aegis.io/severity: low
        aegis.io/llm-confidence: medium
        aegis.io/source-rule: Launch Ingress Remote File Copy Tools in Container
spec:
    description: |
        Detect ingress remote file copy tools (such as curl or wget) launched inside containers. This rule can be considered a valuable auditing tool, but it has the potential to generate notable noise and requires careful profiling before full operationalization.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: 'tool == "Bash" && request.args.command.matches(".*(curl|wget).*-[oO]\\s+.*") || tool == "Bash" && request.args.command.matches(".*(curl|wget)\\s+https?://.*")'
          message: 'Falco rule violated: Launch Ingress Remote File Copy Tools in Container'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
