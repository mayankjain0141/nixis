# imported from: rules via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-launch-excessively-capable-container
    annotations:
        nixis.io/falco-tags: maturity_incubating,container,cis,mitre_execution,T1610
        nixis.io/imported-from: nixis-import-2621062960.yaml
        nixis.io/severity: low
        nixis.io/llm-confidence: medium
        nixis.io/source-rule: Launch Excessively Capable Container
spec:
    description: |
        Identify containers that start with a powerful set of capabilities, with exceptions for recognized trusted images. Similar to the "Launch Privileged Container" rule, this functions as a robust auditing rule. Compromised highly privileged containers can lead to substantial harm. For instance, if another rule is triggered within such a container, it might raise suspicion, prompting closer scrutiny.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: 'tool == "Bash" && request.args.command.matches(".*docker\\s+run.*(--cap-add|--privileged).*")'
          message: 'Falco rule violated: Launch Excessively Capable Container'
          action: AUDIT
    defaultAction: ALLOW
