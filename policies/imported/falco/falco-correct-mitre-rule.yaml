# imported from: rules via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-correct-mitre-rule
    annotations:
        nixis.io/falco-tags: host,container,network,mitre_persistence,T1098
        nixis.io/imported-from: nixis-import-1844418014.yaml
        nixis.io/severity: high
        nixis.io/llm-confidence: medium
        nixis.io/source-rule: correct mitre rule
spec:
    description: an attempt to write to any file below /etc
    matchConstraints:
        tools:
            - Write
            - Edit
            - Bash
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.startsWith("/etc/") || tool == "Bash" && request.args.command.matches(".*>\\s*/etc/.*")'
          message: 'Falco rule violated: correct mitre rule'
          action: DENY
    defaultAction: ALLOW
