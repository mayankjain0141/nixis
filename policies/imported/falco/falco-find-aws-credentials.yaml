# IMPORT_TODO: Falco condition uses kernel or macro fields that cannot be automatically translated — manual review required. Original condition: spawned_process and ((grep_commands and private_aws_credentials) or
#      (proc.name = "find" and proc.args endswith ".aw...
# imported from: rules via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-find-aws-credentials
    annotations:
        aegis.io/falco-tags: maturity_stable,host,container,process,aws,mitre_credential_access,T1552
        aegis.io/imported-from: aegis-import-4101892790.yaml
        aegis.io/severity: medium
        aegis.io/source-rule: Find AWS Credentials
spec:
    description: |
        Detect attempts to search for private keys or passwords using the grep or find command, particularly targeting standard AWS credential locations. This is often seen with unsophisticated attackers, as there are many ways to access files using bash built-ins that could go unnoticed. Regardless, this serves as a solid baseline detection that can be tailored to cover these gaps while maintaining an acceptable noise level. This rule complements the rule "Search Private Keys or Passwords".
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: "false"
          message: 'Falco rule violated: Find AWS Credentials'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
