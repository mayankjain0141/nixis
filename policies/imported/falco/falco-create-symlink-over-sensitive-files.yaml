# IMPORT_REVIEW: translated by Claude — verify semantics
# imported from: rules via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-create-symlink-over-sensitive-files
    annotations:
        aegis.io/falco-tags: maturity_stable,host,container,filesystem,mitre_credential_access,T1555
        aegis.io/imported-from: aegis-import-999705196.yaml
        aegis.io/severity: medium
        aegis.io/llm-confidence: medium
        aegis.io/source-rule: Create Symlink Over Sensitive Files
spec:
    description: |
        Detect symlinks created over a curated list of sensitive files or subdirectories under /etc/ or root directories. Can be customized as needed. Refer to further and equivalent guidance within the rule "Read sensitive file untrusted".
    matchConstraints:
        tools:
            - Read
            - Write
            - Edit
    validations:
        - expression: 'tool == "Bash" && request.args.command.matches(".*ln -s.*(shadow|sudoers|pam\\.conf|passwd|pwquality).*")'
          message: 'Falco rule violated: Create Symlink Over Sensitive Files'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
