# imported from: rules via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-clear-log-activities
    annotations:
        nixis.io/falco-tags: maturity_stable,host,container,filesystem,mitre_defense_evasion,T1070,NIST_800-53_AU-10
        nixis.io/imported-from: nixis-import-999705196.yaml
        nixis.io/severity: medium
        nixis.io/llm-confidence: medium
        nixis.io/source-rule: Clear Log Activities
spec:
    description: |
        Detect clearing of critical access log files, typically done to erase evidence that could be attributed to an adversary's actions. To effectively customize and operationalize this detection, check for potentially missing log file destinations relevant to your environment, and adjust the profiled containers you wish not to be alerted on.
    matchConstraints:
        tools:
            - Write
            - Edit
            - Bash
    validations:
        - expression: 'tool == "Bash" && (request.args.command.matches(".*\\btruncate\\b.*-s\\s*0.*/var/log/.*") || request.args.command.matches(".*\\bshred\\b.*/var/log/.*") || request.args.command.matches(".*\\brm\\b.*-[rf]+\\s+/var/log/.*")) || ((tool == "Write" || tool == "Edit") && request.args.path.startsWith("/var/log/") && request.args.content == "")'
          message: 'Falco rule violated: Clear Log Activities'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
