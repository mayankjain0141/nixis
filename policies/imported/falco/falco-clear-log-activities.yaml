# IMPORT_TODO: Falco condition uses kernel or macro fields that cannot be automatically translated — manual review required. Original condition: open_write and access_log_files and evt.arg.flags contains "O_TRUNC" and not containerd_activities and not trusted_loggi...
# imported from: rules via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-clear-log-activities
    annotations:
        aegis.io/falco-tags: maturity_stable,host,container,filesystem,mitre_defense_evasion,T1070,NIST_800-53_AU-10
        aegis.io/imported-from: aegis-import-4101892790.yaml
        aegis.io/severity: medium
        aegis.io/source-rule: Clear Log Activities
spec:
    description: |
        Detect clearing of critical access log files, typically done to erase evidence that could be attributed to an adversary's actions. To effectively customize and operationalize this detection, check for potentially missing log file destinations relevant to your environment, and adjust the profiled containers you wish not to be alerted on.
    matchConstraints:
        tools:
            - Read
            - Write
            - Edit
    validations:
        - expression: "false"
          message: 'Falco rule violated: Clear Log Activities'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
