# imported from: rules via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-web-server-spawned-shell
    annotations:
        nixis.io/falco-tags: maturity_sandbox,host,container,process,mitre_persistence,mitre_execution,T1505.003
        nixis.io/imported-from: nixis-import-1470842712.yaml
        nixis.io/severity: critical
        nixis.io/source-rule: Web Server Spawned Shell
spec:
    description: |
        Detects a web server process (nginx, apache, php-fpm, etc.) spawning an interactive shell. This is a strong indicator of webshell exploitation or remote code execution vulnerability being actively exploited. Webshells are a common persistence mechanism used by attackers after compromising web applications. The macro user_known_web_server_shell_activities can be overridden to tune for legitimate use cases like CGI scripts. Note that simple shell wrappers used in health checks are excluded.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: 'tool == "Bash" && request.args.command.matches(".*\\b(php|python3?|ruby|node|nginx|apache2?|httpd|gunicorn|uwsgi|php-fpm)\\b.*") && request.args.command.matches(".*\\b(bash|sh|ash|zsh|ksh|dash)\\b.*")'
          message: 'Falco rule violated: Web Server Spawned Shell'
          action: DENY
    defaultAction: ALLOW
