# imported from: rules via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-netcat-remote-code-execution-in-container
    annotations:
        nixis.io/falco-tags: maturity_stable,container,network,process,mitre_execution,T1059
        nixis.io/imported-from: nixis-import-999705196.yaml
        nixis.io/severity: medium
        nixis.io/source-rule: Netcat Remote Code Execution in Container
spec:
    description: |
        Netcat Program runs inside container that allows remote code execution and may be utilized as a part of a variety of reverse shell payload https://github.com/swisskyrepo/PayloadsAllTheThings/. These programs are of higher relevance as they are commonly installed on UNIX-like operating systems. Can fire in combination with the "Redirect STDOUT/STDIN to Network Connection in Container" rule as it utilizes a different evt.type.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: 'tool == "Bash" && (request.args.command.matches(".*\\bnc\\b.*-e.*(bash|sh|/bin).*") || request.args.command.matches(".*\\b(netcat|ncat)\\b.*-e.*(bash|sh|/bin).*"))'
          message: 'Falco rule violated: Netcat Remote Code Execution in Container'
          action: DENY
    defaultAction: ALLOW
