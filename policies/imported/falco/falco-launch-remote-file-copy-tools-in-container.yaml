apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-launch-remote-file-copy-tools-in-container
    annotations:
        aegis.io/falco-tags: maturity_incubating,container,network,process,mitre_exfiltration,T1020
        aegis.io/imported-from: aegis-import-3831796007.yaml
        aegis.io/severity: low
        aegis.io/source-rule: Launch Remote File Copy Tools in Container
spec:
    description: |
        Detect remote file copy tools (like rsync, scp, sftp, dcp) launched within a container, potentially indicating data exfiltration. Suggest refining this rule to accommodate legitimate use cases.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: "false"
          message: 'Falco rule violated: Launch Remote File Copy Tools in Container'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
