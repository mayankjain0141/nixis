# IMPORT_TODO: Falco condition uses kernel or macro fields that cannot be automatically translated — manual review required. Original condition: ptrace_attach_or_injection and proc_name_exists and not known_ptrace_procs
# imported from: main via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-ptrace-attached-to-process
    annotations:
        aegis.io/falco-tags: maturity_stable,host,container,process,mitre_privilege_escalation,T1055.008
        aegis.io/imported-from: aegis-import-2766262408.yaml
        aegis.io/severity: medium
        aegis.io/source-rule: PTRACE attached to process
spec:
    description: |
        Detect an attempt to inject potentially malicious code into a process using PTRACE in order to evade process-based defenses or elevate privileges. Common anti-patterns are debuggers. Additionally, profiling your environment via the known_ptrace_procs template macro can reduce noise. A successful ptrace syscall generates multiple logs at once.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: "false"
          message: 'Falco rule violated: PTRACE attached to process'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
