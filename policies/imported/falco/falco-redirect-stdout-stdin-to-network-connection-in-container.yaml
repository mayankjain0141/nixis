# IMPORT_TODO: Falco condition uses kernel or macro fields that cannot be automatically translated — manual review required. Original condition: dup and container and evt.rawres in (0, 1, 2) and fd.type in ("ipv4", "ipv6") and not user_known_stand_streams_redirect_...
# imported from: rules via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-redirect-stdout-stdin-to-network-connection-in-container
    annotations:
        aegis.io/falco-tags: maturity_stable,container,network,process,mitre_execution,T1059
        aegis.io/imported-from: aegis-import-4101892790.yaml
        aegis.io/severity: low
        aegis.io/source-rule: Redirect STDOUT/STDIN to Network Connection in Container
spec:
    description: |
        Detect redirection of stdout/stdin to a network connection within a container, achieved by utilizing a variant of the dup syscall (potential reverse shell or remote code execution https://github.com/swisskyrepo/PayloadsAllTheThings/). This detection is behavior-based and may generate noise in the system, and can be adjusted using the user_known_stand_streams_redirect_activities template macro. Tuning can be performed similarly to existing detections based on process lineage or container images, and/or it can be limited to interactive tty (tty != 0).
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: "false"
          message: 'Falco rule violated: Redirect STDOUT/STDIN to Network Connection in Container'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
