# imported from: rules via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-web-server-spawned-suspicious-child-process
    annotations:
        aegis.io/falco-tags: maturity_sandbox,host,container,process,mitre_execution,T1059
        aegis.io/imported-from: aegis-import-1470842712.yaml
        aegis.io/severity: medium
        aegis.io/source-rule: Web Server Spawned Suspicious Child Process
spec:
    description: |
        Detects web server processes spawning suspicious child processes like curl, wget, netcat, or scripting interpreters. These often indicate exploitation of web application vulnerabilities, where attackers download additional payloads or establish network connections. This rule is more sensitive than the shell spawning rule and may require tuning in environments where web applications legitimately execute system commands. Override the macro user_known_web_server_child_activities for custom tuning.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: 'tool == "Bash" && request.args.command.matches(".*\\b(php|python3?|ruby|node|nginx|apache2?|httpd|gunicorn|uwsgi|php-fpm)\\b.*") && request.args.command.matches(".*\\b(curl|wget|nc|netcat|ncat|perl|msfconsole|msfvenom)\\b.*")'
          message: 'Falco rule violated: Web Server Spawned Suspicious Child Process'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
