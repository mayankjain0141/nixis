# IMPORT_REVIEW: translated by Claude — verify semantics
# imported from: rules via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-sudo-potential-privilege-escalation
    annotations:
        aegis.io/falco-tags: maturity_sandbox,host,container,filesystem,users,mitre_privilege_escalation,T1548.003
        aegis.io/imported-from: aegis-import-1470842712.yaml
        aegis.io/severity: critical
        aegis.io/llm-confidence: medium
        aegis.io/source-rule: Sudo Potential Privilege Escalation
spec:
    description: |
        Affecting sudo (<= 1.9.5p2), there's a privilege escalation vulnerability. By executing sudo using the sudoedit -s or sudoedit -i command with a command-line argument that ends with a single backslash character, an unprivileged user can potentially escalate privileges to root. This rule is highly specific and might be bypassed due to potential issues with string matching on command line arguments.
    matchConstraints:
        tools:
            - Read
            - Write
            - Edit
    validations:
        - expression: 'tool == "Bash" && request.args.command.matches(".*\\bsudo(edit)?\\b.*(--shell|-s|-i).*")'
          message: 'Falco rule violated: Sudo Potential Privilege Escalation'
          action: DENY
    defaultAction: ALLOW
