# IMPORT_TODO: Falco condition uses kernel or macro fields that cannot be automatically translated — manual review required. Original condition: container_started and container.privileged=true and not falco_privileged_containers and not user_privileged_containers a...
# imported from: main via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-launch-privileged-container
    annotations:
        aegis.io/falco-tags: maturity_incubating,container,cis,mitre_execution,T1610,PCI_DSS_10.2.5
        aegis.io/imported-from: aegis-import-487448035.yaml
        aegis.io/severity: low
        aegis.io/source-rule: Launch Privileged Container
spec:
    description: |
        Detect the initial process initiation within a privileged container, with exemptions for known and trusted images. This rule primarily serves as an excellent auditing mechanism since highly privileged containers, when compromised, can result in significant harm. For instance, if another rule triggers within such a privileged container, it could be seen as more suspicious, prompting a closer inspection.
    matchConstraints:
        tools: []
    validations:
        - expression: "false"
          message: 'Falco rule violated: Launch Privileged Container'
          action: AUDIT
    defaultAction: ALLOW
