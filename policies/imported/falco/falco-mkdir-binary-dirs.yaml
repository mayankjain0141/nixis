# imported from: main via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: falco-mkdir-binary-dirs
    annotations:
        aegis.io/falco-tags: maturity_sandbox,host,container,filesystem,mitre_persistence,T1222.002
        aegis.io/imported-from: aegis-import-3595951451.yaml
        aegis.io/severity: high
        aegis.io/source-rule: Mkdir binary dirs
spec:
    description: |
        Trying to create a directory below a set of binary directories can serve as an auditing rule to track general system changes. Such rules can be noisy and challenging to interpret, particularly if your system frequently undergoes updates. However, careful profiling of your environment can transform this rule into an effective rule for detecting unusual behavior associated with system changes, including compliance-related cases.
    matchConstraints:
        tools:
            - Read
            - Write
            - Edit
    validations:
        - expression: "false"
          message: 'Falco rule violated: Mkdir binary dirs'
          action: DENY
    defaultAction: ALLOW
