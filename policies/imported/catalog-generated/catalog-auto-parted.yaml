# auto-generated from pkg/adapters/catalog.json via aegis policy generate-from-catalog
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: catalog-auto-parted
    annotations:
        aegis.io/family: bash
        aegis.io/risk-level: critical
        aegis.io/severity: critical
        aegis.io/source: pkg/adapters/catalog.json
spec:
    description: Deny critically-risky parted (bash)
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.startsWith("parted")
          message: parted is classified as critical risk — approval required
          action: DENY
    defaultAction: ALLOW
