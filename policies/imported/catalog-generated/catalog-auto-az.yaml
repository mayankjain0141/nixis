# auto-generated from pkg/adapters/catalog.json via nixis policy generate-from-catalog
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: catalog-auto-az
    annotations:
        nixis.io/family: bash
        nixis.io/risk-level: high
        nixis.io/severity: high
        nixis.io/source: pkg/adapters/catalog.json
spec:
    description: 'Require approval for az (bash risk level: high)'
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.startsWith("az")
          message: az is classified as high risk — approval required
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
