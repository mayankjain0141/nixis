# imported from: gatekeeper-library via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8spsphostprocess
    annotations:
        nixis.io/imported-from: nixis-import-2333992299.yaml
        nixis.io/original-kind: K8sPSPHostProcess
        nixis.io/severity: high
        nixis.io/llm-confidence: medium
        nixis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Disallows HostProcess containers for Windows pods. HostProcess containers enable privileged access on Windows nodes and must be disallowed in Baseline and Restricted policies. Corresponds to the windowsOptions.hostProcess field in a Pod's securityContext or container securityContext. For more information, see https://kubernetes.io/docs/concepts/security/pod-security-standards/
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("hostProcess: true")'
          message: 'Windows pods must not use HostProcess containers. HostProcess grants privileged access to Windows nodes and is disallowed by Baseline and Restricted policies.'
          action: DENY
    defaultAction: ALLOW
