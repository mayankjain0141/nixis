# imported from: gatekeeper-library via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8sallowedrepos
    annotations:
        aegis.io/imported-from: aegis-import-136340416.yaml
        aegis.io/original-kind: K8sAllowedRepos
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Requires container images to begin with a string from the specified list. To prevent bypasses, ensure a '/' is added when specifying DockerHub repositories or custom registries. If exact matches or glob-like syntax are preferred, use the k8sallowedreposv2 policy.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("image:") && !request.args.content.matches(".*image:\\s+(gcr\\.io|registry\\.k8s\\.io|quay\\.io|docker\\.io/library).*")'
          message: 'Container image must be from an approved registry. Images from unapproved registries are not permitted.'
          action: DENY
    defaultAction: ALLOW
