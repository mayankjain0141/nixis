# IMPORT_REVIEW: translated from Rego — checks manifest content at Write/Edit time
# imported from: gatekeeper-library via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8scontainerephemeralstoragelimit
    annotations:
        aegis.io/imported-from: aegis-import-3100979763.yaml
        aegis.io/original-kind: K8sContainerEphemeralStorageLimit
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: |-
        Requires containers to have an ephemeral storage limit set and constrains the limit to be within the specified maximum values.
        https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("containers:") && !request.args.content.contains("ephemeral-storage:")'
          message: 'IMPORT_REVIEW: gatekeeper-k8scontainerephemeralstoragelimit — check manifest content'
          action: AUDIT
    defaultAction: ALLOW
