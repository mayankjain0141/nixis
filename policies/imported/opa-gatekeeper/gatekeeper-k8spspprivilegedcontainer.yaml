# imported from: gatekeeper-library via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8spspprivilegedcontainer
    annotations:
        aegis.io/imported-from: aegis-import-2257911594.yaml
        aegis.io/original-kind: K8sPSPPrivilegedContainer
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Controls the ability of any container to enable privileged mode. Corresponds to the `privileged` field in a PodSecurityPolicy. For more information, see https://kubernetes.io/docs/concepts/policy/pod-security-policy/#privileged
    matchConstraints:
        tools:
            - Bash
            - Write
            - Edit
    validations:
        - expression: '((tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("privileged: true")) || (tool == "Bash" && request.args.command.contains("--privileged"))'
          message: 'Containers must not run in privileged mode. Privileged containers have unrestricted access to the host kernel.'
          action: DENY
    defaultAction: ALLOW
