# imported from: gatekeeper-library via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8sreplicalimits
    annotations:
        nixis.io/imported-from: nixis-import-3229458806.yaml
        nixis.io/original-kind: K8sReplicaLimits
        nixis.io/severity: high
        nixis.io/llm-confidence: medium
        nixis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Requires that objects with the field `spec.replicas` (Deployments, ReplicaSets, etc.) specify a number of replicas within defined ranges.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.matches(".*replicas:\\s*[0-9]+.*")'
          message: 'Deployments and ReplicaSets should specify a replica count within the allowed range for this cluster.'
          action: AUDIT
    defaultAction: ALLOW
