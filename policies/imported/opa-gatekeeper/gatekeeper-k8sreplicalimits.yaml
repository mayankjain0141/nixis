# IMPORT_REVIEW: translated from Rego — checks manifest content at Write/Edit time
# imported from: gatekeeper-library via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8sreplicalimits
    annotations:
        aegis.io/imported-from: aegis-import-3229458806.yaml
        aegis.io/original-kind: K8sReplicaLimits
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Requires that objects with the field `spec.replicas` (Deployments, ReplicaSets, etc.) specify a number of replicas within defined ranges.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\.(yaml|yml|json)$") && request.args.content.matches(".*replicas:\s*[0-9]+.*")'
          message: 'IMPORT_REVIEW: gatekeeper-k8sreplicalimits — check manifest content'
          action: AUDIT
    defaultAction: ALLOW
