apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8spsphostfilesystem
    annotations:
        aegis.io/imported-from: aegis-import-3063562658.yaml
        aegis.io/original-kind: K8sPSPHostFilesystem
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Controls usage of the host filesystem. Corresponds to the `allowedHostPaths` field in a PodSecurityPolicy. For more information, see https://kubernetes.io/docs/concepts/policy/pod-security-policy/#volumes-and-file-systems
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("hostPath:")'
          message: 'Pods must not mount host filesystem paths via hostPath volumes. Host filesystem access can expose sensitive node data.'
          action: DENY
