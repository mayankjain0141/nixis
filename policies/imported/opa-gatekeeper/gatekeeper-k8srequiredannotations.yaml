kind: PolicyTemplate
metadata:
    name: gatekeeper-k8srequiredannotations
    annotations:
        aegis.io/imported-from: aegis-import-3268598239.yaml
        aegis.io/original-kind: K8sRequiredAnnotations
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
