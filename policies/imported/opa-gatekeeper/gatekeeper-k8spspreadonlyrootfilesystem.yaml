# imported from: gatekeeper-library via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8spspreadonlyrootfilesystem
    annotations:
        nixis.io/imported-from: nixis-import-3262533439.yaml
        nixis.io/original-kind: K8sPSPReadOnlyRootFilesystem
        nixis.io/severity: high
        nixis.io/llm-confidence: medium
        nixis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Requires the use of a read-only root file system by pod containers. Corresponds to the `readOnlyRootFilesystem` field in a PodSecurityPolicy. For more information, see https://kubernetes.io/docs/concepts/policy/pod-security-policy/#volumes-and-file-systems
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("containers:") && !request.args.content.contains("readOnlyRootFilesystem: true")'
          message: 'Containers should use a read-only root filesystem (readOnlyRootFilesystem: true). A writable root filesystem increases the blast radius of a container compromise.'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
