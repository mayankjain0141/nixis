# IMPORT_REVIEW: translated from Rego — checks manifest content at Write/Edit time
# imported from: gatekeeper-library via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8spspreadonlyrootfilesystem
    annotations:
        aegis.io/imported-from: aegis-import-3262533439.yaml
        aegis.io/original-kind: K8sPSPReadOnlyRootFilesystem
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Requires the use of a read-only root file system by pod containers. Corresponds to the `readOnlyRootFilesystem` field in a PodSecurityPolicy. For more information, see https://kubernetes.io/docs/concepts/policy/pod-security-policy/#volumes-and-file-systems
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\.(yaml|yml|json)$") && request.args.content.contains("containers:") && !request.args.content.contains("readOnlyRootFilesystem: true")'
          message: 'IMPORT_REVIEW: gatekeeper-k8spspreadonlyrootfilesystem — check manifest content'
          action: AUDIT
    defaultAction: ALLOW
