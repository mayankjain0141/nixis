# imported from: gatekeeper-library via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8spspvolumetypes
    annotations:
        nixis.io/imported-from: nixis-import-3878495136.yaml
        nixis.io/original-kind: K8sPSPVolumeTypes
        nixis.io/severity: high
        nixis.io/llm-confidence: medium
        nixis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Restricts mountable volume types to those specified by the user. Corresponds to the `volumes` field in a PodSecurityPolicy. For more information, see https://kubernetes.io/docs/concepts/policy/pod-security-policy/#volumes-and-file-systems
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("volumes:") && (request.args.content.contains("hostPath:") || request.args.content.contains("nfs:") || request.args.content.contains("iscsi:") || request.args.content.contains("glusterfs:") || request.args.content.contains("rbd:") || request.args.content.contains("flexVolume:") || request.args.content.contains("cephfs:") || request.args.content.contains("flocker:") || request.args.content.contains("azureFile:") || request.args.content.contains("azureDisk:") || request.args.content.contains("portworxVolume:") || request.args.content.contains("vsphereVolume:") || request.args.content.contains("scaleIO:") || request.args.content.contains("storageOS:"))'
          message: 'Pods must not use restricted volume types (hostPath, nfs, iscsi, glusterfs, rbd, flexVolume, cephfs, etc.). Use only approved volume types.'
          action: DENY
    defaultAction: ALLOW
