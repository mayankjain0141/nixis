# imported from: gatekeeper-library via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8sblockwildcardingress
    annotations:
        aegis.io/imported-from: aegis-import-772102698.yaml
        aegis.io/original-kind: K8sBlockWildcardIngress
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Users should not be able to create Ingresses with a blank or wildcard (*) hostname since that would enable them to intercept traffic for other services in the cluster, even if they don't have access to those services.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("Ingress") && request.args.content.matches(".*host:\\s*\\*.*")'
          message: 'Ingress resources must not use a wildcard (*) or blank hostname. Wildcard hosts intercept traffic for other cluster services.'
          action: DENY
    defaultAction: ALLOW
