# imported from: gatekeeper-library via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8spsphostnamespace
    annotations:
        nixis.io/imported-from: nixis-import-3987274291.yaml
        nixis.io/original-kind: K8sPSPHostNamespace
        nixis.io/severity: high
        nixis.io/llm-confidence: medium
        nixis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Disallows sharing of host PID and IPC namespaces by pod containers. Corresponds to the `hostPID` and `hostIPC` fields in a PodSecurityPolicy. For more information, see https://kubernetes.io/docs/concepts/policy/pod-security-policy/#host-namespaces
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && (request.args.content.contains("hostPID: true") || request.args.content.contains("hostIPC: true"))'
          message: 'Pods must not share the host PID or IPC namespace. Host namespace sharing enables container escape and cross-process attacks.'
          action: DENY
    defaultAction: ALLOW
