# IMPORT_REVIEW: translated from Rego — checks manifest content at Write/Edit time
# imported from: gatekeeper-library via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8spsphostnamespace
    annotations:
        aegis.io/imported-from: aegis-import-3987274291.yaml
        aegis.io/original-kind: K8sPSPHostNamespace
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Disallows sharing of host PID and IPC namespaces by pod containers. Corresponds to the `hostPID` and `hostIPC` fields in a PodSecurityPolicy. For more information, see https://kubernetes.io/docs/concepts/policy/pod-security-policy/#host-namespaces
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && (request.args.content.contains("hostPID: true") || request.args.content.contains("hostIPC: true"))'
          message: 'IMPORT_REVIEW: gatekeeper-k8spsphostnamespace — check manifest content'
          action: DENY
    defaultAction: ALLOW
