# IMPORT_REVIEW: translated from Rego — checks manifest content at Write/Edit time
# imported from: gatekeeper-library via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8sexternalips
    annotations:
        aegis.io/imported-from: aegis-import-498002130.yaml
        aegis.io/original-kind: K8sExternalIPs
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: |-
        Restricts Service externalIPs to an allowed list of IP addresses.
        https://kubernetes.io/docs/concepts/services-networking/service/#external-ips
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("externalIPs:")'
          message: 'IMPORT_REVIEW: gatekeeper-k8sexternalips — check manifest content'
          action: DENY
    defaultAction: ALLOW
