# imported from: gatekeeper-library via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-verifydeprecatedapi
    annotations:
        nixis.io/imported-from: nixis-import-477830276.yaml
        nixis.io/original-kind: VerifyDeprecatedAPI
        nixis.io/severity: high
        nixis.io/llm-confidence: medium
        nixis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Verifies deprecated Kubernetes APIs to ensure all the API versions are up to date. This template does not apply to audit as audit looks at the resources which are already present in the cluster with non-deprecated API versions.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && (request.args.content.contains("apiVersion: extensions/v1beta1") || request.args.content.contains("apiVersion: apps/v1beta1") || request.args.content.contains("apiVersion: apps/v1beta2") || request.args.content.contains("apiVersion: policy/v1beta1") || request.args.content.contains("apiVersion: rbac.authorization.k8s.io/v1alpha1") || request.args.content.contains("apiVersion: rbac.authorization.k8s.io/v1beta1"))'
          message: 'Manifest uses a deprecated Kubernetes API version (extensions/v1beta1, apps/v1beta1, apps/v1beta2, policy/v1beta1, rbac.authorization.k8s.io/v1alpha1/v1beta1). Update to the current stable API version.'
          action: DENY
    defaultAction: ALLOW
