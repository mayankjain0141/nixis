# IMPORT_REVIEW: translated from Rego — checks manifest content at Write/Edit time
# imported from: gatekeeper-library via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8shttpsonly
    annotations:
        aegis.io/imported-from: aegis-import-2054395890.yaml
        aegis.io/original-kind: K8sHttpsOnly
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: |-
        Requires Ingress resources to be HTTPS only.  Ingress resources must include the `kubernetes.io/ingress.allow-http` annotation, set to `false`. By default a valid TLS {} configuration is required, this can be made optional by setting the `tlsOptional` parameter to `true`.
        https://kubernetes.io/docs/concepts/services-networking/ingress/#tls
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Ingress") && !request.args.content.contains("ingress.allow-http")'
          message: 'IMPORT_REVIEW: gatekeeper-k8shttpsonly — check manifest content'
          action: DENY
    defaultAction: ALLOW
