# imported from: gatekeeper-library via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8shttpsonly
    annotations:
        nixis.io/imported-from: nixis-import-2054395890.yaml
        nixis.io/original-kind: K8sHttpsOnly
        nixis.io/severity: high
        nixis.io/llm-confidence: medium
        nixis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: |-
        Requires Ingress resources to be HTTPS only.  Ingress resources must include the `kubernetes.io/ingress.allow-http` annotation, set to `false`. By default a valid TLS {} configuration is required, this can be made optional by setting the `tlsOptional` parameter to `true`.
        https://kubernetes.io/docs/concepts/services-networking/ingress/#tls
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Ingress") && !request.args.content.contains("ingress.allow-http")'
          message: 'Ingress resources must enforce HTTPS-only by setting the kubernetes.io/ingress.allow-http annotation to false. Unencrypted HTTP ingress is not permitted.'
          action: DENY
    defaultAction: ALLOW
