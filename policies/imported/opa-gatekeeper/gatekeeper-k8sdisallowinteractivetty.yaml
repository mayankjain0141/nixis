# imported from: gatekeeper-library via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8sdisallowinteractivetty
    annotations:
        nixis.io/imported-from: nixis-import-3602303990.yaml
        nixis.io/original-kind: K8sDisallowInteractiveTTY
        nixis.io/severity: high
        nixis.io/llm-confidence: medium
        nixis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Requires that objects have the fields `spec.tty` and `spec.stdin` set to false or unset.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("tty: true") && request.args.content.contains("stdin: true")'
          message: 'Containers must not have both tty: true and stdin: true set. Interactive TTY access presents a security risk in production workloads.'
          action: DENY
    defaultAction: ALLOW
