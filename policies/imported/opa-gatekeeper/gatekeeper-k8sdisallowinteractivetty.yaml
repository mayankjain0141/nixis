# IMPORT_REVIEW: translated from Rego — checks manifest content at Write/Edit time
# imported from: gatekeeper-library via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8sdisallowinteractivetty
    annotations:
        aegis.io/imported-from: aegis-import-3602303990.yaml
        aegis.io/original-kind: K8sDisallowInteractiveTTY
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Requires that objects have the fields `spec.tty` and `spec.stdin` set to false or unset.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\.(yaml|yml|json)$") && request.args.content.contains("tty: true") && request.args.content.contains("stdin: true")'
          message: 'IMPORT_REVIEW: gatekeeper-k8sdisallowinteractivetty — check manifest content'
          action: DENY
    defaultAction: ALLOW
