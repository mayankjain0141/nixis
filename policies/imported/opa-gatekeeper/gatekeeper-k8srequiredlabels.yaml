# IMPORT_REVIEW: translated from Rego — checks manifest content at Write/Edit time
# imported from: gatekeeper-library via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8srequiredlabels
    annotations:
        aegis.io/imported-from: aegis-import-2007879821.yaml
        aegis.io/original-kind: K8sRequiredLabels
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Requires resources to contain specified labels, with values matching provided regular expressions.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\.(yaml|yml|json)$") && (request.args.content.contains("kind: Pod") || request.args.content.contains("kind: Deployment") || request.args.content.contains("kind: Service")) && !request.args.content.contains("labels:")'
          message: 'IMPORT_REVIEW: gatekeeper-k8srequiredlabels — check manifest content'
          action: AUDIT
    defaultAction: ALLOW
