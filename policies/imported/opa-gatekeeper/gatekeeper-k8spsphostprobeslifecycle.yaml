        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("kubectl.*")
          message: Disallows specifying the host field in probes and lifecycle hooks. The Baseline profile (v1.34+) requires that probes (livenessProbe, readinessProbe, startupProbe) and lifecycle hooks (postStart, preStop) must not specify a host field. This prevents containers from executing network requests to the host node. For more information, see https://kubernetes.io/docs/concepts/security/pod-security-standards/
          action: DENY
    defaultAction: ALLOW
