# imported from: gatekeeper-library via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8spsphostprobeslifecycle
    annotations:
        aegis.io/imported-from: aegis-import-1339214318.yaml
        aegis.io/original-kind: K8sPSPHostProbesLifecycle
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Disallows specifying the host field in probes and lifecycle hooks. The Baseline profile (v1.34+) requires that probes (livenessProbe, readinessProbe, startupProbe) and lifecycle hooks (postStart, preStop) must not specify a host field. This prevents containers from executing network requests to the host node. For more information, see https://kubernetes.io/docs/concepts/security/pod-security-standards/
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("hostProbes:")'
          message: 'Probes (liveness, readiness, startup) and lifecycle hooks must not specify a host field. This prevents containers from making network requests to the host node.'
          action: AUDIT
    defaultAction: ALLOW
