# imported from: gatekeeper-library via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8sblockloadbalancer
    annotations:
        aegis.io/imported-from: aegis-import-792360002.yaml
        aegis.io/original-kind: K8sBlockLoadBalancer
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: |-
        Disallows all Services with type LoadBalancer.
        https://kubernetes.io/docs/concepts/services-networking/service/#loadbalancer
    matchConstraints:
        tools:
            - Bash
            - Write
            - Edit
    validations:
        - expression: '((tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("LoadBalancer")) || (tool == "Bash" && request.args.command.matches(".*kubectl.*(create|apply|expose).*") && request.args.command.contains("LoadBalancer"))'
          message: 'Services of type LoadBalancer are not permitted. Use ClusterIP or NodePort with ingress instead.'
          action: DENY
    defaultAction: ALLOW
