# IMPORT_REVIEW: translated from Rego — checks manifest content at Write/Edit time
# imported from: gatekeeper-library via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8sdisallowanonymous
    annotations:
        aegis.io/imported-from: aegis-import-141553382.yaml
        aegis.io/original-kind: K8sDisallowAnonymous
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Disallows associating ClusterRole and Role resources to the system:anonymous user and system:unauthenticated group.
    matchConstraints:
        tools:
            - Bash
            - Write
            - Edit
    validations:
        - expression: '((tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && (request.args.content.contains("system:unauthenticated") || request.args.content.contains("system:anonymous")) && (request.args.content.contains("RoleBinding") || request.args.content.contains("ClusterRoleBinding"))) || (tool == "Bash" && request.args.command.matches(".*kubectl.*rolebinding.*system:unauthenticated.*"))'
          message: 'IMPORT_REVIEW: gatekeeper-k8sdisallowanonymous — check manifest content'
          action: DENY
    defaultAction: ALLOW
