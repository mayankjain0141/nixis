# imported from: gatekeeper-library via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8sdisallowanonymous
    annotations:
        nixis.io/imported-from: nixis-import-141553382.yaml
        nixis.io/original-kind: K8sDisallowAnonymous
        nixis.io/severity: high
        nixis.io/llm-confidence: medium
        nixis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Disallows associating ClusterRole and Role resources to the system:anonymous user and system:unauthenticated group.
    matchConstraints:
        tools:
            - Bash
            - Write
            - Edit
    validations:
        - expression: '((tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && (request.args.content.contains("system:unauthenticated") || request.args.content.contains("system:anonymous")) && (request.args.content.contains("RoleBinding") || request.args.content.contains("ClusterRoleBinding"))) || (tool == "Bash" && request.args.command.matches(".*kubectl.*rolebinding.*system:unauthenticated.*"))'
          message: 'ClusterRole/Role bindings must not grant permissions to system:anonymous or system:unauthenticated. Anonymous access to cluster resources is prohibited.'
          action: DENY
    defaultAction: ALLOW
