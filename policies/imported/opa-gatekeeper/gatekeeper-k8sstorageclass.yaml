# imported from: gatekeeper-library via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8sstorageclass
    annotations:
        nixis.io/imported-from: nixis-import-4138536437.yaml
        nixis.io/original-kind: K8sStorageClass
        nixis.io/severity: high
        nixis.io/llm-confidence: medium
        nixis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Requires storage classes to be specified when used. Only Gatekeeper 3.9+ and non-ephemeral containers are supported.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && (request.args.content.contains("PersistentVolumeClaim") || request.args.content.contains("StatefulSet")) && !request.args.content.contains("storageClassName:")'
          message: 'PersistentVolumeClaims should specify a storage class. Relying on the default storage class can produce unexpected provisioning behavior.'
          action: AUDIT
    defaultAction: ALLOW
