# IMPORT_REVIEW: translated from Rego — checks manifest content at Write/Edit time
# imported from: gatekeeper-library via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8sstorageclass
    annotations:
        aegis.io/imported-from: aegis-import-4138536437.yaml
        aegis.io/original-kind: K8sStorageClass
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Requires storage classes to be specified when used. Only Gatekeeper 3.9+ and non-ephemeral containers are supported.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && (request.args.content.contains("PersistentVolumeClaim") || request.args.content.contains("StatefulSet")) && !request.args.content.contains("storageClassName:")'
          message: 'IMPORT_REVIEW: gatekeeper-k8sstorageclass — check manifest content'
          action: AUDIT
    defaultAction: ALLOW
