# imported from: gatekeeper-library via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8spspforbiddensysctls
    annotations:
        nixis.io/imported-from: nixis-import-1435989560.yaml
        nixis.io/original-kind: K8sPSPForbiddenSysctls
        nixis.io/severity: high
        nixis.io/llm-confidence: medium
        nixis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Controls the `sysctl` profile used by containers. Corresponds to the `allowedUnsafeSysctls` and `forbiddenSysctls` fields in a PodSecurityPolicy. When specified, any sysctl not in the `allowedSysctls` parameter is considered to be forbidden. The `forbiddenSysctls` parameter takes precedence over the `allowedSysctls` parameter. For more information, see https://kubernetes.io/docs/tasks/administer-cluster/sysctl-cluster/
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("sysctls:") && (request.args.content.contains("kernel.shm_rmid_forced") || request.args.content.matches(".*net\\.(ipv4|ipv6|unix)\\..*"))'
          message: 'Pods must not set forbidden or unsafe sysctl parameters. Kernel parameter modifications can destabilize the node and affect other workloads.'
          action: DENY
    defaultAction: ALLOW
