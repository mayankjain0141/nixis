# IMPORT_REVIEW: translated from Rego — checks manifest content at Write/Edit time
# imported from: gatekeeper-library via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8spspallowprivilegeescalationcontainer
    annotations:
        aegis.io/imported-from: aegis-import-2904223250.yaml
        aegis.io/original-kind: K8sPSPAllowPrivilegeEscalationContainer
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Controls restricting escalation to root privileges. Corresponds to the `allowPrivilegeEscalation` field in a PodSecurityPolicy. For more information, see https://kubernetes.io/docs/concepts/policy/pod-security-policy/#privilege-escalation
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\.(yaml|yml|json)$") && request.args.content.contains("allowPrivilegeEscalation: true")'
          message: 'IMPORT_REVIEW: gatekeeper-k8spspallowprivilegeescalationcontainer — check manifest content'
          action: DENY
    defaultAction: ALLOW
