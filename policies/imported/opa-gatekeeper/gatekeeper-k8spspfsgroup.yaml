# imported from: gatekeeper-library via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8spspfsgroup
    annotations:
        nixis.io/imported-from: nixis-import-2500649135.yaml
        nixis.io/original-kind: K8sPSPFSGroup
        nixis.io/severity: high
        nixis.io/llm-confidence: medium
        nixis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Controls allocating an FSGroup that owns the Pod's volumes. Corresponds to the `fsGroup` field in a PodSecurityPolicy. For more information, see https://kubernetes.io/docs/concepts/policy/pod-security-policy/#volumes-and-file-systems
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("fsGroup: 0")'
          message: 'Pods must not set fsGroup: 0 (root group). Volume ownership by root group grants excessive filesystem access.'
          action: DENY
    defaultAction: ALLOW
