# IMPORT_REVIEW: translated from Rego — checks manifest content at Write/Edit time
# imported from: gatekeeper-library via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8srequiredprobes
    annotations:
        aegis.io/imported-from: aegis-import-2032251612.yaml
        aegis.io/original-kind: K8sRequiredProbes
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Requires Pods to have readiness and/or liveness probes.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\.(yaml|yml|json)$") && request.args.content.contains("containers:") && (!request.args.content.contains("livenessProbe:") || !request.args.content.contains("readinessProbe:"))'
          message: 'IMPORT_REVIEW: gatekeeper-k8srequiredprobes — check manifest content'
          action: AUDIT
    defaultAction: ALLOW
