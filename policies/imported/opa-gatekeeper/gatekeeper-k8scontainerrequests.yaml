# IMPORT_REVIEW: translated from Rego — checks manifest content at Write/Edit time
# imported from: gatekeeper-library via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8scontainerrequests
    annotations:
        aegis.io/imported-from: aegis-import-2972720051.yaml
        aegis.io/original-kind: K8sContainerRequests
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: |-
        Requires containers to have memory and CPU requests set and constrains requests to be within the specified maximum values.
        https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("containers:") && !request.args.content.contains("requests:")'
          message: 'IMPORT_REVIEW: gatekeeper-k8scontainerrequests — check manifest content'
          action: DENY
    defaultAction: ALLOW
