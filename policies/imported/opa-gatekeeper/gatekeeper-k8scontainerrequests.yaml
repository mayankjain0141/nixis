# imported from: gatekeeper-library via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8scontainerrequests
    annotations:
        nixis.io/imported-from: nixis-import-2972720051.yaml
        nixis.io/original-kind: K8sContainerRequests
        nixis.io/severity: high
        nixis.io/llm-confidence: medium
        nixis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: |-
        Requires containers to have memory and CPU requests set and constrains requests to be within the specified maximum values.
        https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("containers:") && !request.args.content.contains("requests:")'
          message: 'Containers must define CPU and memory requests. Missing resource requests prevent the scheduler from making accurate placement decisions.'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
