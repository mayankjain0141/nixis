# imported from: gatekeeper-library via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8sdisallowedtags
    annotations:
        aegis.io/imported-from: aegis-import-2227044738.yaml
        aegis.io/original-kind: K8sDisallowedTags
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: |-
        Requires container images to have an image tag different from the ones in the specified list.
        https://kubernetes.io/docs/concepts/containers/images/#image-names
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.matches(".*image:.*:latest.*")'
          message: 'Container images must not use disallowed tags such as 'latest'. Pin images to a specific digest or version tag.'
          action: DENY
    defaultAction: ALLOW
