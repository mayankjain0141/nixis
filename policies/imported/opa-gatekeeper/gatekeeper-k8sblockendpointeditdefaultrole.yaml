# imported from: gatekeeper-library via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8sblockendpointeditdefaultrole
    annotations:
        nixis.io/imported-from: nixis-import-3470698540.yaml
        nixis.io/original-kind: K8sBlockEndpointEditDefaultRole
        nixis.io/severity: high
        nixis.io/llm-confidence: medium
        nixis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: |-
        Many Kubernetes installations by default have a system:aggregate-to-edit ClusterRole which does not properly restrict access to editing Endpoints. This ConstraintTemplate forbids the system:aggregate-to-edit ClusterRole from granting permission to create/patch/update Endpoints.
        ClusterRole/system:aggregate-to-edit should not allow Endpoint edit permissions due to CVE-2021-25740, Endpoint & EndpointSlice permissions allow cross-Namespace forwarding, https://github.com/kubernetes/kubernetes/issues/103675
    matchConstraints:
        tools:
            - Bash
            - Write
            - Edit
    validations:
        - expression: '((tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("system:aggregate-to-edit") && request.args.content.contains("endpoints")) || (tool == "Bash" && request.args.command.matches(".*kubectl.*(edit|patch).*aggregate-to-edit.*"))'
          message: 'ClusterRoleBindings must not grant edit permissions on Endpoints to the default service account. This prevents privilege escalation via the default RBAC role.'
          action: DENY
    defaultAction: ALLOW
