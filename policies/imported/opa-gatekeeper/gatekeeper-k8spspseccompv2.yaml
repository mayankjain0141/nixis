# IMPORT_REVIEW: translated from Rego — checks manifest content at Write/Edit time
# imported from: gatekeeper-library via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8spspseccompv2
    annotations:
        aegis.io/imported-from: aegis-import-352907982.yaml
        aegis.io/original-kind: K8sPSPSeccompV2
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Controls the seccomp profile used by containers. Corresponds to the `securityContext.seccompProfile` field. Security contexts from the annotation is not considered as Kubernetes no longer reads security contexts from the annotation.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && (request.args.content.contains("kind: Pod") || request.args.content.contains("kind: Deployment")) && !request.args.content.contains("seccompProfile:") && !request.args.content.contains("type: RuntimeDefault")'
          message: 'IMPORT_REVIEW: gatekeeper-k8spspseccompv2 — check manifest content'
          action: AUDIT
    defaultAction: ALLOW
