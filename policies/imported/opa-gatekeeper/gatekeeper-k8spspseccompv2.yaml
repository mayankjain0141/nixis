# imported from: gatekeeper-library via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8spspseccompv2
    annotations:
        nixis.io/imported-from: nixis-import-352907982.yaml
        nixis.io/original-kind: K8sPSPSeccompV2
        nixis.io/severity: high
        nixis.io/llm-confidence: medium
        nixis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Controls the seccomp profile used by containers. Corresponds to the `securityContext.seccompProfile` field. Security contexts from the annotation is not considered as Kubernetes no longer reads security contexts from the annotation.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && (request.args.content.contains("kind: Pod") || request.args.content.contains("kind: Deployment")) && !request.args.content.contains("seccompProfile:") && !request.args.content.contains("type: RuntimeDefault")'
          message: 'Containers should define a seccomp profile via securityContext.seccompProfile. The annotation-based approach is no longer read by Kubernetes.'
          action: AUDIT
    defaultAction: ALLOW
