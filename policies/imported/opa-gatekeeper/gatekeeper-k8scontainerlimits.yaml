# imported from: gatekeeper-library via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8scontainerlimits
    annotations:
        nixis.io/imported-from: nixis-import-2890443459.yaml
        nixis.io/original-kind: K8sContainerLimits
        nixis.io/severity: high
        nixis.io/llm-confidence: medium
        nixis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: |-
        Requires containers to have memory and CPU limits set and constrains limits to be within the specified maximum values.
        https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("containers:") && !request.args.content.contains("limits:")'
          message: 'Containers must define CPU and memory limits. Missing resource limits can cause noisy-neighbor issues and node instability. Add limits: to the container resources section.'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
