# IMPORT_REVIEW: translated from Rego — checks manifest content at Write/Edit time
# imported from: gatekeeper-library via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8sblocknodeport
    annotations:
        aegis.io/imported-from: aegis-import-1465034358.yaml
        aegis.io/original-kind: K8sBlockNodePort
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: |-
        Disallows all Services with type NodePort.
        https://kubernetes.io/docs/concepts/services-networking/service/#nodeport
    matchConstraints:
        tools:
            - Bash
            - Write
            - Edit
    validations:
        - expression: '((tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("NodePort")) || (tool == "Bash" && request.args.command.matches(".*kubectl.*(create|apply|expose).*") && request.args.command.contains("NodePort"))'
          message: 'IMPORT_REVIEW: gatekeeper-k8sblocknodeport — check manifest content'
          action: DENY
    defaultAction: ALLOW
