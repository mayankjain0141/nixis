# imported from: gatekeeper-library via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8sdisallowedrepos
    annotations:
        nixis.io/imported-from: nixis-import-2040226015.yaml
        nixis.io/original-kind: K8sDisallowedRepos
        nixis.io/severity: high
        nixis.io/llm-confidence: medium
        nixis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Disallowed container repositories that begin with a string from the specified list.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.matches(".*image:\\s+docker\\.io/.*")'
          message: 'Container image is from a disallowed registry (docker.io). Use images from approved registries only.'
          action: DENY
    defaultAction: ALLOW
