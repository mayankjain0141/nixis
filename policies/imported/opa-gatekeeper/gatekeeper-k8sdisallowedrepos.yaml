# IMPORT_REVIEW: translated from Rego — checks manifest content at Write/Edit time
# imported from: gatekeeper-library via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8sdisallowedrepos
    annotations:
        aegis.io/imported-from: aegis-import-2040226015.yaml
        aegis.io/original-kind: K8sDisallowedRepos
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Disallowed container repositories that begin with a string from the specified list.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.matches(".*image:\\s+docker\\.io/.*")'
          message: 'IMPORT_REVIEW: gatekeeper-k8sdisallowedrepos — check manifest content'
          action: DENY
    defaultAction: ALLOW
