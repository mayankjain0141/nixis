apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8spspseccomp
    annotations:
        nixis.io/imported-from: nixis-import-1773304233.yaml
        nixis.io/original-kind: K8sPSPSeccomp
        nixis.io/severity: high
        nixis.io/llm-confidence: medium
