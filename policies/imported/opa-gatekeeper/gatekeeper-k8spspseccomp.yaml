# IMPORT_REVIEW: translated from Rego — checks manifest content at Write/Edit time
# imported from: gatekeeper-library via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8spspseccomp
    annotations:
        aegis.io/imported-from: aegis-import-1773304233.yaml
        aegis.io/original-kind: K8sPSPSeccomp
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Controls the seccomp profile used by containers. Corresponds to the `seccomp.security.alpha.kubernetes.io/allowedProfileNames` annotation on a PodSecurityPolicy. For more information, see https://kubernetes.io/docs/concepts/policy/pod-security-policy/#seccomp
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && (request.args.content.contains("kind: Pod") || request.args.content.contains("kind: Deployment") || request.args.content.contains("kind: DaemonSet")) && !request.args.content.contains("seccompProfile:") && !request.args.content.contains("seccomp.security.alpha.kubernetes.io/")'
          message: 'IMPORT_REVIEW: gatekeeper-k8spspseccomp — check manifest content'
          action: AUDIT
    defaultAction: ALLOW
