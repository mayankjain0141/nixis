# IMPORT_REVIEW: translated from Rego — checks manifest content at Write/Edit time
# imported from: gatekeeper-library via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8simagedigests
    annotations:
        aegis.io/imported-from: aegis-import-494471804.yaml
        aegis.io/original-kind: K8sImageDigests
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: |-
        Requires container images to contain a digest.
        https://kubernetes.io/docs/concepts/containers/images/
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\.(yaml|yml|json)$") && request.args.content.contains("image:") && !request.args.content.matches(".*image:.*@sha256:[a-f0-9]+.*")'
          message: 'IMPORT_REVIEW: gatekeeper-k8simagedigests — check manifest content'
            Requires container images to contain a digest.
            https://kubernetes.io/docs/concepts/containers/images/
          action: DENY
    defaultAction: ALLOW
