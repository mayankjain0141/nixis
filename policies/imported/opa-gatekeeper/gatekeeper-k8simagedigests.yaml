# imported from: gatekeeper-library via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8simagedigests
    annotations:
        nixis.io/imported-from: nixis-import-494471804.yaml
        nixis.io/original-kind: K8sImageDigests
        nixis.io/severity: high
        nixis.io/llm-confidence: medium
        nixis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: |-
        Requires container images to contain a digest.
        https://kubernetes.io/docs/concepts/containers/images/
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("image:") && !request.args.content.matches(".*image:.*@sha256:[a-f0-9]+.*")'
          message: 'Container images must reference a content digest (@sha256:...). Images without digests are mutable and vulnerable to supply chain attacks.'
          action: DENY
    defaultAction: ALLOW
