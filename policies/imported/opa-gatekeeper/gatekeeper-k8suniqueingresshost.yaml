apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8suniqueingresshost
    annotations:
        aegis.io/imported-from: aegis-import-351290482.yaml
        aegis.io/original-kind: K8sUniqueIngressHost
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: |-
        Requires all Ingress rule hosts to be unique.
        Does not handle hostname wildcards: https://kubernetes.io/docs/concepts/services-networking/ingress/
