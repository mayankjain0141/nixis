# imported from: gatekeeper-library via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8suniqueingresshost
    annotations:
        nixis.io/imported-from: nixis-import-351290482.yaml
        nixis.io/original-kind: K8sUniqueIngressHost
        nixis.io/severity: high
        nixis.io/llm-confidence: medium
        nixis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: |-
        Requires all Ingress rule hosts to be unique.
        Does not handle hostname wildcards: https://kubernetes.io/docs/concepts/services-networking/ingress/
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Ingress")'
          message: 'Ingress resources must use unique hostnames across the cluster. Duplicate ingress hosts cause unpredictable traffic routing and can result in traffic being served by the wrong backend.'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
