# imported from: gatekeeper-library via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8suniqueserviceselector
    annotations:
        nixis.io/imported-from: nixis-import-2130643175.yaml
        nixis.io/original-kind: K8sUniqueServiceSelector
        nixis.io/severity: high
        nixis.io/llm-confidence: medium
        nixis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: |-
        Requires Services to have unique selectors within a namespace. Selectors are considered the same if they have identical keys and values. Selectors may share a key/value pair so long as there is at least one distinct key/value pair between them.
        https://kubernetes.io/docs/concepts/services-networking/service/#defining-a-service
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Service")'
          message: 'Services within a namespace must have unique selectors. Duplicate selectors cause unpredictable traffic routing between services.'
          action: DENY
    defaultAction: ALLOW
