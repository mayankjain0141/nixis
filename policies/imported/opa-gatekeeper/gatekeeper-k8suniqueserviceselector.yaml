# IMPORT_REVIEW: translated from Rego — checks manifest content at Write/Edit time
# imported from: gatekeeper-library via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8suniqueserviceselector
    annotations:
        aegis.io/imported-from: aegis-import-2130643175.yaml
        aegis.io/original-kind: K8sUniqueServiceSelector
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: |-
        Requires Services to have unique selectors within a namespace. Selectors are considered the same if they have identical keys and values. Selectors may share a key/value pair so long as there is at least one distinct key/value pair between them.
        https://kubernetes.io/docs/concepts/services-networking/service/#defining-a-service
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\.(yaml|yml|json)$") && request.args.content.contains("kind: Service")'
          message: 'IMPORT_REVIEW: gatekeeper-k8suniqueserviceselector — check manifest content'
            Requires Services to have unique selectors within a namespace. Selectors are considered the same if they have identical keys and values. Selectors may share a key/value pair so long as there is at least one distinct key/value pair between them.
            https://kubernetes.io/docs/concepts/services-networking/service/#defining-a-service
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
