# imported from: gatekeeper-library via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: gatekeeper-k8spspapparmor
    annotations:
        aegis.io/imported-from: aegis-import-3978978778.yaml
        aegis.io/original-kind: K8sPSPAppArmor
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        aegis.io/source: open-policy-agent/gatekeeper-library
spec:
    description: Configures an allow-list of AppArmor profiles for use by containers. This corresponds to specific annotations applied to a PodSecurityPolicy. For information on AppArmor, see https://kubernetes.io/docs/tutorials/clusters/apparmor/
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && (request.args.content.contains("kind: Pod") || request.args.content.contains("kind: Deployment") || request.args.content.contains("kind: DaemonSet")) && !request.args.content.contains("container.apparmor.security.beta.kubernetes.io/")'
          message: 'Containers should use an approved AppArmor profile. AppArmor restricts container system call surface.'
          action: AUDIT
    defaultAction: ALLOW
