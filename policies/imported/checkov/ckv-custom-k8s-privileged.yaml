# imported from: checkov-custom-policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
  name: ckv-custom-3
  annotations:
    aegis.io/imported-from: checkov-custom-policies
    aegis.io/severity: medium
    aegis.io/checkov-id: CKV_CUSTOM_3
    aegis.io/checkov-source: checkov-custom-policy
spec:
  description: "Ensure privileged containers are not used in Kubernetes deployments"
  matchConstraints:
    tools: ["Write", "Edit"]
  validations:
    - expression: 'request.args.path.matches("\\.yaml$|\\.yml$") && request.args.content.contains("privileged")'
      action: DENY
      message: "Checkov policy CKV_CUSTOM_3: Privileged containers are not allowed"
  defaultAction: ALLOW
