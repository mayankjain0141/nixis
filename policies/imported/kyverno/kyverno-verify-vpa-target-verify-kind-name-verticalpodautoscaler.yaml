# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-verify-vpa-target-verify-kind-name-verticalpodautoscaler
    annotations:
        nixis.io/imported-from: nixis-import-13409531.yaml
        nixis.io/severity: medium
        nixis.io/llm-confidence: low
        kyverno.io/category: Other
spec:
    description: VerticalPodAutoscaler (VPA) is useful to automatically adjust the resources assigned to Pods. It requires defining a specific target resource by kind and name. There are no built-in validation checks by the VPA controller to ensure that the target resource exists or that the target kind is specified correctly. This policy contains two rules, the first of which verifies that the kind is specified exactly as Deployment, StatefulSet, ReplicaSet, or DaemonSet, which helps avoid typos. The second rule verifies that the target resource exists before allowing the VPA to be created.
    matchConstraints:
        tools: []
    validations:
        - expression: 'false'
          message: 'VPA targetRef existence check requires cross-resource cluster lookup to verify the named Deployment/StatefulSet/ReplicaSet/DaemonSet exists — cannot verify resource existence from manifest content alone; verify VPA targetRef refers to an existing resource'
          action: AUDIT
    defaultAction: ALLOW
