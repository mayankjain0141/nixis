# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-inject-env-var-from-image-label-add-env-maintainer
    annotations:
        nixis.io/imported-from: nixis-import-1761779970.yaml
        nixis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: Container images which use metadata such as the LABEL directive in a Dockerfile do not surface this information to apps running within. In some cases, running the image as a container may need access to this information. This policy injects the value of a label set in a Dockerfile named `maintainer` as an environment variable to the corresponding container in the Pod.
    matchConstraints:
        tools: []
    validations:
        - expression: 'false'
          message: 'Mutate rule — Nixis does not mutate requests — manual review required'
          action: AUDIT
    defaultAction: ALLOW
