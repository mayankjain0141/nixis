# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-disallow-self-provisioner-binding-check-self-provisioner-binding-no-subject-clusterrolebinding
    annotations:
        nixis.io/imported-from: nixis-import-1107828208.yaml
        nixis.io/severity: high
        kyverno.io/category: OpenShift
spec:
    description: This policy prevents binding to the self-provisioners role for strict control of OpenShift project creation.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("self-provisioner")'
          message: Modifying the self-provisioners ClusterRoleBinding is not allowed.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
