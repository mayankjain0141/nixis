# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-applicationset-name-matches-project-match-name-applicationset
    annotations:
        aegis.io/imported-from: aegis-import-138642649.yaml
        aegis.io/severity: medium
        kyverno.io/category: Argo
spec:
    description: This policy ensures that the name of the ApplicationSet is the same value provided in the project.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Application") || request.args.content.contains("kind: AppProject")'
          message: The name must match the project.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
