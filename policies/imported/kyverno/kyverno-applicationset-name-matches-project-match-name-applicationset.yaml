# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-applicationset-name-matches-project-match-name-applicationset
    annotations:
        nixis.io/imported-from: nixis-import-138642649.yaml
        nixis.io/severity: medium
        kyverno.io/category: Argo
spec:
    description: This policy ensures that the name of the ApplicationSet is the same value provided in the project.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: ApplicationSet")'
          message: The name must match the project.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
