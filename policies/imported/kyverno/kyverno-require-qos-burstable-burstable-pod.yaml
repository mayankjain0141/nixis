# IMPORT_REVIEW: QoS Burstable requires at least one container to have requests set — Aegis AUDITs Pod/Deployment/StatefulSet manifests that lack a resources.requests section; numeric equality comparison (to distinguish Burstable from Guaranteed) requires Kyverno
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-require-qos-burstable-burstable-pod
    annotations:
        aegis.io/imported-from: aegis-import-3076354596.yaml
        aegis.io/severity: medium
        aegis.io/llm-confidence: medium
        kyverno.io/category: Other, Multi-Tenancy
spec:
    description: Pod Quality of Service (QoS) is a mechanism to ensure Pods receive certain priority guarantees based upon the resources they define. When a Pod has at least one container which defines either requests or limits for either memory or CPU, Kubernetes grants the QoS class as burstable if it does not otherwise qualify for a QoS class of guaranteed. This policy requires that a Pod meet the criteria qualify for a QoS of burstable. This policy is provided with the intention that users will need to control its scope by using exclusions, preconditions, and other policy language mechanisms.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && (request.args.content.contains("kind: Pod") || request.args.content.contains("kind: Deployment") || request.args.content.contains("kind: StatefulSet")) && !request.args.content.contains("requests:")'
          message: 'Manifest does not define any resource requests — at least one container must have resources.requests set to qualify for QoS class Burstable'
          action: AUDIT
    defaultAction: ALLOW
