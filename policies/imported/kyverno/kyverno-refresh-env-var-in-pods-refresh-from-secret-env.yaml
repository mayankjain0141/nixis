# CEL_LIMITATION (class: mutate/generate): Kyverno mutate rules run server-side inside the
# Kubernetes admission webhook and can modify the resource object before it is persisted.
# Nixis CEL runs client-side at agent tool-call time and has no mechanism to rewrite manifest
# content or inject fields. All Kyverno mutate/generate policies in this batch are therefore
# translated to false + AUDIT. The stub loads and appears in governance output but never blocks.
# MUTATE policy: translated to false + AUDIT (Nixis cannot trigger Deployment rollouts at runtime)
# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-refresh-env-var-in-pods-refresh-from-secret-env
    annotations:
        nixis.io/imported-from: nixis-import-1474301329.yaml
        nixis.io/severity: medium
        nixis.io/llm-confidence: medium
        kyverno.io/category: Other
spec:
    description: When Pods consume Secrets or ConfigMaps through environment variables, should the contents of those source resources change, the downstream Pods are normally not aware of them. In order for the changes to be reflected, Pods must either restart or be respawned. This policy watches for changes to Secrets which have been marked for this refreshing process which contain the label `kyverno.io/watch=true` and will write an annotation to any Deployment Pod template which consume them as env vars. This will result in a new rollout of Pods which will pick up the changed values. See the related policy entitled "Refresh Volumes in Pods" for a similar reloading process when ConfigMaps and Secrets are consumed as volumes instead. Use of this policy may require providing the Kyverno ServiceAccount with permission to update Deployments.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: 'false'
          message: 'Mutation policy translated to audit-only — Nixis cannot trigger Deployment rollouts in response to Secret changes'
          action: AUDIT
    defaultAction: ALLOW
