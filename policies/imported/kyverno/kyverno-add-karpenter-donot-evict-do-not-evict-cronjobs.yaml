# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-add-karpenter-donot-evict-do-not-evict-cronjobs
    annotations:
        aegis.io/imported-from: aegis-import-1673709515.yaml
        aegis.io/severity: medium
        aegis.io/llm-confidence: medium
        kyverno.io/category: Karpenter, EKS Best Practices
spec:
    description: 'If a Pod exists with the annotation `karpenter.sh/do-not-evict: true` on a Node, and a request is made to delete the Node, Karpenter will not drain any Pods from that Node or otherwise try to delete the Node. This is useful for Pods that should run uninterrupted to completion. This policy mutates Jobs and CronJobs so that Pods spawned by them will contain the `karpenter.sh/do-not-evict: true` annotation.'
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: CronJob") && !request.args.content.contains("karpenter.sh/do-not-evict")'
          message: 'CronJob manifest is missing karpenter.sh/do-not-evict annotation on pod template — pods may be drained by Karpenter before completion'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
