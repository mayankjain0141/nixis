apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-resolve-image-to-digest-resolve-to-digest
    annotations:
        aegis.io/imported-from: aegis-import-538652899.yaml
        aegis.io/severity: medium
        aegis.io/llm-confidence: medium
