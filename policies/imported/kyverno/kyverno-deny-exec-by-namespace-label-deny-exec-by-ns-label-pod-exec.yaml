# imported from: policies via aegis policy import
# Gap: namespace-label filter — original policy blocks exec only in namespaces labelled exec=false; CEL cannot inspect namespace labels at command-intercept time so all kubectl exec is flagged for approval
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-deny-exec-by-namespace-label-deny-exec-by-ns-label-pod-exec
    annotations:
        aegis.io/imported-from: aegis-import-2073137752.yaml
        aegis.io/severity: low
        kyverno.io/category: Sample
spec:
    description: The `exec` command may be used to gain shell access, or run other commands, in a Pod's container. While this can be useful for troubleshooting purposes, it could represent an attack vector and is discouraged. This policy blocks Pod exec commands based upon a Namespace label `exec=false`.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: 'tool == "Bash" && request.args.command.matches(".*kubectl\\s+exec\\b.*")'
          message: kubectl exec is restricted in namespaces protected with label exec=false. Namespace labels cannot be resolved at intercept time — all kubectl exec requires approval.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
