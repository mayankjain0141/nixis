# CEL_LIMITATION: original policy uses JMESPath to iterate spec.securityContext.sysctls[*].name
# and checks each name against an allowlist of safe sysctls (kernel.shm_rmid_forced,
# net.ipv4.ip_local_port_range, net.ipv4.tcp_syncookies, net.ipv4.ping_group_range,
# net.ipv4.ip_unprivileged_port_start, net.ipv4.ip_local_reserved_ports,
# net.ipv4.tcp_keepalive_time, net.ipv4.tcp_fin_timeout, net.ipv4.tcp_keepalive_intvl,
# net.ipv4.tcp_keepalive_probes). CEL cannot iterate a list of structs from raw content
# to compare each name against an allowlist. The expression below covers CVE-2022-0811
# only (+ and = in sysctl values) — all other out-of-allowlist sysctls are NOT caught.
# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-sysctls-check-sysctls-pod
    annotations:
        nixis.io/imported-from: nixis-import-3564782354.yaml
        nixis.io/severity: medium
        kyverno.io/category: Pod Security Standards (Baseline)
spec:
    description: Sysctls can disable security mechanisms or affect all containers on a host, and should be disallowed except for an allowed "safe" subset. A sysctl is considered safe if it is namespaced in the container or the Pod, and it is isolated from other Pods or processes on the same Node. This policy ensures that only those "safe" subsets can be specified in a Pod.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("sysctls:") && (request.args.content.contains("+") || request.args.content.contains("="))'
          message: 'sysctl values with + or = are disallowed (CVE-2022-0811 cr8escape mitigation) — partial check only, see CEL_LIMITATION comment'
          action: DENY
    defaultAction: ALLOW
