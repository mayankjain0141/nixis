# IMPORT_TODO: JMESPath conditions in deny-exec-by-pod-and-container/deny-nginx-exec-in-myapp-maintenance could not be translated — kubectl pattern match generated as base condition only
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-deny-exec-by-pod-and-container-deny-nginx-exec-in-myapp-maintenance-pod-exec
    annotations:
        aegis.io/imported-from: aegis-import-3205639108.yaml
        aegis.io/severity: low
        kyverno.io/category: Sample
spec:
    description: The `exec` command may be used to gain shell access, or run other commands, in a Pod's container. While this can be useful for troubleshooting purposes, it could represent an attack vector and is discouraged. This policy blocks Pod exec commands to containers named `nginx` in Pods starting with name `myapp-maintenance`.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*")
          message: Nginx containers inside myapp-maintanence Pods may not be exec'd into.
          action: DENY
    defaultAction: ALLOW
