# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-readwriteonce-pod-readwrite-pvc-single-pod-persistentvolumeclaim
    annotations:
        nixis.io/imported-from: nixis-import-4218933716.yaml
        nixis.io/severity: low
        kyverno.io/category: Sample
spec:
    description: Some stateful workloads with multiple replicas only allow a single Pod to write to a given volume at a time. Beginning in Kubernetes 1.22 and enabled by default in 1.27, a new setting called ReadWriteOncePod, available for CSI volumes only, allows volumes to be writable from only a single Pod. For more information see the blog https://kubernetes.io/blog/2023/04/20/read-write-once-pod-access-mode-beta/. This policy enforces that the accessModes for a PersistentVolumeClaim be set to ReadWriteOncePod.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("accessModes:") && !request.args.content.contains("ReadWriteOncePod")'
          message: 'PersistentVolumeClaim accessModes must be set to ReadWriteOncePod for single-writer workloads'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
