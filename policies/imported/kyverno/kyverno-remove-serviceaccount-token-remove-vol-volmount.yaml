# CEL_LIMITATION (class: mutate/generate): Kyverno mutate rules run server-side inside the
# Kubernetes admission webhook and can modify the resource object before it is persisted.
# Nixis CEL runs client-side at agent tool-call time and has no mechanism to rewrite manifest
# content or inject fields. All Kyverno mutate/generate policies in this batch are therefore
# translated to false + AUDIT. The stub loads and appears in governance output but never blocks.
# MUTATE policy: translated to false + AUDIT (Nixis cannot strip ServiceAccount volumes from manifests at runtime)
# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-remove-serviceaccount-token-remove-vol-volmount
    annotations:
        nixis.io/imported-from: nixis-import-417188465.yaml
        nixis.io/severity: medium
        nixis.io/llm-confidence: medium
        kyverno.io/category: Other
spec:
    description: Pods running with a ServiceAccount are presented with a volume, containing the token, and volume mounts for all containers in the Pod. Applications that do not need to communicate with the Kubernetes API do not need a ServiceAccount and therefore limiting which Pods have access rights is important. Rather than, or in addition to, requiring that certain Pods disable mounting of a ServiceAccount, it is possible to silently remove this token if it has been presented. This policy ensures that Pods which do not have the label `corp.org/can-use-serviceaccount` and are consuming a ServiceAccount have that stripped away. It should be customized to restrict the scope of its operation as it will not distinguish between an explicitly-defined ServiceAccount or one provided by default.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: 'false'
          message: 'Mutation policy translated to audit-only — Nixis cannot strip ServiceAccount token volumes from manifests at runtime'
          action: AUDIT
    defaultAction: ALLOW
