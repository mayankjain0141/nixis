# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-unique-ingress-host-check-single-host-create-ingress
    annotations:
        nixis.io/imported-from: nixis-import-810378562.yaml
        nixis.io/severity: medium
        nixis.io/llm-confidence: medium
        kyverno.io/category: Sample
spec:
    description: 'An Ingress host is a URL at which services may be made available externally. In most cases, these hosts should be unique across the cluster to ensure no routing conflicts occur. This policy checks an incoming Ingress resource to ensure its hosts are unique to the cluster. It also ensures that only a single host may be specified in a given manifest. '
    matchConstraints:
        tools:
            - Write
            - Edit
            - Bash
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Ingress") && !request.args.content.contains("host:")'
          message: 'Ingress resources must specify a host — cross-resource hostname uniqueness cannot be enforced in single-request CEL'
          action: AUDIT
        - expression: 'tool == "Bash" && request.args.command.matches(".*kubectl.*create.*ingress.*--rule.*")'
          message: 'kubectl create ingress with --rule — verify the host is unique across the cluster (cross-resource uniqueness cannot be checked in CEL)'
          action: AUDIT
    defaultAction: ALLOW
