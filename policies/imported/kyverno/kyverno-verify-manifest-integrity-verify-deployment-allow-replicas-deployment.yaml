# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-verify-manifest-integrity-verify-deployment-allow-replicas-deployment
    annotations:
        aegis.io/imported-from: aegis-import-4193444184.yaml
        aegis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: Verifying the integrity of resources is important to ensure no tampering has occurred, and in some cases this may need to be extended to certain YAML manifests deployed to Kubernetes. Starting in Kyverno 1.8, these manifests may be signed with Sigstore and the signature(s) validated to prevent this tampering while still allowing some exceptions on a per-field basis. This policy verifies Deployments are signed with the expected key but ignores the `spec.replicas` field allowing other teams to change just this value.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Deployment")'
          message: 'Deployment manifests must carry a valid integrity attestation'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
