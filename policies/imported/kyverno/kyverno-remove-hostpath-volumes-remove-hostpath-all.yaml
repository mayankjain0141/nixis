# MUTATE policy: translated to false + AUDIT (Aegis cannot strip hostPath volumes from manifests at runtime)
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-remove-hostpath-volumes-remove-hostpath-all
    annotations:
        aegis.io/imported-from: aegis-import-2329056777.yaml
        aegis.io/severity: medium
        aegis.io/llm-confidence: medium
        kyverno.io/category: Other
spec:
    description: Pods which mount hostPath volumes are provided access to the underlying filesystem of the Node on which they run. In most scenarios, this should be forbidden. In others, it may be useful to silently remove those hostPath volumes rather than blocking the Pod. This policy removes all hostPath volumes and their volumeMount references from all containers within a Pod.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: 'false'
          message: 'Mutation policy translated to audit-only — Aegis cannot remove hostPath volumes from manifests at runtime'
          action: AUDIT
    defaultAction: ALLOW
