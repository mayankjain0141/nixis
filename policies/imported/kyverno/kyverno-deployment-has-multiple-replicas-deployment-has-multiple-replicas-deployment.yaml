# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-deployment-has-multiple-replicas-deployment-has-multiple-replicas-deployment
    annotations:
        aegis.io/imported-from: aegis-import-3176427468.yaml
        aegis.io/severity: medium
        kyverno.io/category: Sample
spec:
    description: Deployments with a single replica cannot be highly available and thus the application may suffer downtime if that one replica goes down. This policy validates that Deployments have more than one replica.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\.(yaml|yml|json)$") && request.args.content.contains("kind: Deployment") && request.args.content.matches(".*replicas:\s*[01]\b.*")'
          message: Deployments should have more than one replica to ensure availability.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
