# IMPORT_TODO: JMESPath conditions in limit-containers-per-pod/limit-containers-per-pod could not be translated — kubectl pattern match generated as base condition only
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-limit-containers-per-pod-limit-containers-per-pod-pod
    annotations:
        aegis.io/imported-from: aegis-import-3496021612.yaml
        aegis.io/severity: low
        kyverno.io/category: Sample
spec:
    description: Pods can have many different containers which are tightly coupled. It may be desirable to limit the amount of containers that can be in a single Pod to control best practice application or so policy can be applied consistently. This policy checks all Pods to ensure they have no more than four containers.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*(delete\\s+pod|exec|run)")
          message: Pods can only have a maximum of 4 containers.
          action: AUDIT
    defaultAction: ALLOW
