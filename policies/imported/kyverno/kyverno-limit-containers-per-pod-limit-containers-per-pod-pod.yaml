# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-limit-containers-per-pod-limit-containers-per-pod-pod
    annotations:
        aegis.io/imported-from: aegis-import-3496021612.yaml
        aegis.io/severity: low
        kyverno.io/category: Sample
spec:
    description: Pods can have many different containers which are tightly coupled. It may be desirable to limit the amount of containers that can be in a single Pod to control best practice application or so policy can be applied consistently. This policy checks all Pods to ensure they have no more than four containers.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Pod") && request.args.content.matches("(?s).*(containers:|initContainers:).*- name:.*- name:.*- name:.*- name:.*- name:.*")'
          message: 'Pod manifest appears to define more than four containers — manual review required to confirm container count does not exceed the limit of four'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
