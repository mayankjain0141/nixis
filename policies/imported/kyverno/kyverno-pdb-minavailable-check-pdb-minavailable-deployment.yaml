# IMPORT_REVIEW: Cross-resource numeric equality check — Aegis DENYs PodDisruptionBudget manifests with minAvailable of 0 or maxUnavailable of 100%/100; full replica-count comparison requires Kyverno
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-pdb-minavailable-check-pdb-minavailable-deployment
    annotations:
        aegis.io/imported-from: aegis-import-2709280891.yaml
        aegis.io/severity: low
        aegis.io/llm-confidence: medium
        kyverno.io/category: Other
spec:
    description: When a Pod controller which can run multiple replicas is subject to an active PodDisruptionBudget, if the replicas field has a value equal to the minAvailable value of the PodDisruptionBudget it may prevent voluntary disruptions including Node drains which may impact routine maintenance tasks and disrupt operations. This policy checks incoming Deployments and StatefulSets which have a matching PodDisruptionBudget to ensure these two values do not match.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: "(tool == \"Write\" || tool == \"Edit\") && request.args.path.matches(\".*\\\\.(yaml|yml|json)$\") && request.args.content.contains(\"kind: PodDisruptionBudget\") && (request.args.content.contains(\"minAvailable: 0\") || request.args.content.contains(\"minAvailable: '0'\") || request.args.content.contains('minAvailable: \"0\"') || request.args.content.contains(\"maxUnavailable: 100%\") || request.args.content.contains(\"maxUnavailable: '100%'\") || request.args.content.contains('maxUnavailable: \"100%\"') || request.args.content.contains(\"maxUnavailable: 100\"))"
          message: 'PodDisruptionBudget allows all pods to be unavailable (minAvailable: 0 or maxUnavailable: 100%/100) which blocks voluntary disruptions including node drains — set minAvailable to at least 1 or maxUnavailable below 100%'
          action: DENY
    defaultAction: ALLOW
