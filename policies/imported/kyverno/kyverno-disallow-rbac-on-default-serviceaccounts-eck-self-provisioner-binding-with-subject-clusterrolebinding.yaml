# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-disallow-rbac-on-default-serviceaccounts-eck-self-provisioner-binding-with-subject-clusterrolebinding
    annotations:
        nixis.io/imported-from: nixis-import-3829104712.yaml
        nixis.io/severity: medium
        kyverno.io/category: Security
spec:
    description: Prevents creation of ClusterRoleBindings that reference the self-provisioner cluster role with subjects, which grants users the ability to create new projects and can be used for privilege escalation.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.matches("[\\s\\S]*kind:\\s*ClusterRoleBinding[\\s\\S]*") && request.args.content.contains("self-provisioner") && request.args.content.contains("subjects:")'
          message: ClusterRoleBindings referencing the self-provisioner role with additional subjects are not allowed.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
