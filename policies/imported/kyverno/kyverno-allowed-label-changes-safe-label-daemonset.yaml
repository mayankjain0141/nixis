# imported from: policies via aegis policy import
# IMPORT_REVIEW: label-change detection requires old+new diff state unavailable at request-time; approximates by auditing any DaemonSet manifest write that contains a labels: block
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-allowed-label-changes-safe-label-daemonset
    annotations:
        aegis.io/imported-from: aegis-import-1584203326.yaml
        aegis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: In some cases, operations teams need a type of limited access to change resources during troubleshooting or outage mitigation. This policy demonstrates how to prevent modification to labels except one with the key `breakglass`. Changing, adding, or deleting any other labels is denied.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: DaemonSet") && request.args.content.contains("labels:")'
          message: 'DaemonSet label change detected. Only the breakglass label may be added, removed, or changed — all other label modifications are denied. Review required.'
          action: AUDIT
    defaultAction: ALLOW
