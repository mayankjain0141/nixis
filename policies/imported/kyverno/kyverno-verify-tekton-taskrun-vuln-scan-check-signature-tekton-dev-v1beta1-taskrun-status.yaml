# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-verify-tekton-taskrun-vuln-scan-check-signature-tekton-dev-v1beta1-taskrun-status
    annotations:
        aegis.io/imported-from: aegis-import-3550397889.yaml
        aegis.io/severity: medium
        kyverno.io/category: Tekton
spec:
    description: A signed bundle is required and a vulnerability scan made by Grype must return no vulnerabilities greater than 8.0.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("image:") && !request.args.content.contains("cosign.sigstore.dev/imageDigest")'
          message: 'Container images must be signed with a valid cosign signature'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
