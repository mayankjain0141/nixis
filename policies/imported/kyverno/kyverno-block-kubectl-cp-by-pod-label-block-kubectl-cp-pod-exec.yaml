# imported from: policies via aegis policy import
# Gap: pod-label filter — original policy blocks kubectl cp only on pods with label block-kubectl-cp=true; CEL cannot inspect pod labels at command-intercept time so all kubectl cp is blocked; catches both upload (local→pod) and download (pod→local) directions
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-block-kubectl-cp-by-pod-label-block-kubectl-cp-pod-exec
    annotations:
        aegis.io/imported-from: aegis-import-3749873027.yaml
        aegis.io/severity: low
        kyverno.io/category: Sample
spec:
    description: The kubectl cp command is used to copy files between a local machine and a Pod's container.  While this functionality is useful for transferring data, it may introduce security risks,  such as unauthorized data exfiltration or modification. This policy blocks the use of the  kubectl cp command on all Pods with label `block-kubectl-cp=true`, ensuring that sensitive  workloads are protected from unintended file transfers. Other kubectl operations are unaffected,  allowing for normal Pod management while preventing potential misuse of file copy capabilities.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: 'tool == "Bash" && request.args.command.matches(".*kubectl\\s+cp\\b.*")'
          message: 'kubectl cp is denied on protected pods (label block-kubectl-cp=true). Both upload (local to pod) and download (pod to local) file transfers are blocked to prevent unauthorized data exfiltration or modification.'
          action: DENY
    defaultAction: ALLOW
