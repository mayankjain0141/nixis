# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-no-secrets-secrets-not-from-envfrom-pod
    annotations:
        nixis.io/imported-from: nixis-import-1891170392.yaml
        nixis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: Secrets often contain sensitive information which not all Pods need consume. This policy disables the use of all Secrets in a Pod definition. In order to work effectively, this Policy needs a separate Policy or rule to require `automountServiceAccountToken=false` at the Pod level or ServiceAccount level since this would otherwise result in a Secret being mounted.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("secretRef:")'
          message: 'Pods must not consume Secrets via envFrom'
          action: DENY
    defaultAction: ALLOW
