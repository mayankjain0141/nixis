# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-secret-role-verbs-secret-verbs-clusterrole
    annotations:
        nixis.io/imported-from: nixis-import-3556047557.yaml
        nixis.io/severity: medium
        kyverno.io/category: Security in CEL
spec:
    description: The verbs `get`, `list`, and `watch` in a Role or ClusterRole, when paired with the Secrets resource, effectively allows Secrets to be read which may expose sensitive information. This policy prevents a Role or ClusterRole from using these verbs in tandem with Secret resources. In order to fully implement this control, it is recommended to pair this policy with another which also prevents use of the wildcard ('*') in the verbs list either when explicitly naming Secrets or when also using a wildcard in the base API group.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("secrets") && request.args.content.contains("verbs:") && (request.args.content.contains("- get") || request.args.content.contains("- list") || request.args.content.contains("- watch") || request.args.content.contains("- \"*\""))'
          message: 'ClusterRoles granting get/list/watch (or wildcard) on secrets require approval — risk of secret exposure'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
