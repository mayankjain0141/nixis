# IMPORT_REVIEW: Duration comparison — Aegis checks for the pod-lifetime annotation presence; numeric duration bound (8h) cannot be enforced via string matching alone
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-pod-lifetime-pods-lifetime-pod
    annotations:
        aegis.io/imported-from: aegis-import-3811290886.yaml
        aegis.io/severity: low
        aegis.io/llm-confidence: medium
        kyverno.io/category: Sample
spec:
    description: This validation is valuable when annotations are used to define durations, such as to ensure a Pod lifetime annotation does not exceed some site specific max threshold. Pod lifetime annotation can be no greater than 8 hours.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Pod") && request.args.content.contains("pod-lifetime:")'
          message: 'Pod specifies a pod-lifetime annotation — ensure its value does not exceed 8 hours; duration bound cannot be enforced via static analysis and requires Kyverno for numeric validation'
          action: AUDIT
    defaultAction: ALLOW
