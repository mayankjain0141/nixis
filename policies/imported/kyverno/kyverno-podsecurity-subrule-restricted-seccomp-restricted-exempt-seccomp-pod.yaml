# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-podsecurity-subrule-restricted-seccomp-restricted-exempt-seccomp-pod
    annotations:
        nixis.io/imported-from: nixis-import-2790722959.yaml
        nixis.io/severity: medium
        kyverno.io/category: Pod Security
spec:
    description: The restricted profile of the Pod Security Standards, which is inclusive of the baseline profile, is a collection of all the most common configurations that can be taken to secure Pods. Beginning with Kyverno 1.8, an entire profile may be assigned to the cluster through a single rule. In some cases, specific exemptions must be made on a per-control basis. This policy configures the restricted profile through the latest version of the Pod Security Standards cluster wide while completely exempting Seccomp control check.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Pod") && (request.args.content.contains("privileged: true") || request.args.content.contains("hostPID: true") || request.args.content.contains("hostIPC: true") || request.args.content.contains("hostNetwork: true") || request.args.content.contains("allowPrivilegeEscalation: true"))'
          message: 'Pod violates restricted Pod Security Standards profile (seccomp-exempt variant: privileged settings not allowed)'
          action: DENY
    defaultAction: ALLOW
