# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-require-encryption-aws-loadbalancers-aws-loadbalancer-has-ssl-cert-service
    annotations:
        aegis.io/imported-from: aegis-import-1212557041.yaml
        aegis.io/severity: medium
        kyverno.io/category: AWS, EKS Best Practices
spec:
    description: Services of type LoadBalancer when deployed inside AWS have support for transport encryption if it is enabled via an annotation. This policy requires that Services of type LoadBalancer contain the annotation service.beta.kubernetes.io/aws-load-balancer-ssl-cert with some value.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*(delete\s+service|expose)")
          message: Service of type LoadBalancer must carry the annotation service.beta.kubernetes.io/aws-load-balancer-ssl-cert.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
