# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-prepend-registry-prepend-registry-containers
    annotations:
        nixis.io/imported-from: nixis-import-1202623500.yaml
        nixis.io/severity: low
        nixis.io/llm-confidence: medium
        kyverno.io/category: Other
spec:
    description: Pulling images from outside registries may be undesirable due to untrustworthiness or simply because the traffic results in an excess of bandwidth usage. Instead of blocking them, they can be mutated to divert to an internal registry which may already contain them or function as a pull-through proxy. This policy prepends all images in both containers and initContainers to come from `registry.io`.
    matchConstraints:
        tools: []
    validations:
        - expression: 'false'
          message: 'Mutate rule — Nixis does not mutate requests — manual review required'
          action: AUDIT
    defaultAction: ALLOW
