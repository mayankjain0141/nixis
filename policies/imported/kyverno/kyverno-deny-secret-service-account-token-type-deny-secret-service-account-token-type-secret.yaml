# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-deny-secret-service-account-token-type-deny-secret-service-account-token-type-secret
    annotations:
        aegis.io/imported-from: aegis-import-4207789202.yaml
        aegis.io/severity: medium
        kyverno.io/category: Security
spec:
    description: Before version 1.24, Kubernetes automatically generated Secret-based tokens  for ServiceAccounts. When creating a Secret, you can specify its type using the  type field of the Secret resource . The type kubernetes.io/service-account-token is used for legacy ServiceAccount tokens . These legacy Tokens can be of security concern and should be audited.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*(get\\s+secret|create\\s+secret)")
          message: Secret ServiceAccount token type is not allowed.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
