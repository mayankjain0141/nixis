# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-seccomp-check-seccomp-pod
    annotations:
        nixis.io/imported-from: nixis-import-2469366788.yaml
        nixis.io/severity: medium
        kyverno.io/category: Pod Security Standards (Baseline)
spec:
    description: The seccomp profile must not be explicitly set to Unconfined. This policy, requiring Kubernetes v1.19 or later, ensures that seccomp is unset or set to `RuntimeDefault` or `Localhost`.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && (request.args.content.contains("seccompProfile:") && request.args.content.matches(".*type:\\s*Unconfined.*"))'
          message: 'seccomp profile must not be set to Unconfined — use RuntimeDefault or Localhost'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
