# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-block-large-images-block-over-twogi-pod
    annotations:
        aegis.io/imported-from: aegis-import-892211731.yaml
        aegis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: Pods which run containers of very large image size take longer to pull and require more space to store. A user may either inadvertently or purposefully name an image which is unusually large to disrupt operations. This policy checks the size of every container image and blocks if it is over 2 Gibibytes.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("image:")'
          message: images with size greater than 2Gi not allowed
          action: AUDIT
    defaultAction: ALLOW
