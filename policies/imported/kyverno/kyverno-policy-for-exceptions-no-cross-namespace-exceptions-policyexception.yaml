# IMPORT_REVIEW: translated by Claude — checks PolicyException for cross-namespace patterns; full JMESPath subject/namespace scoping requires Kyverno
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-policy-for-exceptions-no-cross-namespace-exceptions-policyexception
    annotations:
        aegis.io/imported-from: aegis-import-641170263.yaml
        aegis.io/severity: low
        aegis.io/llm-confidence: medium
        kyverno.io/category: Sample
spec:
    description: A PolicyException grants the applicable resource(s) or subject(s) the ability to bypass an existing Kyverno policy. Care should be taken to ensure that the allowed PolicyExceptions are scoped fine enough and according to your organization's operation. This is a Kyverno policy intended to provide guardrails for Kyverno PolicyExceptions and contains a number of rules which may help with these scoping best practices. These rules may be changed/removed depending on the exception practices to be implemented.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: PolicyException") && request.args.content.matches(".*namespace:\\s*\\*.*")'
          message: 'PolicyException must not grant cross-namespace scope — wildcard namespace is not permitted'
          action: DENY
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: PolicyException")'
          message: 'PolicyException detected — verify that the exception is scoped to a specific namespace and does not grant cross-namespace bypass'
          action: AUDIT
    defaultAction: ALLOW
