# IMPORT_TODO: JMESPath conditions in policy-for-exceptions/no-cross-namespace-exceptions could not be translated — kubectl pattern match generated as base condition only
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-policy-for-exceptions-no-cross-namespace-exceptions-policyexception
    annotations:
        aegis.io/imported-from: aegis-import-642799768.yaml
        aegis.io/severity: low
        kyverno.io/category: Sample
spec:
    description: A PolicyException grants the applicable resource(s) or subject(s) the ability to bypass an existing Kyverno policy. Care should be taken to ensure that the allowed PolicyExceptions are scoped fine enough and according to your organization's operation. This is a Kyverno policy intended to provide guardrails for Kyverno PolicyExceptions and contains a number of rules which may help with these scoping best practices. These rules may be changed/removed depending on the exception practices to be implemented.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*")
          message: An exception can only be created in the same Namespace as the resource being excluded.
          action: AUDIT
    defaultAction: ALLOW
