# IMPORT_TODO: JMESPath conditions in allowed-label-changes/safe-label could not be translated — kubectl pattern match generated as base condition only
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-allowed-label-changes-safe-label-pod
    annotations:
        aegis.io/imported-from: aegis-import-1584203326.yaml
        aegis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: In some cases, operations teams need a type of limited access to change resources during troubleshooting or outage mitigation. This policy demonstrates how to prevent modification to labels except one with the key `breakglass`. Changing, adding, or deleting any other labels is denied.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.matches(".*labels:.*")'
          message: The only label that may be removed or changed is `breakglass`.
          action: AUDIT
    defaultAction: ALLOW
