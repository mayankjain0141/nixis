apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-add-imagepullsecrets-for-containers-and-initcontainers-add-imagepullsecret
    annotations:
        nixis.io/imported-from: nixis-import-986715402.yaml
        nixis.io/severity: low
        nixis.io/llm-confidence: medium
        kyverno.io/category: Sample
spec:
    description: Images coming from certain registries require authentication in order to pull them, and the kubelet uses this information in the form of an imagePullSecret to pull those images on behalf of your Pod. This policy searches for images coming from a registry called `corp.reg.com` referenced by either one of the containers or one  of the init containers and, if found, will mutate the Pod to add an imagePullSecret called `my-secret`.
    matchConstraints:
        tools: []
    validations:
        - expression: 'false'
          message: 'Mutate rule (imagePullSecret for init containers) — Nixis cannot mutate requests; verify pods with corp.reg.com images include imagePullSecrets referencing my-secret'
          action: AUDIT
    defaultAction: ALLOW
