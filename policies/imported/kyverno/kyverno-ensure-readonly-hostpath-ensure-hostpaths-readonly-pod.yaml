# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-ensure-readonly-hostpath-ensure-hostpaths-readonly-pod
    annotations:
        aegis.io/imported-from: aegis-import-3386434266.yaml
        aegis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: Pods which are allowed to mount hostPath volumes in read/write mode pose a security risk even if confined to a "safe" file system on the host and may escape those confines (see https://blog.aquasec.com/kubernetes-security-pod-escape-log-mounts). The only true way to ensure safety is to enforce that all Pods mounting hostPath volumes do so in read only mode. This policy checks all containers for any hostPath volumes and ensures they are explicitly mounted in readOnly mode.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("hostPath:") && !request.args.content.contains("readOnly: true")'
          message: 'hostPath volumes must be mounted readOnly'
          action: DENY
    defaultAction: ALLOW
