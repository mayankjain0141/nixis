# CEL_LIMITATION: the original policy uses Kyverno imageData context to verify live OCI/BuildKit/Buildpack
# provenance metadata from a running container registry — this requires authenticated registry access
# that Nixis CEL cannot replicate. The policy targets running Pods, not Dockerfile writes.
# Translated to false + AUDIT; a content check on Dockerfile FROM lines would check only syntax,
# not whether the base image has approved provenance metadata.
# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-require-base-image-require-base-image-pod
    annotations:
        nixis.io/imported-from: nixis-import-3956229763.yaml
        nixis.io/severity: medium
        kyverno.io/category: Other, EKS Best Practices
spec:
    description: 'Container images can be built from a variety of sources, including other preexisting images. Ensuring images that are allowed to run are built from known, trusted images where their provenance is guaranteed can be an important step in ensuring overall cluster security. This policy ensures that any container image specifies some base image in its metadata from four possible sources: Docker BuildKit, OCI annotations (in manifest or config), or Buildpacks. Note that the ability to detect the presence of a base image is not implicit and requires the author to specify it using metadata or build directives of some sort (ex., Dockerfile FROM statements do not automatically expose this information).'
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: 'false'
          message: 'CEL limitation: policy requires live OCI/BuildKit/Buildpack provenance metadata from the container registry (Kyverno imageData context) — Nixis cannot perform authenticated registry introspection at request time'
          action: AUDIT
    defaultAction: ALLOW
