# imported from: policies via aegis policy import
# Gap: allowlist lookup — CEL cannot resolve per-namespace PriorityClass allowlists from a ConfigMap at request-time; flags any pod with priorityClassName not matching common low/medium/high/critical names
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-allowed-podpriorities-validate-pod-priority-pod
    annotations:
        aegis.io/imported-from: aegis-import-3512182261.yaml
        aegis.io/severity: low
        kyverno.io/category: Sample
spec:
    description: A Pod PriorityClass is used to provide a guarantee on the scheduling of a Pod relative to others. In certain cases where not all users in a cluster are trusted, a malicious user could create Pods at the highest possible priorities, causing other Pods to be evicted/not get scheduled. This policy checks the defined `priorityClassName` in a Pod spec to a dictionary of allowable PriorityClasses for the given Namespace stored in a ConfigMap. If the `priorityClassName` is not among them, the Pod is blocked.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("priorityClassName:") && !request.args.content.matches(".*priorityClassName:\\s*(low|medium|high|critical)\\s*.*")'
          message: The Pod priorityClassName is not in the list of allowed PriorityClasses. Use one of the approved values or request approval.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
