# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-only-trustworthy-registries-set-root-only-allow-trusted-images-pod
    annotations:
        nixis.io/imported-from: nixis-import-2949015748.yaml
        nixis.io/severity: medium
        kyverno.io/category: Other, EKS Best Practices
spec:
    description: Some containers must be built to run as root in order to function properly, but use of those images should be carefully restricted to prevent unneeded privileges. This policy blocks any image that runs as root if it does not come from a trustworthy registry, `ghcr.io` in this case.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("image:") && !request.args.content.matches(".*image:\\s+ghcr\\.io/.*")'
          message: 'Containers running as root must use images from ghcr.io — runAsRoot detection not possible via content scan; this approximation flags all non-ghcr.io images, manual review required'
          action: AUDIT
    defaultAction: ALLOW
