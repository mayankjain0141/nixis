# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-only-trustworthy-registries-set-root-only-allow-trusted-images-pod
    annotations:
        aegis.io/imported-from: aegis-import-2949015748.yaml
        aegis.io/severity: medium
        kyverno.io/category: Other, EKS Best Practices
spec:
    description: Some containers must be built to run as root in order to function properly, but use of those images should be carefully restricted to prevent unneeded privileges. This policy blocks any image that runs as root if it does not come from a trustworthy registry, `ghcr.io` in this case.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*(delete\\s+pod|exec|run)")
          message: Images with root user are not allowed to be pulled from any registry other than ghcr.io.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
