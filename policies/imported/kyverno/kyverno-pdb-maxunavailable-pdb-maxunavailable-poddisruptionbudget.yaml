# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-pdb-maxunavailable-pdb-maxunavailable-poddisruptionbudget
    annotations:
        aegis.io/imported-from: aegis-import-3246995507.yaml
        aegis.io/severity: low
        kyverno.io/category: Other
spec:
    description: A PodDisruptionBudget which sets its maxUnavailable value to zero prevents all voluntary evictions including Node drains which may impact maintenance tasks. This policy enforces that if a PodDisruptionBudget specifies the maxUnavailable field it must be greater than zero.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*")
          message: The value of maxUnavailable must be greater than zero.
          action: AUDIT
    defaultAction: ALLOW
