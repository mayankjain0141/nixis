# IMPORT_TODO: JMESPath conditions in metadata-match-regex/check-for-regex could not be translated — kubectl pattern match generated as base condition only
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-metadata-match-regex-check-for-regex-pod
    annotations:
        aegis.io/imported-from: aegis-import-474570505.yaml
        aegis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: Rather than a simple check to see if given metadata such as labels and annotations are present, in some cases they need to be present and the values match a specified regular expression. This policy illustrates how to ensure a label with key `corp.org/version` is both present and matches a given regex, in this case ensuring semver is met.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*(delete\\s+pod|exec|run)")
          message: 'The label `corp.org/version` is required and must match the specified regex: ^v[0-9].[0-9].[0-9]$'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
