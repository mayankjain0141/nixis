# imported from: policies via aegis policy import
# Gap: cross-resource existence — original policy checks whether a matching VPA exists for each Deployment; CEL cannot query cluster state, so this validates VPA manifests targeting Deployments instead
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-check-vpa-configuration-check-vpa-configuration-deployment
    annotations:
        aegis.io/imported-from: aegis-import-3101912360.yaml
        aegis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: 'VerticalPodAutoscaler (VPA) is useful to automatically adjust the resources assigned to Pods.  It requires defining a specific target resource by kind and name. There are no built-in  validation checks by the VPA controller to ensure that the target resource is associated with it.  This policy ensures that the matching kind has a matching VPA. '
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: VerticalPodAutoscaler") && request.args.content.contains("Deployment") && !request.args.content.contains("targetRef:")'
          message: VerticalPodAutoscaler targeting a Deployment must include a valid targetRef with kind and name. Add a targetRef section to the VPA spec.
          action: AUDIT
    defaultAction: ALLOW
