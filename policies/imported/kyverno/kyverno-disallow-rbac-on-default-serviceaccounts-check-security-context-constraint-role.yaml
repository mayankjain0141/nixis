# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-disallow-rbac-on-default-serviceaccounts-check-security-context-constraint-role
    annotations:
        nixis.io/imported-from: nixis-import-3829104712.yaml
        nixis.io/severity: medium
        kyverno.io/category: Security
spec:
    description: The default service account should not be bound to any role. This policy ensures Role manifests do not grant permissions to the default service account via resourceNames.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.matches("[\\s\\S]*kind:\\s*Role[\\s\\S]*") && request.args.content.matches("[\\s\\S]*resourceNames:[\\s\\S]*[\\[,\\s]default[\\],\\s][\\s\\S]*")'
          message: Granting RBAC permissions to default service accounts via Role is not allowed.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
