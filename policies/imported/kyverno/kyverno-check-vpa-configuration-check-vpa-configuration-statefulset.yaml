# imported from: policies via nixis policy import
# Gap: cross-resource existence — original policy checks whether a matching VPA exists for each StatefulSet; CEL cannot query cluster state; approximates by validating VPA manifests have targetRef: and auditing kubectl delete vpa
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-check-vpa-configuration-check-vpa-configuration-statefulset
    annotations:
        nixis.io/imported-from: nixis-import-3101912360.yaml
        nixis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: 'VerticalPodAutoscaler (VPA) is useful to automatically adjust the resources assigned to Pods.  It requires defining a specific target resource by kind and name. There are no built-in  validation checks by the VPA controller to ensure that the target resource is associated with it.  This policy ensures that the matching kind has a matching VPA. '
    matchConstraints:
        tools:
            - Write
            - Edit
            - Bash
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: VerticalPodAutoscaler") && request.args.content.contains("StatefulSet") && !request.args.content.contains("targetRef:")'
          message: VerticalPodAutoscaler targeting a StatefulSet is missing a targetRef section. A VPA without a valid targetRef has no effect. Add targetRef with kind and name.
          action: AUDIT
        - expression: 'tool == "Bash" && request.args.command.matches(".*kubectl\\s+delete\\s+vpa\\b.*")'
          message: Deleting a VerticalPodAutoscaler removes automatic resource scaling for its target workload. Review impact before proceeding.
          action: AUDIT
    defaultAction: ALLOW
