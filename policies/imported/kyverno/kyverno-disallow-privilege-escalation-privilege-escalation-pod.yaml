# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-disallow-privilege-escalation-privilege-escalation-pod
    annotations:
        nixis.io/imported-from: nixis-import-744188386.yaml
        nixis.io/severity: medium
        kyverno.io/category: Pod Security Standards (Restricted)
spec:
    description: Privilege escalation, such as via set-user-ID or set-group-ID file mode, should not be allowed. This policy ensures the `allowPrivilegeEscalation` field is set to `false`.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("allowPrivilegeEscalation: true")'
          message: Privilege escalation is disallowed. The fields spec.containers[*].securityContext.allowPrivilegeEscalation, spec.initContainers[*].securityContext.allowPrivilegeEscalation, and spec.ephemeralContainers[*].securityContext.allowPrivilegeEscalation must be set to `false`.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
