# MUTATE policy: translated to false + AUDIT (Aegis cannot redirect docker.io pulls to Harbor at runtime)
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-replace-image-registry-with-harbor-redirect-docker
    annotations:
        aegis.io/imported-from: aegis-import-1521143862.yaml
        aegis.io/severity: medium
        aegis.io/llm-confidence: medium
        kyverno.io/category: Sample
spec:
    description: Some registries like Harbor offer pull-through caches for images from certain registries. Images can be re-written to be pulled from the redirected registry instead of the original and the registry will proxy pull the image, adding it to its internal cache. The imageData context variable in this policy provides a normalized view of the container image, allowing the policy to make decisions based on various "live" image details. As a result, it requires access to the source registry and the existence of the target image to verify those details.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: 'false'
          message: 'Mutation policy translated to audit-only — Aegis cannot rewrite image references to redirect docker.io pulls through Harbor at runtime'
          action: AUDIT
    defaultAction: ALLOW
