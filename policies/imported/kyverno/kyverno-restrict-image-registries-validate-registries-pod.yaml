# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-image-registries-validate-registries-pod
    annotations:
        aegis.io/imported-from: aegis-import-3005730126.yaml
        aegis.io/severity: medium
        kyverno.io/category: Best Practices, EKS Best Practices
spec:
    description: Images from unknown, public registries can be of dubious quality and may not be scanned and secured, representing a high degree of risk. Requiring use of known, approved registries helps reduce threat exposure by ensuring image pulls only come from them. This policy validates that container images only originate from the registry `eu.foo.io` or `bar.io`. Use of this policy requires customization to define your allowable registries.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("image:") && !request.args.content.matches(".*image:\\s+(docker\\.io|gcr\\.io|ghcr\\.io)/.*")'
          message: 'Images must come from an approved registry (docker.io, gcr.io, or ghcr.io)'
          action: DENY
    defaultAction: ALLOW
