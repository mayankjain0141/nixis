# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-kasten-immutable-location-profile-kasten-immutable-location-profile
    annotations:
        nixis.io/imported-from: nixis-import-2201136314.yaml
        nixis.io/severity: low
        kyverno.io/category: Veeam Kasten
spec:
    description: Ensure Kasten Location Profiles have enabled immutability to prevent unintentional or malicious changes to backup data.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: LocationProfile") && !request.args.content.contains("immutable: true")'
          message: 'Kasten LocationProfiles must enable immutability (immutable: true)'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
