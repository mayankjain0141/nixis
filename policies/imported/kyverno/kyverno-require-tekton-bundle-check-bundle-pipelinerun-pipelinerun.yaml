# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-require-tekton-bundle-check-bundle-pipelinerun-pipelinerun
    annotations:
        aegis.io/imported-from: aegis-import-987989071.yaml
        aegis.io/severity: medium
        kyverno.io/category: Tekton
spec:
    description: PipelineRun and TaskRun resources must be executed from a bundle
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: PipelineRun")'
          message: 'PipelineRun resources must be executed from a bundle — verify spec.pipelineRef.bundle (deprecated) or resolver: bundles is set; CEL cannot check field path'
          action: AUDIT
    defaultAction: ALLOW
