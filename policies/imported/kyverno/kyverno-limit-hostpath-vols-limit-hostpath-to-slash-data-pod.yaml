# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-limit-hostpath-vols-limit-hostpath-to-slash-data-pod
    annotations:
        nixis.io/imported-from: nixis-import-4064070861.yaml
        nixis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: hostPath volumes consume the underlying node's file system. If hostPath volumes are not to be universally disabled, they should be restricted to only certain host paths so as not to allow access to sensitive information. This policy ensures the only directory that can be mounted as a hostPath volume is /data. It is strongly recommended to pair this policy with a second to ensure readOnly access is enforced preventing directory escape.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("hostPath:") && !request.args.content.matches(".*path:\\s*/data\\s*$.*")'
          message: 'hostPath volumes must use exactly /data as their mount path — subdirectories of /data not permitted; manual review required'
          action: DENY
    defaultAction: ALLOW
