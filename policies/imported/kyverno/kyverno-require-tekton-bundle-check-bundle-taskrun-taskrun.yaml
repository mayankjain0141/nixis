# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-require-tekton-bundle-check-bundle-taskrun-taskrun
    annotations:
        aegis.io/imported-from: aegis-import-987989071.yaml
        aegis.io/severity: medium
        kyverno.io/category: Tekton
spec:
    description: PipelineRun and TaskRun resources must be executed from a bundle
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*")
          message: A bundle is required.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
