# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-require-emptydir-requests-and-limits-check-emptydir-requests-limits-pod
    annotations:
        aegis.io/imported-from: aegis-import-177497570.yaml
        aegis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: Pods which mount emptyDir volumes may be allowed to potentially overrun the medium backing the emptyDir volume. This sample ensures that any initContainers or containers mounting an emptyDir volume have ephemeral-storage requests and limits set. Policy will be skipped if the volume has already a sizeLimit set.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*(delete\\s+pod|exec|run)")
          message: Containers mounting emptyDir volumes must specify requests and limits for ephemeral-storage.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
