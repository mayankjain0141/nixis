# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-enforce-min-tls-version-check-for-tls-version-mesh
    annotations:
        aegis.io/imported-from: aegis-import-3061555689.yaml
        aegis.io/severity: medium
        kyverno.io/category: Consul
spec:
    description: This policy will check the TLS Min version to ensure that whenever the mesh is set, there is a minimum version of TLS set for all the service mesh proxies and this enforces that service mesh mTLS traffic uses TLS v1.2 or newer.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("meshConfig:") && !request.args.content.contains("minProtocolVersion:")'
          message: 'Service mesh must set a minimum TLS version'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
