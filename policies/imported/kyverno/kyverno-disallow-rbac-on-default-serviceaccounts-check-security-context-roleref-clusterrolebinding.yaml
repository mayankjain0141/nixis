# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-disallow-rbac-on-default-serviceaccounts-check-security-context-roleref-clusterrolebinding
    annotations:
        nixis.io/imported-from: nixis-import-3829104712.yaml
        nixis.io/severity: medium
        kyverno.io/category: Security
spec:
    description: The default service account should not be bound to any cluster role. This policy ensures ClusterRoleBinding manifests do not include the default service account as a subject.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.matches("[\\s\\S]*kind:\\s*ClusterRoleBinding[\\s\\S]*") && request.args.content.matches("[\\s\\S]*subjects:[\\s\\S]*(kind:\\s*ServiceAccount[\\s\\S]*name:\\s*default(\\s|$)|name:\\s*default(\\s|$)[\\s\\S]*kind:\\s*ServiceAccount)[\\s\\S]*")'
          message: Binding the default service account to a ClusterRole is not allowed.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
