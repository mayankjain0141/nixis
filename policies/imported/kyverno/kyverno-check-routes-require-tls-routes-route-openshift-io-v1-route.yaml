# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-check-routes-require-tls-routes-route-openshift-io-v1-route
    annotations:
        nixis.io/imported-from: nixis-import-2980138481.yaml
        nixis.io/severity: high
        kyverno.io/category: OpenShift
spec:
    description: HTTP traffic is not encrypted and hence insecure. This policy prevents configuration of OpenShift HTTP routes.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Route") && !request.args.content.contains("tls:")'
          message: 'HTTP routes are not allowed. Configure a tls: section for secure OpenShift routes.'
          action: DENY
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Route") && request.args.content.contains("insecureEdgeTerminationPolicy: Allow")'
          message: 'insecureEdgeTerminationPolicy: Allow permits unencrypted HTTP access and is forbidden. Set insecureEdgeTerminationPolicy to Redirect or None.'
          action: DENY
    defaultAction: ALLOW
