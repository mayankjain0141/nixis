# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-disallow-privileged-containers-privileged-containers-pod
    annotations:
        aegis.io/imported-from: aegis-import-2175097907.yaml
        aegis.io/severity: medium
        kyverno.io/category: Pod Security Standards (Baseline)
spec:
    description: Privileged mode disables most security mechanisms and must not be allowed. This policy ensures Pods do not call for privileged mode.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("privileged: true")'
          message: Privileged mode is disallowed. The fields spec.containers[*].securityContext.privileged, spec.initContainers[*].securityContext.privileged, and spec.ephemeralContainers[*].securityContext.privileged must be unset or set to `false`.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
