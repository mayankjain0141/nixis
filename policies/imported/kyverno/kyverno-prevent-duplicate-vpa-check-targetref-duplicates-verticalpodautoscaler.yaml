apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-prevent-duplicate-vpa-check-targetref-duplicates-verticalpodautoscaler
    annotations:
        aegis.io/imported-from: aegis-import-3101371837.yaml
