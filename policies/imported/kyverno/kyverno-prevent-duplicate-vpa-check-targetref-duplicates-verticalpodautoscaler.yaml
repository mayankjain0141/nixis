# IMPORT_TODO: JMESPath conditions in prevent-duplicate-vpa/check-targetref-duplicates could not be translated — kubectl pattern match generated as base condition only
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-prevent-duplicate-vpa-check-targetref-duplicates-verticalpodautoscaler
    annotations:
        aegis.io/imported-from: aegis-import-3513033617.yaml
        aegis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: VerticalPodAutoscaler (VPA) is useful to automatically adjust the resources assigned to Pods. It requires defining a specific target resource by kind and name. There are no built-in validation checks by the VPA controller to prevent the creation of multiple VPAs which target the same resource. This policy has two rules, the first of which ensures that the only targetRef kinds accepted are one of either Deployment, StatefulSet, ReplicaSet, or DaemonSet. The second prevents the creation of duplicate VPAs by validating that any new VPA targets a unique resource.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*(create|run|apply).*")
          message: The target {{ request.object.spec.targetRef.kind }} named {{ request.object.spec.targetRef.name }} already has an existing VPA configured for it. Duplicate VPAs are not allowed.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
