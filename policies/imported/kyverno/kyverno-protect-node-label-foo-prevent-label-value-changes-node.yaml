# CEL_LIMITATION: Kyverno's value-changes rule uses oldObject diff — it compares the label value
# present in the previous version of the Node against the new value in the UPDATE operation.
# Aegis sees only the outgoing kubectl command string, not the Kubernetes admission oldObject/newObject
# diff. As a result, this policy and prevent-label-key-removal share an identical CEL expression
# and cannot be distinguished at the command level. Both detect kubectl label/annotate operations
# targeting the foo key on nodes, but neither can verify whether it is a key removal vs value change.
# IMPORT_TODO: oldObject diff required for full semantic fidelity — kubectl pattern match only.
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-protect-node-label-foo-prevent-label-value-changes-node
    annotations:
        aegis.io/imported-from: aegis-import-3654250224.yaml
        aegis.io/severity: low
        kyverno.io/category: Sample
spec:
    description: 'Node labels are critical pieces of metadata upon which many other applications and logic may depend and should not be altered or removed by regular users. This policy prevents changes or deletions to a label called `foo` on cluster Nodes. Use of this policy requires removal of the Node resource filter in the Kyverno ConfigMap ([Node,*,*]). Due to Kubernetes CVE-2021-25735, this policy requires, at minimum, one of the following versions of Kubernetes: v1.18.18, v1.19.10, v1.20.6, or v1.21.0.'
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: 'tool == "Bash" && request.args.command.matches("(?i)kubectl.*(label|annotate).*node.*foo")'
          message: 'Changes to the node label foo are not allowed'
          action: DENY
    defaultAction: ALLOW
