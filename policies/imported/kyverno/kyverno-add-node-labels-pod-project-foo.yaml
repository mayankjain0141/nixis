spec:
    description: 'Containers running in Pods may sometimes need access to node-specific information on  which the Pod has been scheduled. A common use case is node topology labels to ensure  pods are spread across failure zones in racks or in the cloud. The mutate-pod-binding policy already does this for annotations, but it does not handle labels. A useful use case is for passing metric label information to ServiceMonitors and then into Prometheus. This policy watches for Pod binding events when the pod is scheduled and then  asynchronously mutates the existing Pod to add the labels. This policy requires the following changes to common default configurations: - The kyverno resourceFilter should not filter Pod/binding resources. - The kyverno backgroundController service account requires Update permission on pods.  It is recommended to use https://kubernetes.io/docs/reference/access-authn-authz/rbac/#aggregated-clusterroles '
    matchConstraints:
        tools: []
    validations:
        - expression: 'false'
          message: 'Mutate rule (node topology labels on pods) — Nixis cannot mutate requests; verify pods requiring node topology labels access them via the downward API'
          action: AUDIT
    defaultAction: ALLOW
