# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-volume-types-restricted-volumes-pod
    annotations:
        aegis.io/imported-from: aegis-import-3246731885.yaml
        aegis.io/severity: medium
        kyverno.io/category: Pod Security Standards (Restricted) in CEL
spec:
    description: In addition to restricting HostPath volumes, the restricted pod security profile limits usage of non-core volume types to those defined through PersistentVolumes. This policy blocks any other type of volume other than those in the allow list.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("volumes:") && (request.args.content.contains("hostPath:") || request.args.content.contains("gcePersistentDisk:") || request.args.content.contains("awsElasticBlockStore:") || request.args.content.contains("gitRepo:") || request.args.content.contains("nfs:") || request.args.content.contains("iscsi:") || request.args.content.contains("glusterfs:") || request.args.content.contains("rbd:") || request.args.content.contains("flexVolume:") || request.args.content.contains("cinder:") || request.args.content.contains("cephfs:") || request.args.content.contains("flocker:") || request.args.content.contains("fc:") || request.args.content.contains("azureFile:") || request.args.content.contains("azureDisk:") || request.args.content.contains("vsphereVolume:") || request.args.content.contains("quobyte:") || request.args.content.contains("portworxVolume:") || request.args.content.contains("storageos:"))'
          message: 'Pod volumes must only use allowed types (configMap, csi, downwardAPI, emptyDir, ephemeral, persistentVolumeClaim, projected, secret)'
          action: DENY
    defaultAction: ALLOW
