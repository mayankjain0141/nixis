# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-disallow-host-path-host-path-pod
    annotations:
        aegis.io/imported-from: aegis-import-2704842723.yaml
        aegis.io/severity: medium
        kyverno.io/category: Pod Security Standards (Baseline)
spec:
    description: HostPath volumes let Pods use host directories and volumes in containers. Using host resources can be used to access shared data or escalate privileges and should not be allowed. This policy ensures no hostPath volumes are in use.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\.(yaml|yml|json)$") && request.args.content.contains("hostPath:")'
          message: HostPath volumes are forbidden. The field spec.volumes[*].hostPath must be unset.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
