# IMPORT_REVIEW: translated by Claude — verify semantics
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-add-labels-add-labels
    annotations:
        aegis.io/imported-from: aegis-import-2637384430.yaml
        aegis.io/severity: medium
        aegis.io/llm-confidence: medium
        kyverno.io/category: Sample
spec:
    description: Labels are used as an important source of metadata describing objects in various ways or triggering other functionality. Labels are also a very basic concept and should be used throughout Kubernetes. This policy performs a simple mutation which adds a label `foo=bar` to Pods, Services, ConfigMaps, and Secrets.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && (request.args.content.contains("kind: Pod") || request.args.content.contains("kind: Service") || request.args.content.contains("kind: ConfigMap") || request.args.content.contains("kind: Secret")) && !request.args.content.contains("foo: bar")'
          message: 'Manifest is missing required label foo=bar — add it under metadata.labels before applying'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
