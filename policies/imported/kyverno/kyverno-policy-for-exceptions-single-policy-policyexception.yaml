# IMPORT_REVIEW: translated by Claude — detects PolicyException with multiple policyNames entries via regex; exact list-length semantics for non-YAML-literal forms require Kyverno
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-policy-for-exceptions-single-policy-policyexception
    annotations:
        aegis.io/imported-from: aegis-import-641170263.yaml
        aegis.io/severity: low
        aegis.io/llm-confidence: medium
        kyverno.io/category: Sample
spec:
    description: A PolicyException grants the applicable resource(s) or subject(s) the ability to bypass an existing Kyverno policy. Care should be taken to ensure that the allowed PolicyExceptions are scoped fine enough and according to your organization's operation. This is a Kyverno policy intended to provide guardrails for Kyverno PolicyExceptions and contains a number of rules which may help with these scoping best practices. These rules may be changed/removed depending on the exception practices to be implemented.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: PolicyException") && request.args.content.matches("(?s).*policyNames:\\s*\n(\\s+-\\s+\\S+\\s*\n){2,}.*")'
          message: 'PolicyException references more than one policy in policyNames — each PolicyException must target exactly one policy'
          action: DENY
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: PolicyException")'
          message: 'PolicyException detected — verify that policyNames contains exactly one entry'
          action: AUDIT
    defaultAction: ALLOW
