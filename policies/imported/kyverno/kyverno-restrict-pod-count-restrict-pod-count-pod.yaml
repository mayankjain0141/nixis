# IMPORT_TODO: JMESPath conditions in restrict-pod-count/restrict-pod-count could not be translated — kubectl pattern match generated as base condition only
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-pod-count-restrict-pod-count-pod
    annotations:
        aegis.io/imported-from: aegis-import-80099680.yaml
        aegis.io/severity: medium
        kyverno.io/category: Sample
spec:
    description: Sometimes Kubernetes Nodes may have a maximum number of Pods they can accommodate due to resources outside CPU and memory such as licensing, or in some development cases. This policy restricts Pod count on a Node named `minikube` to be no more than 10.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Pod")'
          message: 'AUDIT: Pod count per node cannot be enforced inline — validate node capacity out of band'
          action: AUDIT
    defaultAction: ALLOW
