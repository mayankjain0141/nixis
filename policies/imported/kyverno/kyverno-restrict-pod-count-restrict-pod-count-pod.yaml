apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-pod-count-restrict-pod-count-pod
    annotations:
        nixis.io/imported-from: nixis-import-80099680.yaml
        nixis.io/severity: medium
        kyverno.io/category: Sample
spec:
    description: Sometimes Kubernetes Nodes may have a maximum number of Pods they can accommodate due to resources outside CPU and memory such as licensing, or in some development cases. This policy restricts Pod count on a Node named `minikube` to be no more than 10.
    matchConstraints:
        tools:
            - Write
            - Edit
            - Bash
    validations:
        - expression: 'tool == "Bash" && request.args.command.matches(".*kubectl\\s+(apply|create).*") && request.args.command.contains("kind: Pod")'
          message: 'AUDIT: Pod count per node cannot be enforced inline — validate node capacity out of band before applying'
          action: AUDIT
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Pod")'
          message: 'AUDIT: Pod count per node cannot be enforced inline — validate node capacity out of band before applying'
          action: AUDIT
    defaultAction: ALLOW
