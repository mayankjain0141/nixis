apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-add-default-resources-add-default-requests
    annotations:
        aegis.io/imported-from: aegis-import-76099271.yaml
        aegis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: Pods which don't specify at least resource requests are assigned a QoS class of BestEffort which can hog resources for other Pods on Nodes. At a minimum, all Pods should specify resource requests in order to be labeled as the QoS class Burstable. This sample mutates any container in a Pod which doesn't specify memory or cpu requests to apply some sane defaults.
    matchConstraints:
        tools: []
    validations:
        - expression: "false"
          message: 'IMPORT_TODO: mutate rule — Aegis does not mutate requests — manual review required'
          action: AUDIT
    defaultAction: ALLOW
