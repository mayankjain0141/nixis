# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-add-default-resources-add-default-requests
    annotations:
        aegis.io/imported-from: aegis-import-2343834207.yaml
        aegis.io/severity: medium
        aegis.io/llm-confidence: medium
        kyverno.io/category: Other
spec:
    description: Pods which don't specify at least resource requests are assigned a QoS class of BestEffort which can hog resources for other Pods on Nodes. At a minimum, all Pods should specify resource requests in order to be labeled as the QoS class Burstable. This sample mutates any container in a Pod which doesn't specify memory or cpu requests to apply some sane defaults.
    matchConstraints:
        tools: []
    validations:
        - expression: 'false'
          message: 'Mutate rule (default resource requests) — Aegis cannot mutate requests; verify all pods specify resource requests to avoid BestEffort QoS class'
          action: AUDIT
    defaultAction: ALLOW
