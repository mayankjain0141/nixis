# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-drop-all-capabilities-require-drop-all-pod
    annotations:
        aegis.io/imported-from: aegis-import-4089659901.yaml
        aegis.io/severity: medium
        kyverno.io/category: Best Practices
spec:
    description: 'Capabilities permit privileged actions without giving full root access. All capabilities should be dropped from a Pod, with only those required added back. This policy ensures that all containers explicitly specify the `drop: ["ALL"]` ability. Note that this policy also illustrates how to cover drop entries in any case although this may not strictly conform to the Pod Security Standards.'
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*(delete\\s+pod|exec|run)")
          message: Containers must drop `ALL` capabilities.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
