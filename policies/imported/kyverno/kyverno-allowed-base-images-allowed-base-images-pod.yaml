# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-allowed-base-images-allowed-base-images-pod
    annotations:
        nixis.io/imported-from: nixis-import-75841845.yaml
        nixis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: Building images which specify a base as their origin is a good start to improving supply chain security, but over time organizations may want to build an allow list of specific base images which are allowed to be used when constructing containers. This policy ensures that a container's base, found in an OCI annotation, is in a cluster-wide allow list.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.matches(".*image:\\s+.*") && !request.args.content.matches(".*image:\\s+(gcr\\.io/company|company\\.registry\\.io).*")'
          message: This container image's base is not in the approved list. Only pre-approved base images may be used. Please contact the platform team for assistance.
          action: DENY
    defaultAction: ALLOW
