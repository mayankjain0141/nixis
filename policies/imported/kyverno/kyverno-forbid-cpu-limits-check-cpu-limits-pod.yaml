# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-forbid-cpu-limits-check-cpu-limits-pod
    annotations:
        nixis.io/imported-from: nixis-import-1753395656.yaml
        nixis.io/severity: low
        kyverno.io/category: Other
spec:
    description: Setting of CPU limits is a debatable poor practice as it can result, when defined, in potentially starving applications of much-needed CPU cycles even when they are available. Ensuring that CPU limits are not set may ensure apps run more effectively. This policy forbids any container in a Pod from defining CPU limits.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("resources:") && request.args.content.matches("(?s).*limits:.*cpu:.*")'
          message: 'Containers must not define CPU limits'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
