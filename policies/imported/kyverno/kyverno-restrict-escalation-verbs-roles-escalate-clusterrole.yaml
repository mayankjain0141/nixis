# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-escalation-verbs-roles-escalate-clusterrole
    annotations:
        nixis.io/imported-from: nixis-import-536854216.yaml
        nixis.io/severity: medium
        kyverno.io/category: Security
spec:
    description: The verbs `impersonate`, `bind`, and `escalate` may all potentially lead to privilege escalation and should be tightly controlled. This policy prevents use of these verbs in Role or ClusterRole resources.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && (request.args.content.contains("escalate") || request.args.content.contains("impersonate") || request.args.content.contains("bind")) && request.args.content.contains("verbs:")'
          message: 'Roles must not grant escalate, impersonate, or bind verbs'
          action: DENY
    defaultAction: ALLOW
