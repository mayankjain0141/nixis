# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-escalation-verbs-roles-escalate-clusterrole
    annotations:
        aegis.io/imported-from: aegis-import-536854216.yaml
        aegis.io/severity: medium
        kyverno.io/category: Security
spec:
    description: The verbs `impersonate`, `bind`, and `escalate` may all potentially lead to privilege escalation and should be tightly controlled. This policy prevents use of these verbs in Role or ClusterRole resources.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && (request.args.content.contains("escalate") || request.args.content.contains("bind"))'
          message: 'Roles must not grant bind or escalate verbs'
          action: DENY
    defaultAction: ALLOW
