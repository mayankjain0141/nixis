apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-wildcard-verbs-wildcard-verbs-clusterrole
    annotations:
        nixis.io/imported-from: nixis-import-3555697893.yaml
        nixis.io/severity: medium
        kyverno.io/category: Security, EKS Best Practices
spec:
    description: Wildcards ('*') in verbs grants all access to the resources referenced by it and does not follow the principal of least privilege. As much as possible, avoid such open verbs unless scoped to perhaps a custom API group. This policy blocks any Role or ClusterRole that contains a wildcard entry in the verbs list found in any rule.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: ClusterRole") && (request.args.content.contains("- \"*\"") || request.args.content.contains("- ''*''") || request.args.content.contains("- *"))'
          message: 'ClusterRoles must not use wildcard (*) verbs — grant only the specific verbs needed'
          action: DENY
    defaultAction: ALLOW
