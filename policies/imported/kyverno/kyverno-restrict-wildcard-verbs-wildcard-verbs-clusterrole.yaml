# IMPORT_TODO: JMESPath conditions in restrict-wildcard-verbs/wildcard-verbs could not be translated — kubectl pattern match generated as base condition only
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-wildcard-verbs-wildcard-verbs-clusterrole
    annotations:
        aegis.io/imported-from: aegis-import-3055280821.yaml
        aegis.io/severity: medium
        kyverno.io/category: Security, EKS Best Practices
spec:
    description: Wildcards ('*') in verbs grants all access to the resources referenced by it and does not follow the principal of least privilege. As much as possible, avoid such open verbs unless scoped to perhaps a custom API group. This policy blocks any Role or ClusterRole that contains a wildcard entry in the verbs list found in any rule.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*(create\s+clusterrole|delete\s+clusterrole)")
          message: Use of a wildcard ('*') in any verbs is forbidden.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
