# IMPORT_TODO: JMESPath conditions in ingress-host-match-tls/host-match-tls could not be translated — kubectl pattern match generated as base condition only
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-ingress-host-match-tls-host-match-tls-ingress
    annotations:
        aegis.io/imported-from: aegis-import-874493319.yaml
        aegis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: Ingress resources which name a host name that is not present in the TLS section can produce ingress routing failures as a TLS certificate may not correspond to the destination host. This policy ensures that the host name in an Ingress rule is also found in the list of TLS hosts.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*")
          message: The host(s) in spec.rules[].host must match those in spec.tls[].hosts[].
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
