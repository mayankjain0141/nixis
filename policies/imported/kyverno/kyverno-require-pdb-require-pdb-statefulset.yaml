# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-require-pdb-require-pdb-statefulset
    annotations:
        aegis.io/imported-from: aegis-import-1992861709.yaml
        aegis.io/severity: low
        kyverno.io/category: Sample, EKS Best Practices
spec:
    description: 'PodDisruptionBudget resources are useful to ensuring minimum availability is maintained at all times. This policy checks all incoming Deployments and StatefulSets to ensure they have a matching, preexisting PodDisruptionBudget. Note: This policy must be run in `enforce` mode to ensure accuracy.'
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$")'
          message: 'Policy validation required — review manifest before applying'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
