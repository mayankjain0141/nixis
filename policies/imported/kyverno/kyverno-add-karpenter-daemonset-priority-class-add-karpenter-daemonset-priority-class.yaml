# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-add-karpenter-daemonset-priority-class-add-karpenter-daemonset-priority-class
    annotations:
        nixis.io/imported-from: nixis-import-3063636071.yaml
        nixis.io/severity: medium
        nixis.io/llm-confidence: medium
        kyverno.io/category: Karpenter
spec:
    description: When a DaemonSet is added to a cluster every node will get a new pod. There may not be  enough room for this on every node. Karpenter cannot provision extra nodes just for the  DaemonSet because the new pods are not scheduled the way regular pods are. It would require parallel scheduling logic that is not proper to Kubernetes. Therefore, eviction of regular  pods should happen instead. This can be achieved with the priority class system-node-critical.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: DaemonSet") && !request.args.content.contains("priorityClassName: system-node-critical")'
          message: 'DaemonSet manifest is missing priorityClassName: system-node-critical — required for Karpenter node provisioning correctness'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
