# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-require-ingress-https-has-annotation-ingress
    annotations:
        nixis.io/imported-from: nixis-import-4272845450.yaml
        nixis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: Ingress resources should only allow secure traffic by disabling HTTP and therefore only allowing HTTPS. This policy requires that all Ingress resources set the annotation `kubernetes.io/ingress.allow-http` to `"false"` and specify TLS in the spec.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Ingress") && !request.args.content.contains("allow-http: \"false\"")'
          message: 'Ingress must set the annotation kubernetes.io/ingress.allow-http to "false"'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
