# IMPORT_TODO: JMESPath conditions in protect-node-taints/protect-node-taints could not be translated — kubectl pattern match generated as base condition only
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-protect-node-taints-protect-node-taints-node
    annotations:
        aegis.io/imported-from: aegis-import-3280031117.yaml
        aegis.io/severity: low
        kyverno.io/category: Other
spec:
    description: 'Node taints are often used as a control in multi-tenant use cases. If users can alter them, they may be able to affect scheduling of Pods which may impact other workloads. This sample prohibits altering of node taints unless by a user holding the `cluster-admin` ClusterRole. Use of this policy requires removal of the Node resource filter in the Kyverno ConfigMap ([Node,*,*]). Due to Kubernetes CVE-2021-25735, this policy requires, at minimum, one of the following versions of Kubernetes: v1.18.18, v1.19.10, v1.20.6, or v1.21.0.'
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*(drain|cordon|delete\\s+node)")
          message: Node taints may not be altered.
          action: DENY
    defaultAction: ALLOW
