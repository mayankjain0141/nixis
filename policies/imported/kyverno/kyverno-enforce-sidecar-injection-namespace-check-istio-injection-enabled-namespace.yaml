# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-enforce-sidecar-injection-namespace-check-istio-injection-enabled-namespace
    annotations:
        aegis.io/imported-from: aegis-import-3921360491.yaml
        aegis.io/severity: medium
        kyverno.io/category: Istio
spec:
    description: In order for Istio to inject sidecars to workloads deployed into Namespaces, the label `istio-injection` must be set to `enabled`. This policy ensures that all new Namespaces set `istio-inject` to `enabled`.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Namespace") && !request.args.content.matches("(?s).*istio-injection.*enabled.*")'
          message: 'Namespaces must set istio-injection: enabled for sidecar injection'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
