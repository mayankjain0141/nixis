# CEL_LIMITATION: original iterates spec.volumes[*].secret.secretName per-entry via
# JMESPath. CEL approximation: file-level check — fires when "secret:" (volume type)
# is present AND "secretName: safe-" does not appear. Gap: volumes using secretName
# but the YAML indents "secretName:" under "secret:" — "secretName: safe-" is a
# reliable match for the allowed case since secretName is the only field under a
# secret volume. Also fires on files using "secret:" as a YAML value (not a volume
# type key) — e.g. a comment or string value containing "secret:". Conservative.
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-secrets-by-name-safe-secrets-from-volumes-pod
    annotations:
        aegis.io/imported-from: aegis-import-3137135235.yaml
        aegis.io/severity: low
        kyverno.io/category: Other
spec:
    description: Secrets often contain sensitive information and their access should be carefully controlled. Although Kubernetes RBAC can be effective at restricting them in several ways, it lacks the ability to use wildcards in resource names. This policy ensures that only Secrets beginning with the name `safe-` can be consumed by Pods. In order to work effectively, this policy needs to be paired with a separate policy or rule to require `automountServiceAccountToken=false` since this would otherwise result in a Secret being mounted.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("secret:") && request.args.content.contains("secretName:") && !request.args.content.contains("secretName: safe-")'
          message: 'Secrets mounted as volumes must have names beginning with safe-'
          action: DENY
    defaultAction: ALLOW
