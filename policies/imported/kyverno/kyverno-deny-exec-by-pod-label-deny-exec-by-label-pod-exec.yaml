# IMPORT_TODO: JMESPath conditions in deny-exec-by-pod-label/deny-exec-by-label could not be translated — kubectl pattern match generated as base condition only
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-deny-exec-by-pod-label-deny-exec-by-label-pod-exec
    annotations:
        aegis.io/imported-from: aegis-import-3571715604.yaml
        aegis.io/severity: low
        kyverno.io/category: Sample
spec:
    description: The `exec` command may be used to gain shell access, or run other commands, in a Pod's container. While this can be useful for troubleshooting purposes, it could represent an attack vector and is discouraged. This policy blocks Pod exec commands to Pods having the label `exec=false`.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*")
          message: Exec'ing into Pods protected with the label `exec=false` is forbidden.
          action: DENY
    defaultAction: ALLOW
