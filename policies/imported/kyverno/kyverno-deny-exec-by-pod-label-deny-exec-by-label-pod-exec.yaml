# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-deny-exec-by-pod-label-deny-exec-by-label-pod-exec
    annotations:
        aegis.io/imported-from: aegis-import-2502701633.yaml
        aegis.io/severity: low
        kyverno.io/category: Sample
spec:
    description: The `exec` command may be used to gain shell access, or run other commands, in a Pod's container. While this can be useful for troubleshooting purposes, it could represent an attack vector and is discouraged. This policy blocks Pod exec commands to Pods having the label `exec=false`.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: 'tool == "Bash" && request.args.command.matches(".*kubectl\\s+exec.*")'
          message: Exec'ing into Pods is restricted — Pod labels cannot be verified at request time; all kubectl exec commands require review.
          action: AUDIT
    defaultAction: ALLOW
