# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-podsecurity-subrule-restricted-capabilities-restricted-exempt-capabilities-pod
    annotations:
        aegis.io/imported-from: aegis-import-1594199302.yaml
        aegis.io/severity: medium
        kyverno.io/category: Pod Security
spec:
    description: The restricted profile of the Pod Security Standards, which is inclusive of the baseline profile, is a collection of all the most common configurations that can be taken to secure Pods. Beginning with Kyverno 1.8, an entire profile may be assigned to the cluster through a single rule. In some cases, specific exemptions must be made on a per-control basis. This policy configures the restricted profile through the latest version of the Pod Security Standards cluster wide while exempting `nginx` and `redis` container images from the Capabilities control check.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Pod") && (request.args.content.contains("privileged: true") || request.args.content.contains("hostPID: true") || request.args.content.contains("hostIPC: true") || request.args.content.contains("hostNetwork: true") || request.args.content.contains("allowPrivilegeEscalation: true"))'
          message: 'Pod violates restricted Pod Security Standards profile (privileged, host namespaces, or allowPrivilegeEscalation not allowed)'
          action: DENY
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Pod") && request.args.content.contains("capabilities:") && !request.args.content.matches(".*image:\\s*(nginx|redis).*")'
          message: 'Pod capabilities must comply with restricted profile (exemptions: nginx and redis images)'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
