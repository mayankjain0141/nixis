apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-require-reasonable-pdbs-require-reasonable-pdb-percentage-poddisruptionbudget
    annotations:
        nixis.io/imported-from: nixis-import-162133070.yaml
        nixis.io/severity: low
        kyverno.io/category: Other
spec:
    description: PodDisruptionBudget resources are useful to ensuring minimum availability is maintained at all times. Achieving a balance between availability and maintainability is important. This policy validates that a PodDisruptionBudget, specified as percentages, allows 50% of the replicas to be out of service in that minAvailable should be no higher than 50% and maxUnavailable should be no lower than 50%.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: PodDisruptionBudget") && (request.args.content.contains("minAvailable: 0%") || request.args.content.contains("minAvailable: \"0%\"") || request.args.content.contains("minAvailable: ''0%''"))'
          message: 'PodDisruptionBudget minAvailable must not be 0% — this allows all pods to be disrupted simultaneously'
          action: DENY
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: PodDisruptionBudget") && (request.args.content.contains("maxUnavailable: 100%") || request.args.content.contains("maxUnavailable: \"100%\"") || request.args.content.contains("maxUnavailable: ''100%''"))'
          message: 'PodDisruptionBudget maxUnavailable must not be 100% — this allows all pods to be disrupted simultaneously'
          action: DENY
    defaultAction: ALLOW
