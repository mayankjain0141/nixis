# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-disallow-capabilities-strict-require-drop-all-pod
    annotations:
        aegis.io/imported-from: aegis-import-3196821695.yaml
        aegis.io/severity: medium
        kyverno.io/category: Pod Security Standards (Restricted)
spec:
    description: Adding capabilities other than `NET_BIND_SERVICE` is disallowed. In addition, all containers must explicitly drop `ALL` capabilities.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\.(yaml|yml|json)$") && !request.args.content.contains("drop:") || !request.args.content.contains("ALL")'
          message: Containers must drop `ALL` capabilities.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
