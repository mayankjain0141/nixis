# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-ingress-classes-validate-ingress-ingress
    annotations:
        nixis.io/imported-from: nixis-import-2914906484.yaml
        nixis.io/severity: medium
        kyverno.io/category: Sample
spec:
    description: Ingress classes should only be allowed which match up to deployed Ingress controllers in the cluster. Allowing users to define classes which cannot be satisfied by a deployed Ingress controller can result in either no or undesired functionality. This policy checks Ingress resources and only allows those which define `HAProxy` or `nginx` in the respective annotation. This annotation has largely been replaced as of Kubernetes 1.18 with the IngressClass resource.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && (request.args.content.contains("ingressClassName:") || request.args.content.contains("kubernetes.io/ingress.class")) && !(request.args.content.contains("ingressClassName: nginx") || request.args.content.contains("kubernetes.io/ingress.class: nginx"))'
          message: 'Ingress must use an approved IngressClass (nginx) — other classes are not permitted'
          action: DENY
    defaultAction: ALLOW
