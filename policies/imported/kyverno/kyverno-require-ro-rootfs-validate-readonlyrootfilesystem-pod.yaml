# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-require-ro-rootfs-validate-readonlyrootfilesystem-pod
    annotations:
        nixis.io/imported-from: nixis-import-1073302224.yaml
        nixis.io/severity: medium
        kyverno.io/category: Best Practices, EKS Best Practices, PSP Migration
spec:
    description: 'A read-only root file system helps to enforce an immutable infrastructure strategy; the container only needs to write on the mounted volume that persists the state. An immutable root filesystem can also prevent malicious binaries from writing to the host system. This policy validates that containers define a securityContext with `readOnlyRootFilesystem: true`.'
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("containers:") && !request.args.content.contains("readOnlyRootFilesystem: true")'
          message: 'Containers must set securityContext.readOnlyRootFilesystem: true'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
