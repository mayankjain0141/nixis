# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-require-ro-rootfs-validate-readonlyrootfilesystem-pod
    annotations:
        aegis.io/imported-from: aegis-import-1073302224.yaml
        aegis.io/severity: medium
        kyverno.io/category: Best Practices, EKS Best Practices, PSP Migration
spec:
    description: 'A read-only root file system helps to enforce an immutable infrastructure strategy; the container only needs to write on the mounted volume that persists the state. An immutable root filesystem can also prevent malicious binaries from writing to the host system. This policy validates that containers define a securityContext with `readOnlyRootFilesystem: true`.'
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*(delete\\s+pod|exec|run)")
          message: Root filesystem must be read-only.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
