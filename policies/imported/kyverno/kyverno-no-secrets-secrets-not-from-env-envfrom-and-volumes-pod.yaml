# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-no-secrets-secrets-not-from-env-envfrom-and-volumes-pod
    annotations:
        aegis.io/imported-from: aegis-import-2999246393.yaml
        aegis.io/severity: medium
        kyverno.io/category: Other in CEL
spec:
    description: Secrets often contain sensitive information which not all Pods need consume. This policy disables the use of all Secrets in a Pod definition. In order to work effectively, this Policy needs a separate Policy or rule to require `automountServiceAccountToken=false` at the Pod level or ServiceAccount level since this would otherwise result in a Secret being mounted.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && (request.args.content.contains("secretKeyRef:") || request.args.content.contains("secretRef:") || request.args.content.contains("secretName:"))'
          message: 'Pods must not consume Secrets via env vars, envFrom, or volumes'
          action: DENY
    defaultAction: ALLOW
