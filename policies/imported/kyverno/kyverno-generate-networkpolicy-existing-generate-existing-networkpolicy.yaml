# imported from: policies via aegis policy import
# Gap: cross-resource check (does a NetworkPolicy exist for this namespace?) cannot be
# expressed in CEL file-content matching — always AUDIT for manual review.
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-generate-networkpolicy-existing-generate-existing-networkpolicy
    annotations:
        aegis.io/imported-from: aegis-import-827739225.yaml
        aegis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: A NetworkPolicy is often a critical piece when provisioning new Namespaces, but there may be existing Namespaces which also need the same resource. Creating each one individually or manipulating each Namespace in order to trigger creation is additional overhead. This policy creates a new NetworkPolicy for existing Namespaces which results in a default deny behavior and labels it with created-by=kyverno.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Namespace")'
          message: 'Namespace detected — verify a default-deny NetworkPolicy exists for this namespace'
          action: AUDIT
    defaultAction: ALLOW
