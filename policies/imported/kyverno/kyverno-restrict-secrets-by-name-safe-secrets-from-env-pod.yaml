# CEL_LIMITATION: original iterates spec.containers[*].env[*].valueFrom.secretKeyRef.name
# per-entry via JMESPath. CEL approximation: file-level check — fires when secretKeyRef:
# is present AND "name: safe-" does not appear anywhere in the file. Gap: mixed files
# containing both safe- and non-safe- secretKeyRefs will pass (false-negative) because
# "name: safe-" is present. Also "name: safe-" from an unrelated field (e.g. a container
# name) could suppress the check (false-negative). Kept as DENY: over-triggering on
# files with no safe- secrets is conservative.
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-secrets-by-name-safe-secrets-from-env-pod
    annotations:
        aegis.io/imported-from: aegis-import-3137135235.yaml
        aegis.io/severity: low
        kyverno.io/category: Other
spec:
    description: Secrets often contain sensitive information and their access should be carefully controlled. Although Kubernetes RBAC can be effective at restricting them in several ways, it lacks the ability to use wildcards in resource names. This policy ensures that only Secrets beginning with the name `safe-` can be consumed by Pods. In order to work effectively, this policy needs to be paired with a separate policy or rule to require `automountServiceAccountToken=false` since this would otherwise result in a Secret being mounted.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("secretKeyRef:") && !request.args.content.contains("name: safe-")'
          message: 'Secrets consumed via env vars must have names beginning with safe-'
          action: DENY
    defaultAction: ALLOW
