# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-jobs-restrict-job-from-cronjob-job
    annotations:
        nixis.io/imported-from: nixis-import-804955016.yaml
        nixis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: Jobs can be created directly and indirectly via a CronJob controller. In some cases, users may want to only allow Jobs if they are created via a CronJob. This policy restricts Jobs so they may only be created by a CronJob.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Job") && !request.args.content.contains("ownerReferences")'
          message: 'Jobs must be created by a CronJob controller — direct Job creation is not permitted'
          action: DENY
    defaultAction: ALLOW
