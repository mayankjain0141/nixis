# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-check-sa-check-sa-pod
    annotations:
        aegis.io/imported-from: aegis-import-148468191.yaml
        aegis.io/severity: low
        kyverno.io/category: Sample
spec:
    description: ServiceAccounts with privileges to create Pods may be able to do so and name a ServiceAccount other than the one used to create it. This policy checks the Pod, if created by a ServiceAccount, and ensures the `serviceAccountName` field matches the actual ServiceAccount.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("serviceAccountName:") && request.args.content.contains("default")'
          message: The ServiceAccount used to create this Pod is confined to using the same account when running the Pod.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
