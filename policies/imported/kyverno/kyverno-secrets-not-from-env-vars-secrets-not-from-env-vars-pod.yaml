# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-secrets-not-from-env-vars-secrets-not-from-env-vars-pod
    annotations:
        aegis.io/imported-from: aegis-import-2768528345.yaml
        aegis.io/severity: medium
        kyverno.io/category: Sample, EKS Best Practices
spec:
    description: Secrets used as environment variables containing sensitive information may, if not carefully controlled,  be printed in log output which could be visible to unauthorized people and captured in forwarding applications. This policy disallows using Secrets as environment variables.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*(delete\\s+pod|exec|run)")
          message: Secrets must be mounted as volumes, not as environment variables.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
