# IMPORT_TODO: JMESPath ConfigMap context lookup (namespace allowlist) cannot be translated to CEL — expression is best-effort content check only
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-exclude-namespaces-example-exclude-namespaces-dynamically-daemonset
    annotations:
        aegis.io/imported-from: aegis-import-1305823430.yaml
        aegis.io/severity: medium
        kyverno.io/category: Sample
spec:
    description: It's common where policy lookups need to consider a mapping to many possible values rather than a static mapping. This is a sample which demonstrates how to dynamically look up an allow list of Namespaces from a ConfigMap where the ConfigMap stores an array of strings. This policy validates that any Pods created outside of the list of Namespaces have the label `foo` applied.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && !request.args.content.contains("foo:")'
          message: 'Resources outside allowed namespaces must have the label foo — ConfigMap namespace allowlist lookup not available in CEL translation'
          action: AUDIT
    defaultAction: ALLOW
