# AUDIT_ONLY: CEL cannot count list items in YAML string content — cannot enforce dnsNames count limit. Flags all Certificate writes for manual review.
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-cert-manager-limit-dnsnames-limit-dnsnames-certificate
    annotations:
        aegis.io/imported-from: aegis-import-3623682750.yaml
        aegis.io/severity: medium
        kyverno.io/category: Cert-Manager
spec:
    description: Some applications will not accept certificates containing more than a single name. This policy ensures that each certificate request contains only one DNS name entry.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Certificate") && request.args.content.contains("dnsNames:")'
          message: 'AUDIT: Certificate with dnsNames detected — verify only one DNS name entry is present. Only one dnsNames entry is allowed per certificate request.'
          action: AUDIT
    defaultAction: ALLOW
