# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-verify-git-repositories-github-repositories-only-gitrepository
    annotations:
        nixis.io/imported-from: nixis-import-1976590291.yaml
        nixis.io/severity: medium
        kyverno.io/category: Flux
spec:
    description: Ensures that Git repositories used for Flux deployments in a cluster originate from a specific, trusted organization. Prevents the use of untrusted or potentially risky Git repositories. Protects the integrity and security of Flux deployments.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: GitRepository") && !request.args.content.contains("github.com")'
          message: 'GitRepository sources must use github.com as the URL host'
          action: DENY
    defaultAction: ALLOW
