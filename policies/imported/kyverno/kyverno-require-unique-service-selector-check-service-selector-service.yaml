# IMPORT_TODO: JMESPath conditions in require-unique-service-selector/check-service-selector could not be translated — kubectl pattern match generated as base condition only
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-require-unique-service-selector-check-service-selector-service
    annotations:
        aegis.io/imported-from: aegis-import-263464822.yaml
        aegis.io/severity: low
        kyverno.io/category: Other
spec:
    description: Services select eligible Pods by way of label matches. Having multiple Service apply based on same labels can cause conflicts and have unintended consequences. This policy ensures that within the same Namespace a Service has a unique set of labels as a selector.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Service")'
          message: 'Service selectors must be unique within a namespace — cross-resource uniqueness cannot be verified from the manifest alone; verify manually'
          action: AUDIT
    defaultAction: ALLOW
