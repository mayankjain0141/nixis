# imported from: policies via aegis policy import
# Gap: fluxcd allowlist — CEL approximates by flagging manifests that have annotations: block but no fluxcd.io/ key present; manifests with mixed fluxcd + other keys pass undetected
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-allowed-annotations-allowed-fluxcd-annotations-pod
    annotations:
        aegis.io/imported-from: aegis-import-3392744354.yaml
        aegis.io/severity: medium
        kyverno.io/category: Other in CEL
spec:
    description: Rather than creating a deny list of annotations, it may be more useful to invert that list and create an allow list which then denies any others. This policy demonstrates how to allow two annotations with a specific key name of fluxcd.io/ while denying others that do not meet the pattern.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.matches("(?s).*annotations:.*") && !request.args.content.matches("(?s).*fluxcd\\.io/.*")'
          message: Only annotations with key prefix fluxcd.io/ are allowed. Remove or rename any other annotation keys.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
