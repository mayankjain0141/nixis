# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-certificatesigningrequests-update-prevention-clusterrole
    annotations:
        aegis.io/imported-from: aegis-import-restrict-csr-update.yaml
        aegis.io/severity: high
        kyverno.io/category: Security
spec:
    description: This policy prevents update operations on CertificateSigningRequests via kubectl. Updating CertificateSigningRequests can modify the conditions of pending certificate requests, potentially enabling privilege escalation.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: 'tool == "Bash" && request.args.command.matches(".*kubectl.*certificate.*")'
          message: 'kubectl certificate update operations are not permitted — manage CSRs through approved channels'
          action: DENY
    defaultAction: ALLOW
