# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-psp-restrict-adding-capabilities-allowed-capabilities-pod
    annotations:
        aegis.io/imported-from: aegis-import-3159963300.yaml
        aegis.io/severity: medium
        kyverno.io/category: PSP Migration
spec:
    description: Adding capabilities is a way for containers in a Pod to request higher levels of ability than those with which they may be provisioned. Many capabilities allow system-level control and should be prevented. Pod Security Policies (PSP) allowed a list of "good" capabilities to be added. This policy checks ephemeralContainers, initContainers, and containers to ensure the only capabilities that can be added are either NET_BIND_SERVICE or CAP_CHOWN.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*(delete\\s+pod|exec|run)")
          message: Any capabilities added other than NET_BIND_SERVICE or CAP_CHOWN are disallowed.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
