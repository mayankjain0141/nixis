# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-ingress-wildcard-block-ingress-wildcard-ingress
    annotations:
        nixis.io/imported-from: nixis-import-2618886480.yaml
        nixis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: Ingress hosts optionally accept a wildcard as an alternative to precise matching. In some cases, this may be too permissive as it would direct unintended traffic to the given Ingress resource. This policy enforces that any Ingress host does not contain a wildcard character.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && (request.args.content.matches(".*host:\\s*\\*.*") || request.args.content.matches(".*host:\\s*\"\\*\".*"))'
          message: 'Ingress hosts must not use wildcard (*) — specify an explicit hostname'
          action: DENY
    defaultAction: ALLOW
