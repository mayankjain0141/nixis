# IMPORT_TODO: JMESPath conditions in team-validate-ns-name/team-validate-ns-name could not be translated — kubectl pattern match generated as base condition only
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-team-validate-ns-name-team-validate-ns-name-projectrequest
    annotations:
        aegis.io/imported-from: aegis-import-2161341959.yaml
        aegis.io/severity: medium
        kyverno.io/category: OpenShift
spec:
    description: Naming patterns are commonplace in clusters where creation activities are granted to other users. In order to maintain organization, it is often such that patterns should be established for organizational consistency. This policy denies the creation of a Namespace if the name of the Namespace does not follow a specific naming defined by the cluster admins.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*")
          message: The only names approved for your Namespaces are the ones starting by {{request.userInfo.groups[?contains(@,':') == `false`]}}-*
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
