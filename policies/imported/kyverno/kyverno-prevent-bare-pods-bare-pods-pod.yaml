# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-prevent-bare-pods-bare-pods-pod
    annotations:
        aegis.io/imported-from: aegis-import-364138192.yaml
        aegis.io/severity: medium
        kyverno.io/category: Other, EKS Best Practices
spec:
    description: Pods not created by workload controllers such as Deployments have no self-healing or scaling abilities and are unsuitable for production. This policy prevents such "bare" Pods from being created unless they originate from a higher-level workload controller of some sort.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*(delete\s+pod|exec|run)")
          message: Bare Pods are not allowed. They must be created by Pod controllers.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
