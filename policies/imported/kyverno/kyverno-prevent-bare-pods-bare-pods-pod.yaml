# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-prevent-bare-pods-bare-pods-pod
    annotations:
        nixis.io/imported-from: nixis-import-3042388180.yaml
        nixis.io/severity: medium
        kyverno.io/category: Other, EKS Best Practices
spec:
    description: Pods not created by workload controllers such as Deployments have no self-healing or scaling abilities and are unsuitable for production. This policy prevents such "bare" Pods from being created unless they originate from a higher-level workload controller of some sort.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Pod") && !request.args.content.contains("ownerReferences:")'
          message: 'Bare Pods without an owner controller are not allowed in production'
          action: DENY
    defaultAction: ALLOW
