apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-service-account-validate-service-account-pod
    annotations:
        nixis.io/imported-from: nixis-import-2048743175.yaml
        nixis.io/severity: medium
        kyverno.io/category: Sample
spec:
    description: 'Users may be able to specify any ServiceAccount which exists in their Namespace without restrictions. Confining Pods to a list of authorized ServiceAccounts can be useful to ensure applications in those Pods do not have more privileges than they should. This policy verifies that in the `staging` Namespace the ServiceAccount being specified is matched based on the image and name of the container. For example: ''sa-name: ["registry/image-name"]'''
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Pod") && !request.args.content.contains("serviceAccountName:")'
          message: 'Pod does not specify a serviceAccountName — it will use the default service account which may have unintended privileges; specify an explicit, least-privilege service account'
          action: REQUIRE_APPROVAL
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Pod") && request.args.content.contains("serviceAccountName: default")'
          message: 'Pod explicitly uses the default service account — specify a dedicated, least-privilege service account instead'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
