# IMPORT_TODO: JMESPath conditions in restrict-service-account/validate-service-account could not be translated — kubectl pattern match generated as base condition only
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-service-account-validate-service-account-pod
    annotations:
        aegis.io/imported-from: aegis-import-2048743175.yaml
        aegis.io/severity: medium
        kyverno.io/category: Sample
spec:
    description: 'Users may be able to specify any ServiceAccount which exists in their Namespace without restrictions. Confining Pods to a list of authorized ServiceAccounts can be useful to ensure applications in those Pods do not have more privileges than they should. This policy verifies that in the `staging` Namespace the ServiceAccount being specified is matched based on the image and name of the container. For example: ''sa-name: ["registry/image-name"]'''
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$")'
          message: 'Policy validation required — review manifest before applying'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
