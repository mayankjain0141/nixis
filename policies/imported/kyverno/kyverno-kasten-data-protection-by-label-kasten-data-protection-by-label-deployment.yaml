# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-kasten-data-protection-by-label-kasten-data-protection-by-label-deployment
    annotations:
        aegis.io/imported-from: aegis-import-2214389866.yaml
        aegis.io/severity: low
        kyverno.io/category: Veeam Kasten
spec:
    description: Check the 'dataprotection' label for production Deployments and StatefulSet workloads. Use in combination with 'kasten-generate-example-backup-policy' policy to generate a Kasten policy for the workload namespace, if it doesn't already exist.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && (request.args.content.contains("kind: Deployment") || request.args.content.contains("kind: StatefulSet")) && request.args.content.contains("production") && !request.args.content.contains("dataprotection:")'
          message: 'Production Deployments and StatefulSets must have a dataprotection label'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
