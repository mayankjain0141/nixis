# imported from: policies via nixis policy import
# Gap: Kyverno checks via namespaceSelector whether the *namespace* carries environment=production,
# not the workload manifest itself. CEL cannot look up namespace labels at file-write time.
# Expression fires when the Deployment manifest carries the label inline — will miss workloads
# in production namespaces whose manifests do not repeat the environment label.
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-kasten-data-protection-by-label-kasten-data-protection-by-label-deployment
    annotations:
        nixis.io/imported-from: nixis-import-2214389866.yaml
        nixis.io/severity: low
        kyverno.io/category: Veeam Kasten
spec:
    description: Check the 'dataprotection' label for production Deployments and StatefulSet workloads. Use in combination with 'kasten-generate-example-backup-policy' policy to generate a Kasten policy for the workload namespace, if it doesn't already exist.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Deployment") && (request.args.content.contains("environment: production") || request.args.content.contains("env: production")) && !request.args.content.contains("dataprotection:")'
          message: 'Production Deployments must have a dataprotection label for Kasten backup'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
