# IMPORT_REVIEW: translated by Claude — verify semantics
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-verify-vpa-target-check-targetref-verticalpodautoscaler
    annotations:
        aegis.io/imported-from: aegis-import-13409531.yaml
        aegis.io/severity: medium
        aegis.io/llm-confidence: medium
        kyverno.io/category: Other
spec:
    description: VerticalPodAutoscaler (VPA) is useful to automatically adjust the resources assigned to Pods. It requires defining a specific target resource by kind and name. There are no built-in validation checks by the VPA controller to ensure that the target resource exists or that the target kind is specified correctly. This policy contains two rules, the first of which verifies that the kind is specified exactly as Deployment, StatefulSet, ReplicaSet, or DaemonSet, which helps avoid typos. The second rule verifies that the target resource exists before allowing the VPA to be created.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: VerticalPodAutoscaler") && request.args.content.contains("targetRef:") && !(request.args.content.contains("kind: Deployment") || request.args.content.contains("kind: StatefulSet") || request.args.content.contains("kind: ReplicaSet") || request.args.content.contains("kind: DaemonSet"))'
          message: 'VerticalPodAutoscaler targetRef.kind must be one of: Deployment, StatefulSet, ReplicaSet, DaemonSet'
          action: DENY
    defaultAction: ALLOW
