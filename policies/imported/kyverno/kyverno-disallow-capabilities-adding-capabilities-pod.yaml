# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-disallow-capabilities-adding-capabilities-pod
    annotations:
        nixis.io/imported-from: nixis-import-3070192384.yaml
        nixis.io/severity: medium
        kyverno.io/category: Pod Security Standards (Baseline) in CEL
spec:
    description: Adding capabilities beyond those listed in the policy must be disallowed.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("capabilities:") && request.args.content.contains("add:")'
          message: Adding capabilities beyond those listed in the policy must be disallowed.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
