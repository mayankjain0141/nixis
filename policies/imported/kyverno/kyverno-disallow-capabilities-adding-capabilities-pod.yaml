# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-disallow-capabilities-adding-capabilities-pod
    annotations:
        aegis.io/imported-from: aegis-import-3070192384.yaml
        aegis.io/severity: medium
        kyverno.io/category: Pod Security Standards (Baseline) in CEL
spec:
    description: Adding capabilities beyond those listed in the policy must be disallowed.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("add:")'
          message: Adding capabilities beyond those listed in the policy must be disallowed.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
