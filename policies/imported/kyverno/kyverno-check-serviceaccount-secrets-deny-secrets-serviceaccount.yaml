# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-check-serviceaccount-secrets-deny-secrets-serviceaccount
    annotations:
        aegis.io/imported-from: aegis-import-4204907629.yaml
        aegis.io/severity: medium
        kyverno.io/category: Security
spec:
    description: Before version 1.24, Kubernetes automatically generated Secret-based tokens  for ServiceAccounts. To distinguish between automatically generated tokens  and manually created ones, Kubernetes checks for a reference from the  ServiceAccount's secrets field. If the Secret is referenced in the secrets  field, it is considered an auto-generated legacy token. These legacy Tokens can be of security concern and should be audited.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: ServiceAccount") && request.args.content.contains("secrets:")'
          message: Long-lived API tokens are not allowed.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
