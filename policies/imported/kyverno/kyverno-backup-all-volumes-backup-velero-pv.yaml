apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-backup-all-volumes-backup-velero-pv
    annotations:
        nixis.io/imported-from: nixis-import-1637635188.yaml
        nixis.io/severity: medium
        nixis.io/llm-confidence: medium
        kyverno.io/category: Velero
spec:
    description: In order for Velero to backup volumes in a Pod using an opt-in approach, it requires an annotation on the Pod called `backup.velero.io/backup-volumes` with the value being a comma-separated list of the volumes mounted to that Pod. This policy automatically annotates Pods (and Pod controllers) which refer to a PVC so that all volumes are listed in the aforementioned annotation if a Namespace with the label `velero-backup-pvc=true`.
    matchConstraints:
        tools: []
    validations:
        - expression: 'false'
          message: 'Mutate rule (Velero backup annotation) — Nixis cannot mutate requests; verify pods with PersistentVolumeClaims set backup.velero.io/backup-volumes annotation listing volumes to back up'
          action: AUDIT
    defaultAction: ALLOW
