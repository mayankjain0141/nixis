# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-secrets-by-label-secrets-lookup-from-volumes-pod
    annotations:
        nixis.io/imported-from: nixis-import-669155319.yaml
        nixis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: Secrets often contain sensitive information and their access should be carefully controlled. Although Kubernetes RBAC can be effective at restricting them in several ways, it lacks the ability to use labels on referenced entities. This policy ensures that only Secrets not labeled with `status=protected` can be consumed by Pods.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("secret:") && request.args.content.contains("volumes:")'
          message: 'AUDIT: Secrets referenced via volumes must not be labeled status=protected — validate label out of band'
          action: AUDIT
    defaultAction: ALLOW
