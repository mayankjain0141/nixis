# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-podsecurity-subrule-restricted-restricted-pod
    annotations:
        aegis.io/imported-from: aegis-import-1864223818.yaml
        aegis.io/severity: medium
        kyverno.io/category: Pod Security, EKS Best Practices
spec:
    description: The restricted profile of the Pod Security Standards, which is inclusive of the baseline profile, is a collection of all the most common configurations that can be taken to secure Pods. Beginning with Kyverno 1.8, an entire profile may be assigned to the cluster through a single rule. This policy configures the restricted profile through the latest version of the Pod Security Standards cluster wide.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Pod") && (request.args.content.contains("privileged: true") || request.args.content.contains("hostPID: true") || request.args.content.contains("hostIPC: true") || request.args.content.contains("hostNetwork: true") || request.args.content.contains("allowPrivilegeEscalation: true"))'
          message: 'Pod violates restricted Pod Security Standards profile (privileged, host namespaces, or allowPrivilegeEscalation not allowed)'
          action: DENY
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Pod") && !request.args.content.contains("runAsNonRoot: true") && !request.args.content.contains("seccompProfile:")'
          message: 'Pod should set runAsNonRoot and seccompProfile per restricted Pod Security Standards'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
