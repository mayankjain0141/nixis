# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-sa-automount-sa-token-validate-sa-automountserviceaccounttoken-serviceaccount
    annotations:
        nixis.io/imported-from: nixis-import-894427015.yaml
        nixis.io/severity: medium
        kyverno.io/category: Security
spec:
    description: 'Kubernetes automatically mounts ServiceAccount credentials in each ServiceAccount. The ServiceAccount may be assigned roles allowing Pods to access API resources. Blocking this ability is an extension of the least privilege best practice and should be followed if Pods do not need to speak to the API server to function. This policy ensures that mounting of these ServiceAccount tokens is blocked. '
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: ServiceAccount") && !request.args.content.contains("automountServiceAccountToken: false")'
          message: 'ServiceAccount must set automountServiceAccountToken: false to prevent automatic token mounting'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
