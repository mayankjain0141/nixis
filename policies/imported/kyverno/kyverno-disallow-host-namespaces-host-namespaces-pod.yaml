# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-disallow-host-namespaces-host-namespaces-pod
    annotations:
        nixis.io/imported-from: nixis-import-2593455078.yaml
        nixis.io/severity: medium
        kyverno.io/category: Pod Security Standards (Baseline)
spec:
    description: Host namespaces (Process ID namespace, Inter-Process Communication namespace, and network namespace) allow access to shared information and can be used to elevate privileges. Pods should not be allowed access to host namespaces. This policy ensures fields which make use of these host namespaces are unset or set to `false`.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.matches(".*host(PID|IPC|Network):\\s*true.*")'
          message: Sharing the host namespaces is disallowed. The fields spec.hostNetwork, spec.hostIPC, and spec.hostPID must be unset or set to `false`.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
