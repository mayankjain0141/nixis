apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-add-external-secret-prefix-add-external-secret-prefix
    annotations:
        nixis.io/imported-from: nixis-import-3068505333.yaml
        nixis.io/severity: medium
