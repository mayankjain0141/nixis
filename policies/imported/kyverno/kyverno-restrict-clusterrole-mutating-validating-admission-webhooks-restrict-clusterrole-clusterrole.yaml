# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-clusterrole-mutating-validating-admission-webhooks-restrict-clusterrole-clusterrole
    annotations:
        aegis.io/imported-from: aegis-import-1642952110.yaml
        aegis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: ClusterRoles that grant write permissions over admission webhook should be minimized to reduce powerful identities in the cluster. This policy checks to ensure write permissions are not provided to admission webhooks.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*(create\s+clusterrole|delete\s+clusterrole)")
          message: Use of verbs `create`, `update`, and `patch` are forbidden for mutating and validating admission webhooks
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
