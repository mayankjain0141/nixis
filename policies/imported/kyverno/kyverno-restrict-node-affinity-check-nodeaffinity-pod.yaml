# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-node-affinity-check-nodeaffinity-pod
    annotations:
        aegis.io/imported-from: aegis-import-2757821829.yaml
        aegis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: Pods may use several mechanisms to prefer scheduling on a set of nodes, and nodeAffinity is one of them. nodeAffinity uses expressions to select eligible nodes for scheduling decisions and may override intended placement options by cluster administrators. This policy ensures that nodeAffinity is not used in a Pod spec.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("nodeAffinity:")'
          message: 'nodeAffinity is not permitted in Pod specs — remove the nodeAffinity field'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
