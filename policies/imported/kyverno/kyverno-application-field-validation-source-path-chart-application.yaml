# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-application-field-validation-source-path-chart-application
    annotations:
        aegis.io/imported-from: aegis-import-3515787645.yaml
        aegis.io/severity: medium
        kyverno.io/category: Argo
spec:
    description: This policy performs some best practices validation on Application fields. Path or chart must be specified but never both. And destination.name or destination.server must be specified but never both.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Application") || request.args.content.contains("kind: AppProject")'
          message: '`spec.source.path` OR `spec.source.chart` should be specified but never both.'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
