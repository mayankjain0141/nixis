# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-enforce-etcd-encryption-check-etcd-encryption-config-openshift-io-v1-apiserver
    annotations:
        nixis.io/imported-from: nixis-import-1302918132.yaml
        nixis.io/severity: high
        kyverno.io/category: OpenShift
spec:
    description: Encryption at rest is a security best practice. This policy ensures encryption is enabled for etcd in OpenShift clusters.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: APIServer") && !request.args.content.contains("encryption:")'
          message: 'etcd encryption must be enabled'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
