# IMPORT_TODO: JMESPath conditions in enforce-etcd-encryption/check-etcd-encryption could not be translated — kubectl pattern match generated as base condition only
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-enforce-etcd-encryption-check-etcd-encryption-config-openshift-io-v1-apiserver
    annotations:
        aegis.io/imported-from: aegis-import-1302918132.yaml
        aegis.io/severity: high
        kyverno.io/category: OpenShift
spec:
    description: Encryption at rest is a security best practice. This policy ensures encryption is enabled for etcd in OpenShift clusters.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*")
          message: Encryption should be enabled for etcd
          action: DENY
    defaultAction: ALLOW
