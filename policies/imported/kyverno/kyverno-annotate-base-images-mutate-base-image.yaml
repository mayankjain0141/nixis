apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-annotate-base-images-mutate-base-image
    annotations:
        aegis.io/imported-from: aegis-import-3075604266.yaml
        aegis.io/severity: medium
        aegis.io/llm-confidence: medium
        kyverno.io/category: Other
spec:
    description: A base image used to construct a container image is not accessible by any Kubernetes component and not a field in a Pod spec as it must be fetched from a registry. Having this information available in the resource referencing the containers helps to provide a clearer understanding of its contents. This policy adds an annotation to a Pod or its controllers with the base image used for each container if present in an OCI annotation.
    matchConstraints:
        tools: []
    validations:
        - expression: 'false'
          message: 'Mutate rule (base image annotation) — Aegis cannot mutate requests; verify images have base image information annotated via CI/CD pipeline metadata'
          action: AUDIT
    defaultAction: ALLOW
