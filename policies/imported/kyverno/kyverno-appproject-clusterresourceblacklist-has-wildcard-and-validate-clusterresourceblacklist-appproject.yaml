# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-appproject-clusterresourceblacklist-has-wildcard-and-validate-clusterresourceblacklist-appproject
    annotations:
        nixis.io/imported-from: nixis-import-2548363063.yaml
        nixis.io/severity: medium
        kyverno.io/category: Argo in CEL
spec:
    description: An AppProject may optionally specify clusterResourceBlacklist which is a blacklisted group of cluster resources. This is often a good practice to ensure AppProjects do not allow more access than needed. This policy is a combination of two rules which enforce that all AppProjects specify clusterResourceBlacklist and that their group and kind have wildcards as values.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: AppProject") && (!request.args.content.contains("clusterResourceBlacklist:") || !request.args.content.matches("(?s).*clusterResourceBlacklist:.*group:\\s*[*].*kind:\\s*[*].*"))'
          message: AppProject must specify clusterResourceBlacklist with wildcard group and kind entries.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
