# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-ingress-defaultbackend-restrict-ingress-defaultbackend-ingress
    annotations:
        nixis.io/imported-from: nixis-import-1679558952.yaml
        nixis.io/severity: high
        kyverno.io/category: Best Practices
spec:
    description: An Ingress with no rules sends all traffic to a single default backend. The defaultBackend is conventionally a configuration option of the Ingress controller and is not specified in your Ingress resources. If none of the hosts or paths match the HTTP request in the Ingress objects, the traffic is routed to your default backend. In a multi-tenant environment, you want users to use explicit hosts, they should not be able to overwrite the global default backend service. This policy prohibits the use of the defaultBackend field.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Ingress") && request.args.content.contains("defaultBackend:")'
          message: 'Ingress must not specify a defaultBackend — use explicit rules instead'
          action: DENY
    defaultAction: ALLOW
