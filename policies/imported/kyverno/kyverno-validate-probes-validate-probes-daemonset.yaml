# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-validate-probes-validate-probes-daemonset
    annotations:
        aegis.io/imported-from: aegis-import-3494881599.yaml
        aegis.io/severity: medium
        aegis.io/llm-confidence: medium
        kyverno.io/category: Sample
spec:
    description: Liveness and readiness probes accomplish different goals, and setting both to the same is an anti-pattern and often results in app problems in the future. This policy checks that liveness and readiness probes are not equal. Keep in mind that if both the probes are not set, they are considered to be equal and hence fails the check.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: DaemonSet") && (!request.args.content.contains("livenessProbe:") || !request.args.content.contains("readinessProbe:"))'
          message: 'DaemonSet containers must define both livenessProbe and readinessProbe'
          action: REQUIRE_APPROVAL
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: DaemonSet") && request.args.content.contains("livenessProbe:") && request.args.content.contains("readinessProbe:") && request.args.content.matches(".*livenessProbe:.*\\s+httpGet:.*readinessProbe:.*\\s+httpGet:.*")'
          message: 'DaemonSet liveness and readiness probes both use httpGet — verify they are not identical (copy-paste anti-pattern)'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
