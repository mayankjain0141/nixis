# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-block-ephemeral-containers-block-ephemeral-containers-pod
    annotations:
        aegis.io/imported-from: aegis-import-2962672472.yaml
        aegis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: Ephemeral containers, enabled by default in Kubernetes 1.23, allow users to use the `kubectl debug` functionality and attach a temporary container to an existing Pod. This may potentially be used to gain access to unauthorized information executing inside one or more containers in that Pod. This policy blocks the use of ephemeral containers.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("ephemeralContainers:")'
          message: Ephemeral (debug) containers are not permitted.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
