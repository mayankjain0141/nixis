# IMPORT_TODO: JMESPath conditions in deny-exec-by-namespace-name/deny-exec-ns-pci could not be translated — kubectl pattern match generated as base condition only
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-deny-exec-by-namespace-name-deny-exec-ns-pci-pod-exec
    annotations:
        aegis.io/imported-from: aegis-import-293108184.yaml
        aegis.io/severity: low
        kyverno.io/category: Sample
spec:
    description: The `exec` command may be used to gain shell access, or run other commands, in a Pod's container. While this can be useful for troubleshooting purposes, it could represent an attack vector and is discouraged. This policy blocks Pod exec commands to Pods in a Namespace called `pci`.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: 'tool == "Bash" && request.args.command.matches(".*kubectl\\s+exec.*") && (request.args.command.contains(" -n pci") || request.args.command.contains(" --namespace pci") || request.args.command.contains(" -n=pci") || request.args.command.contains("--namespace=pci"))'
          message: Pods in this namespace may not be exec'd into.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
