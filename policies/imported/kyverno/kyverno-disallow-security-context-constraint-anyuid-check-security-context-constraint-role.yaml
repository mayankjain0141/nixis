# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-disallow-security-context-constraint-anyuid-check-security-context-constraint-role
    annotations:
        nixis.io/imported-from: nixis-import-3417605890.yaml
        nixis.io/severity: high
        kyverno.io/category: Security
spec:
    description: Disallow the use of the SecurityContextConstraint (SCC) anyuid which allows a pod to run with the UID as declared in the image instead of a random UID
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("anyuid")'
          message: Use of the SecurityContextConstraint (SCC) anyuid is not allowed
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
