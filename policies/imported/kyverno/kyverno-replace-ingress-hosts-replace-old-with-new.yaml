# MUTATE policy: translated to false + AUDIT (Aegis cannot rewrite Ingress host names at runtime)
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-replace-ingress-hosts-replace-old-with-new
    annotations:
        aegis.io/imported-from: aegis-import-504191393.yaml
        aegis.io/severity: medium
        aegis.io/llm-confidence: medium
        kyverno.io/category: Other
spec:
    description: An Ingress may specify host names at a variety of locations in the same resource. In some cases, those host names should be modified to, for example, update domain names silently. The replacement must be done in all the fields where a host name can be specified. This policy, illustrating the use of nested foreach loops and operable in Kyverno 1.9+, replaces host names that end with `old.com` with `new.com`.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: 'false'
          message: 'Mutation policy translated to audit-only — Aegis cannot rewrite Ingress host names from old.com to new.com at runtime'
          action: AUDIT
    defaultAction: ALLOW
