apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-require-tekton-securitycontext-check-step-securitycontext-tekton-dev-v1beta1-taskrun-status
    annotations:
        aegis.io/imported-from: aegis-import-2881636191.yaml
        aegis.io/severity: medium
        kyverno.io/category: Tekton
spec:
    description: A securityContext is required for each TaskRun step.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*")
