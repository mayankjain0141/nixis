# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-disallow-self-provisioner-binding-check-self-provisioner-binding-with-subject-clusterrolebinding
    annotations:
        aegis.io/imported-from: aegis-import-1107828208.yaml
        aegis.io/severity: high
        kyverno.io/category: OpenShift
spec:
    description: This policy prevents binding to the self-provisioners role for strict control of OpenShift project creation.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\.(yaml|yml|json)$") && request.args.content.contains("self-provisioner")'
