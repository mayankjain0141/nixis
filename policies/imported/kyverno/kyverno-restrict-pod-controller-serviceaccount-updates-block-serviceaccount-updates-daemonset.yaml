# IMPORT_TODO: JMESPath conditions in restrict-pod-controller-serviceaccount-updates/block-serviceaccount-updates could not be translated — kubectl pattern match generated as base condition only
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-pod-controller-serviceaccount-updates-block-serviceaccount-updates-daemonset
    annotations:
        aegis.io/imported-from: aegis-import-1533678013.yaml
        aegis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: ServiceAccounts which have the ability to edit/patch workloads which they created may potentially use that privilege to update to a different ServiceAccount with higher privileges. This policy, intended to be run in `enforce` mode, blocks updates to Pod controllers if those updates modify the serviceAccountName field. Updates to Pods directly for this field are not possible as it is immutable once set.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*")
          message: The serviceAccountName field may not be changed once created.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
