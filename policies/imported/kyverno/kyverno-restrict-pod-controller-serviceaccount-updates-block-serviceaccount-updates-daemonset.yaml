apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-pod-controller-serviceaccount-updates-block-serviceaccount-updates-daemonset
    annotations:
        aegis.io/imported-from: aegis-import-606916755.yaml
        aegis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: ServiceAccounts which have the ability to edit/patch workloads which they created may potentially use that privilege to update to a different ServiceAccount with higher privileges. This policy, intended to be run in `enforce` mode, blocks updates to Pod controllers if those updates modify the serviceAccountName field. Updates to Pods directly for this field are not possible as it is immutable once set.
    matchConstraints:
        tools:
            - Write
            - Edit
            - Bash
    validations:
        - expression: 'tool == "Bash" && request.args.command.matches(".*kubectl\\s+(patch|set).*serviceaccount.*daemonset.*")'
          message: 'Patching serviceAccountName on a DaemonSet via kubectl is blocked — serviceAccountName must not be changed after creation'
          action: DENY
        - expression: 'tool == "Bash" && request.args.command.matches(".*kubectl\\s+(patch|set).*daemonset.*serviceaccount.*")'
          message: 'Patching serviceAccountName on a DaemonSet via kubectl is blocked — serviceAccountName must not be changed after creation'
          action: DENY
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: DaemonSet") && request.args.content.contains("serviceAccountName: default")'
          message: 'AUDIT: DaemonSet explicitly sets serviceAccountName to default — use a dedicated, least-privilege service account'
          action: AUDIT
    defaultAction: ALLOW
