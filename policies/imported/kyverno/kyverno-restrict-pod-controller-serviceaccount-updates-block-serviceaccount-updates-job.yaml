apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-pod-controller-serviceaccount-updates-block-serviceaccount-updates-job
    annotations:
        aegis.io/imported-from: aegis-import-606916755.yaml
        aegis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: ServiceAccounts which have the ability to edit/patch workloads which they created may potentially use that privilege to update to a different ServiceAccount with higher privileges. This policy, intended to be run in `enforce` mode, blocks updates to Pod controllers if those updates modify the serviceAccountName field. Updates to Pods directly for this field are not possible as it is immutable once set.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Job") && request.args.content.contains("serviceAccountName:")'
          message: 'AUDIT: Job sets serviceAccountName — cannot distinguish UPDATE from CREATE inline; Kyverno enforces this only on UPDATE operations; verify serviceAccountName is not being changed on an existing Job'
          action: AUDIT
    defaultAction: ALLOW
