# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-k10-data-protection-by-label-k10-data-protection-by-label-deployment
    annotations:
        aegis.io/imported-from: aegis-import-2129454564.yaml
        aegis.io/severity: low
        kyverno.io/category: Kasten K10 by Veeam in CEL
spec:
    description: Check the 'dataprotection' label that production Deployments and StatefulSet have a named K10 Policy. Use in combination with 'generate' ClusterPolicy to 'generate' a specific K10 Policy by name.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && (request.args.content.contains("kind: Deployment") || request.args.content.contains("kind: StatefulSet")) && request.args.content.contains("production") && !request.args.content.contains("dataprotection:")'
          message: 'Production Deployments and StatefulSets must have a dataprotection label'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
