# AUDIT_ONLY: CEL cannot perform cross-resource existence checks — cannot verify HPA exists for this DaemonSet. Note: DaemonSets cannot be targeted by HPA (they don't have a replicas field), so this policy may be intentionally advisory.
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-check-hpa-exists-validate-hpa-daemonset
    annotations:
        aegis.io/imported-from: aegis-import-3088533108.yaml
        aegis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: This policy ensures that Deployments, ReplicaSets, StatefulSets, and DaemonSets are only allowed if they have a corresponding Horizontal Pod Autoscaler (HPA) configured in the same namespace. The policy checks for the presence of an HPA that targets the resource and denies the creation or update of the resource if no such HPA exists. This policy helps enforce scaling practices and ensures that resources are managed efficiently.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: DaemonSet")'
          message: 'AUDIT: DaemonSet detected — verify a corresponding HPA exists in the same namespace. Cross-resource HPA existence cannot be enforced automatically.'
          action: AUDIT
    defaultAction: ALLOW
