# CEL_LIMITATION: cross-resource existence check — cannot verify a matching HPA exists in the cluster.
# Also: DaemonSets have no replicas field and cannot be targeted by HPA at all — this policy is architecturally unsound.
# Expression set to false (pass-through) to avoid noise.
# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-check-hpa-exists-validate-hpa-daemonset
    annotations:
        nixis.io/imported-from: nixis-import-3088533108.yaml
        nixis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: This policy ensures that Deployments, ReplicaSets, StatefulSets, and DaemonSets are only allowed if they have a corresponding Horizontal Pod Autoscaler (HPA) configured in the same namespace. The policy checks for the presence of an HPA that targets the resource and denies the creation or update of the resource if no such HPA exists. This policy helps enforce scaling practices and ensures that resources are managed efficiently.
    matchConstraints:
        tools: []
    validations:
        - expression: 'false'
          message: 'CEL cannot query cluster state — cannot verify HPA exists for this DaemonSet. Note: DaemonSets cannot be targeted by HPA (no replicas field).'
          action: AUDIT
    defaultAction: ALLOW
