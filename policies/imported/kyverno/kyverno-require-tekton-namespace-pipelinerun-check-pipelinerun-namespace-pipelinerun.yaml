# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-require-tekton-namespace-pipelinerun-check-pipelinerun-namespace-pipelinerun
    annotations:
        aegis.io/imported-from: aegis-import-1163597477.yaml
        aegis.io/severity: medium
        kyverno.io/category: Tekton
spec:
    description: A Namespace is required for a PipelineRun and may not be set to `default`.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: PipelineRun") && (request.args.content.contains("namespace: default") || !request.args.content.contains("namespace:"))'
          message: 'PipelineRun must specify a non-default namespace'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
