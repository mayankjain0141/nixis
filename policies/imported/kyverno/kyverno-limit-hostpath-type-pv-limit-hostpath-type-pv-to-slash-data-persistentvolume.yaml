# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-limit-hostpath-type-pv-limit-hostpath-type-pv-to-slash-data-persistentvolume
    annotations:
        aegis.io/imported-from: aegis-import-1777899643.yaml
        aegis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: hostPath persistentvolumes consume the underlying node's file system. If hostPath volumes are not to be universally disabled, they should be restricted to only certain host paths so as not to allow access to sensitive information. This policy ensures the only directory that can be mounted as a hostPath volume is /data.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*delete\\s+pv")
          message: hostPath type persistent volumes are confined to /data.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
