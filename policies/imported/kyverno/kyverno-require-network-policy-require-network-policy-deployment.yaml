# IMPORT_TODO: JMESPath conditions in require-network-policy/require-network-policy could not be translated — kubectl pattern match generated as base condition only
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-require-network-policy-require-network-policy-deployment
    annotations:
        aegis.io/imported-from: aegis-import-3354944576.yaml
        aegis.io/severity: low
        kyverno.io/category: Sample
spec:
    description: NetworkPolicy is used to control Pod-to-Pod communication and is a good practice to ensure only authorized Pods can send/receive traffic. This policy checks incoming Deployments to ensure they have a matching, preexisting NetworkPolicy.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*(delete\s+deployment|scale|rollout)")
          message: Every Deployment requires a matching NetworkPolicy.
          action: AUDIT
    defaultAction: ALLOW
