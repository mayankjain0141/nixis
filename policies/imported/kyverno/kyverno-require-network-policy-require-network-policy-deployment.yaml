# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-require-network-policy-require-network-policy-deployment
    annotations:
        aegis.io/imported-from: aegis-import-382613204.yaml
        aegis.io/severity: low
        kyverno.io/category: Sample
spec:
    description: NetworkPolicy is used to control Pod-to-Pod communication and is a good practice to ensure only authorized Pods can send/receive traffic. This policy checks incoming Deployments to ensure they have a matching, preexisting NetworkPolicy.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$")'
          message: 'Policy validation required — review manifest before applying'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
