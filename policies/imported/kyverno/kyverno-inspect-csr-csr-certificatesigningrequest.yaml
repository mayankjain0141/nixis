# imported from: policies via nixis policy import
# Gap: Kyverno uses JMESPath to parse the base64-encoded PEM/DER CSR blob and extract the
# Subject (CN, O, etc.) for the policy report. CEL file-content matching cannot decode base64
# or parse DER-encoded ASN.1 structures — detection is limited to kind: CertificateSigningRequest
# presence; Subject inspection must be performed out-of-band.
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-inspect-csr-csr-certificatesigningrequest
    annotations:
        nixis.io/imported-from: nixis-import-2537728577.yaml
        nixis.io/severity: low
        kyverno.io/category: Other
spec:
    description: The Kubernetes API includes a CertificateSigningRequest resource which can be used to generate a certificate for an entity. Because this API can be abused to create a long-lived credential, it is important to be able to audit this API to understand who/what is creating these CSRs and for what actors they are being created. This policy, intended to always be run in Audit mode and produce failure results in a Policy Report, inspects all incoming CertificateSigningRequests and writes out into the Policy Report information on who/what requested it and parsing the CSR to show the Subject information of that CSR resource.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: CertificateSigningRequest")'
          message: 'CertificateSigningRequest detected — review who is requesting a certificate'
          action: AUDIT
    defaultAction: ALLOW
