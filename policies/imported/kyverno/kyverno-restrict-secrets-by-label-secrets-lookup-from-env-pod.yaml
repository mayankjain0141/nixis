# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-secrets-by-label-secrets-lookup-from-env-pod
    annotations:
        aegis.io/imported-from: aegis-import-669155319.yaml
        aegis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: Secrets often contain sensitive information and their access should be carefully controlled. Although Kubernetes RBAC can be effective at restricting them in several ways, it lacks the ability to use labels on referenced entities. This policy ensures that only Secrets not labeled with `status=protected` can be consumed by Pods.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*(delete\\s+pod|exec|run)")
          message: These Secrets are restricted.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
