# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-verify-flux-images-verify-cosign-signature-pod
    annotations:
        aegis.io/imported-from: aegis-import-3526291889.yaml
        aegis.io/severity: medium
        kyverno.io/category: Flux
spec:
    description: Ensures that container images used to run Flux controllers in the cluster are signed with valid Cosign signatures. Prevents the deployment of untrusted or potentially compromised Flux images. Protects the integrity and security of the Flux deployment process.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("image:") && !request.args.content.contains("cosign.sigstore.dev/imageDigest")'
          message: 'Container images must be signed with a valid cosign signature'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
