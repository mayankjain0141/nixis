# IMPORT_REVIEW: translated by Claude — cross-resource uniqueness cannot be enforced in single-request CEL; Bash pathway added to catch oc create route and kubectl create/apply for Route resources
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-unique-routes-require-unique-routes-route-openshift-io-v1-route
    annotations:
        aegis.io/imported-from: aegis-import-4220290085.yaml
        aegis.io/severity: high
        aegis.io/llm-confidence: medium
        kyverno.io/category: OpenShift
spec:
    description: An Route host is a URL at which services may be made available externally. In most cases, these hosts should be unique across the cluster to ensure no routing conflicts occur. This policy checks an incoming Route resource to ensure its hosts are unique to the cluster.
    matchConstraints:
        tools:
            - Write
            - Edit
            - Bash
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Route")'
          message: 'OpenShift Route host names must be unique across the cluster — cross-resource uniqueness cannot be enforced in single-request CEL'
          action: AUDIT
        - expression: 'tool == "Bash" && request.args.command.matches(".*(oc|kubectl).*(create|apply|replace).*(route|Route).*")'
          message: 'Route create/update via CLI — verify the host is unique across the cluster (cross-resource uniqueness cannot be checked in CEL)'
          action: AUDIT
    defaultAction: ALLOW
