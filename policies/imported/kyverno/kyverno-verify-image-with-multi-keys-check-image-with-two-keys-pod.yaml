# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-verify-image-with-multi-keys-check-image-with-two-keys-pod
    annotations:
        aegis.io/imported-from: aegis-import-557846200.yaml
        aegis.io/severity: medium
        kyverno.io/category: Software Supply Chain Security
spec:
    description: There may be multiple keys used to sign images based on the parties involved in the creation process. This image verification policy requires the named image be signed by two separate keys. It will search for a global "production" key in a ConfigMap called `keys` in the `default` Namespace and also a Namespace key in the same ConfigMap.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("image:") && !request.args.content.contains("cosign.sigstore.dev/imageDigest")'
          message: 'Container images must be signed with a valid cosign signature'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
