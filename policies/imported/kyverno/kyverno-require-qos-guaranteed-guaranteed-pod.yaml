# IMPORT_REVIEW: QoS Guaranteed requires both requests and limits defined for all containers — Aegis checks for presence of both resources.requests and resources.limits in the Pod manifest; verifying requests == limits for all containers requires numeric parsing not available in CEL string matching
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-require-qos-guaranteed-guaranteed-pod
    annotations:
        aegis.io/imported-from: aegis-import-315305142.yaml
        aegis.io/severity: medium
        aegis.io/llm-confidence: medium
        kyverno.io/category: Other, Multi-Tenancy
spec:
    description: Pod Quality of Service (QoS) is a mechanism to ensure Pods receive certain priority guarantees based upon the resources they define. When Pods define both requests and limits for both memory and CPU, and the requests and limits are equal to each other, Kubernetes grants the QoS class as guaranteed which allows them to run at a higher priority than others. This policy requires that all containers within a Pod run with this definition resulting in a guaranteed QoS. This policy is provided with the intention that users will need to control its scope by using exclusions, preconditions, and other policy language mechanisms.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Pod") && !(request.args.content.contains("requests:") && request.args.content.contains("limits:"))'
          message: 'Pod must define both resource requests and limits for all containers to qualify for QoS class Guaranteed — ensure every container specifies cpu and memory under both requests and limits'
          action: DENY
    defaultAction: ALLOW
