# IMPORT_TODO: JMESPath conditions in topologyspreadconstraints-policy/spread-pods could not be translated — kubectl pattern match generated as base condition only
# IMPORT_TODO: replica-count exclusion (replicas < 3 are skipped) cannot be expressed in CEL text-search — policy fires on ALL Deployments regardless of replica count
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-topologyspreadconstraints-policy-spread-pods-deployment
    annotations:
        aegis.io/imported-from: aegis-import-1769595951.yaml
        aegis.io/severity: medium
        kyverno.io/category: Sample
spec:
    description: Deployments to a Kubernetes cluster with multiple availability zones often need to distribute those replicas to align with those zones to ensure site-level failures do not impact availability. This policy ensures topologySpreadConstraints are defined, to spread pods over nodes and zones. Deployments or Statefulsets with leass than 3 replicas are skipped.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && (request.args.content.contains("kind: Deployment") || request.args.content.contains("kind: StatefulSet")) && !request.args.content.contains("topologySpreadConstraints:")'
          message: 'Deployments and StatefulSets must define topologySpreadConstraints'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
