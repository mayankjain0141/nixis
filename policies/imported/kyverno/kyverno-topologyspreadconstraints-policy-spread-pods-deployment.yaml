# IMPORT_TODO: JMESPath conditions in topologyspreadconstraints-policy/spread-pods could not be translated — kubectl pattern match generated as base condition only
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-topologyspreadconstraints-policy-spread-pods-deployment
    annotations:
        aegis.io/imported-from: aegis-import-1849742902.yaml
        aegis.io/severity: medium
        kyverno.io/category: Sample
spec:
    description: Deployments to a Kubernetes cluster with multiple availability zones often need to distribute those replicas to align with those zones to ensure site-level failures do not impact availability. This policy ensures topologySpreadConstraints are defined,  to spread pods over nodes and zones. Deployments or Statefulsets with leass than 3  replicas are skipped.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*(delete\s+deployment|scale|rollout)")
          message: topologySpreadConstraint for kubernetes.io/hostname & topology.kubernetes.io/zone are required
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
