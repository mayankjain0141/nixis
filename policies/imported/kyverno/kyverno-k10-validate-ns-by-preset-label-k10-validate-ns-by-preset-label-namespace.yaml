# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-k10-validate-ns-by-preset-label-k10-validate-ns-by-preset-label-namespace
    annotations:
        nixis.io/imported-from: nixis-import-898763188.yaml
        nixis.io/severity: low
        kyverno.io/category: Kasten K10 by Veeam in CEL
spec:
    description: Kubernetes applications are typically deployed into a single, logical namespace. Kasten K10 policies will discover and protect all resources within the selected namespace(s). This policy ensures all new namespaces include a label referencing a valid K10 SLA (Policy Preset) for data protection.This policy can be used in combination with generate ClusterPolicy to automatically create a K10 policy based on the specified SLA. The combination ensures that new applications are not inadvertently left unprotected.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Namespace") && !request.args.content.contains("dataprotection:")'
          message: 'New namespaces must include a dataprotection label for K10/Kasten SLA'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
