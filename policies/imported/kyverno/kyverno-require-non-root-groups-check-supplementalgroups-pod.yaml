# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-require-non-root-groups-check-supplementalgroups-pod
    annotations:
        nixis.io/imported-from: nixis-import-3096147677.yaml
        nixis.io/severity: medium
        kyverno.io/category: Sample, EKS Best Practices
spec:
    description: Containers should be forbidden from running with a root primary or supplementary GID. This policy ensures the `runAsGroup`, `supplementalGroups`, and `fsGroup` fields are set to a number greater than zero (i.e., non root). A known issue prevents a policy such as this using `anyPattern` from being persisted properly in Kubernetes 1.23.0-1.23.2.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("supplementalGroups:") && request.args.content.contains("- 0")'
          message: 'supplementalGroups must not include 0 (root GID is not permitted)'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
