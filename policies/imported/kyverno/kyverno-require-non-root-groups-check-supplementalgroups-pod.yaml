apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-require-non-root-groups-check-supplementalgroups-pod
    annotations:
        aegis.io/imported-from: aegis-import-3096147677.yaml
        aegis.io/severity: medium
        kyverno.io/category: Sample, EKS Best Practices
spec:
    description: Containers should be forbidden from running with a root primary or supplementary GID. This policy ensures the `runAsGroup`, `supplementalGroups`, and `fsGroup` fields are set to a number greater than zero (i.e., non root). A known issue prevents a policy such as this using `anyPattern` from being persisted properly in Kubernetes 1.23.0-1.23.2.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$")'
          message: 'Policy validation required — review manifest before applying'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
