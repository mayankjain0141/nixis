# IMPORT_TODO: JMESPath conditions in check-kernel/kernel-validate could not be translated — kubectl pattern match generated as base condition only
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-check-kernel-kernel-validate-node
    annotations:
        aegis.io/imported-from: aegis-import-873103446.yaml
        aegis.io/severity: high
        kyverno.io/category: Other
spec:
    description: Linux CVE-2022-0185 can allow a container escape in Kubernetes if left unpatched. The affected Linux kernel versions, at this time, are 5.10.84-1 and 5.15.5-2. For more information, refer to https://security-tracker.debian.org/tracker/CVE-2022-0185. This policy runs in background mode and flags an entry in the ClusterPolicyReport if any Node is reporting one of the affected kernel versions.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*(drain|cordon|delete\s+node)")
          message: Kernel is vulnerable to CVE-2022-0185.
          action: DENY
    defaultAction: ALLOW
