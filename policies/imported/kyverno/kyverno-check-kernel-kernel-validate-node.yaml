# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-check-kernel-kernel-validate-node
    annotations:
        aegis.io/imported-from: aegis-import-2171671635.yaml
        aegis.io/severity: high
        kyverno.io/category: Other
spec:
    description: Linux CVE-2022-0185 can allow a container escape in Kubernetes if left unpatched. The affected Linux kernel versions, at this time, are 5.10.84-1 and 5.15.5-2. For more information, refer to https://security-tracker.debian.org/tracker/CVE-2022-0185. This policy runs in background mode and flags an entry in the ClusterPolicyReport if any Node is reporting one of the affected kernel versions.
    matchConstraints:
        tools: []
    validations:
        - expression: 'false'
          message: 'Cannot be enforced at request-time: kernel version check (CVE-2022-0185) requires reading Node.status.nodeInfo.kernelVersion which is unavailable in single-request CEL evaluation. Verify nodes are patched against kernel versions 5.10.84-1 and 5.15.5-2 out-of-band.'
          action: AUDIT
    defaultAction: ALLOW
