# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-require-imagepullsecrets-check-for-image-pull-secrets-pod
    annotations:
        nixis.io/imported-from: nixis-import-3720630644.yaml
        nixis.io/severity: low
        kyverno.io/category: Sample
spec:
    description: Some registries, both public and private, require credentials in order to pull images from them. This policy checks those images and if they come from a registry other than ghcr.io or quay.io an `imagePullSecret` is required.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("containers:") && !request.args.content.contains("imagePullSecrets:")'
          message: 'Pods pulling from private registries must define imagePullSecrets'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
