# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-block-tekton-task-runs-check-taskrun-user-taskrun
    annotations:
        aegis.io/imported-from: aegis-import-2587875102.yaml
        aegis.io/severity: medium
        kyverno.io/category: Tekton
spec:
    description: Restrict creation of TaskRun resources to the Tekton pipelines controller.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*")
          message: Creating a TaskRun is not allowed.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
