# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-unique-ingress-host-and-path-check-host-path-combo-ingress
    annotations:
        nixis.io/imported-from: nixis-import-2628231260.yaml
        nixis.io/severity: medium
        kyverno.io/category: Sample
spec:
    description: Similar to the ability to check the uniqueness of hosts and paths independently, it is possible to check for uniqueness of them both together across a cluster. This policy ensures that no Ingress can be created or updated unless it is globally unique with respect to host plus path combination.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Ingress")'
          message: 'Ingress host and path combinations must be globally unique — cross-resource uniqueness cannot be enforced in single-request CEL'
          action: AUDIT
    defaultAction: ALLOW
