# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-automount-sa-token-validate-automountserviceaccounttoken-pod
    annotations:
        nixis.io/imported-from: nixis-import-2145658975.yaml
        nixis.io/severity: medium
        kyverno.io/category: Sample, EKS Best Practices
spec:
    description: Kubernetes automatically mounts ServiceAccount credentials in each Pod. The ServiceAccount may be assigned roles allowing Pods to access API resources. Blocking this ability is an extension of the least privilege best practice and should be followed if Pods do not need to speak to the API server to function. This policy ensures that mounting of these ServiceAccount tokens is blocked.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && (request.args.content.contains("kind: Pod") || request.args.content.contains("kind: ServiceAccount")) && !request.args.content.contains("automountServiceAccountToken: false")'
          message: 'Pods and ServiceAccounts must set automountServiceAccountToken: false'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
