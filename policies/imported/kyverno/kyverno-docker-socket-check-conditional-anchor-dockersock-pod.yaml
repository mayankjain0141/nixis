# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-docker-socket-check-conditional-anchor-dockersock-pod
    annotations:
        nixis.io/imported-from: nixis-import-4252709705.yaml
        nixis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: Accessing a container engine's socket is for highly specialized use cases and should generally be disabled. If access must be granted, it should be done on an explicit basis. This policy requires that, for any Pod mounting the Docker socket, it must have the label `allow-docker` set to `true`.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("/var/run/docker.sock")'
          message: If a hostPath volume exists and is set to `/var/run/docker.sock`, the label `allow-docker` must equal `true`.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
