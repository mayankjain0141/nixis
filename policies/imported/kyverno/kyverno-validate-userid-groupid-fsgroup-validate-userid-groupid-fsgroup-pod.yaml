# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-validate-userid-groupid-fsgroup-validate-userid-groupid-fsgroup-pod
    annotations:
        nixis.io/imported-from: nixis-import-2996026848.yaml
        nixis.io/severity: medium
        kyverno.io/category: Sample in CEL
spec:
    description: All processes inside a Pod can be made to run with specific user and groupID by setting `runAsUser` and `runAsGroup` respectively. `fsGroup` can be specified to make sure any file created in the volume will have the specified groupID. This policy validates that these fields are set to the defined values.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Pod") && (!request.args.content.contains("runAsUser:") || !request.args.content.contains("runAsGroup:") || !request.args.content.contains("fsGroup:") || request.args.content.contains("runAsUser: 0") || request.args.content.contains("runAsGroup: 0") || request.args.content.contains("fsGroup: 0"))'
          message: 'Pods must set runAsUser, runAsGroup, and fsGroup to non-zero values in securityContext'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
