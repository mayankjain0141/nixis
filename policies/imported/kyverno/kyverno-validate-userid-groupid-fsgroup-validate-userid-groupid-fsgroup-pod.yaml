# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-validate-userid-groupid-fsgroup-validate-userid-groupid-fsgroup-pod
    annotations:
        aegis.io/imported-from: aegis-import-2996026848.yaml
        aegis.io/severity: medium
        kyverno.io/category: Sample in CEL
spec:
    description: All processes inside a Pod can be made to run with specific user and groupID by setting `runAsUser` and `runAsGroup` respectively. `fsGroup` can be specified to make sure any file created in the volume will have the specified groupID. This policy validates that these fields are set to the defined values.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("securityContext:") && (!request.args.content.contains("runAsUser:") || !request.args.content.contains("runAsGroup:"))'
          message: 'Pods must set runAsUser, runAsGroup, and fsGroup in securityContext'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
