# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-k6t-enforce-instancetype-k6t-ensure-instance-type-and-preference-virtualmachine
    annotations:
        nixis.io/imported-from: nixis-import-235143124.yaml
        nixis.io/severity: low
        kyverno.io/category: KubeVirt
spec:
    description: Check VirtualMachines and validate that they are using an instance type and preference.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: VirtualMachine") && (!request.args.content.contains("instancetype:") || !request.args.content.contains("preference:"))'
          message: 'VirtualMachines must specify both an instancetype and a preference'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
