# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-k6t-enforce-instancetype-k6t-ensure-instance-type-and-preference-virtualmachine
    annotations:
        aegis.io/imported-from: aegis-import-235143124.yaml
        aegis.io/severity: low
        kyverno.io/category: KubeVirt
spec:
    description: Check VirtualMachines and validate that they are using an instance type and preference.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: VirtualMachine") && !request.args.content.contains("instancetype:")'
          message: 'VirtualMachines must specify an instance type and preference'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
