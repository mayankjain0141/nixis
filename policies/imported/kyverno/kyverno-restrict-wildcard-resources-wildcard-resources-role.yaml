apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-restrict-wildcard-resources-wildcard-resources-role
    annotations:
        aegis.io/imported-from: aegis-import-1808165141.yaml
        aegis.io/severity: medium
        kyverno.io/category: Security, EKS Best Practices
spec:
    description: Wildcards ('*') in resources grants access to all of the resources referenced by the given API group and does not follow the principal of least privilege. As much as possible, avoid such open resources unless scoped to perhaps a custom API group. This policy blocks any Role or ClusterRole that contains a wildcard entry in the resources list found in any rule.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Role") && (request.args.content.contains("- \"*\"") || request.args.content.contains("- ''*''") || request.args.content.matches("(?s).*resources:\\s*\\[\"\\*\"\\].*"))'
          message: 'Roles must not use wildcard (*) in the resources list — grant only the specific resource types needed'
          action: DENY
    defaultAction: ALLOW
