# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-unique-ingress-path-check-path-ingress
    annotations:
        aegis.io/imported-from: aegis-import-1390634402.yaml
        aegis.io/severity: medium
        aegis.io/llm-confidence: medium
        kyverno.io/category: Sample
spec:
    description: Just like the need to ensure uniqueness among Ingress hosts, there is a need to have the paths be unique as well. This policy checks an incoming Ingress to ensure its root path does not conflict with another root path in a different Namespace. It requires that incoming Ingress resources have a single rule with a single path only and assumes the root path is specified explicitly in an existing Ingress rule (ex., when blocking /foo/bar /foo must exist by itself and not part of /foo/baz).
    matchConstraints:
        tools:
            - Write
            - Edit
            - Bash
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Ingress")'
          message: 'Ingress paths must be unique across all namespaces — cross-resource uniqueness cannot be enforced in single-request CEL'
          action: AUDIT
        - expression: 'tool == "Bash" && request.args.command.matches(".*kubectl.*create.*ingress.*--rule.*/..*")'
          message: 'kubectl create ingress with path in --rule — verify the path is unique across all namespaces (cross-resource uniqueness cannot be checked in CEL)'
          action: AUDIT
    defaultAction: ALLOW
