# IMPORT_TODO: JMESPath conditions in unique-ingress-path/check-path could not be translated — kubectl pattern match generated as base condition only
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-unique-ingress-path-check-path-ingress
    annotations:
        aegis.io/imported-from: aegis-import-2948620140.yaml
        aegis.io/severity: medium
        kyverno.io/category: Sample
spec:
    description: Just like the need to ensure uniqueness among Ingress hosts, there is a need to have the paths be unique as well. This policy checks an incoming Ingress to ensure its root path does not conflict with another root path in a different Namespace. It requires that incoming Ingress resources have a single rule with a single path only and assumes the root path is specified explicitly in an existing Ingress rule (ex., when blocking /foo/bar /foo must exist by itself and not part of /foo/baz).
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*")
          message: The root path /{{request.object.spec.rules[].http.paths[].path | [0] | to_string(@) | split(@, '/') | [1]}} exists in another Ingress rule elsewhere in the cluster.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
