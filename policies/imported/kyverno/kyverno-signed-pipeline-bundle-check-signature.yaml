apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-signed-pipeline-bundle-check-signature
    annotations:
        aegis.io/imported-from: aegis-import-2560525858.yaml
        aegis.io/severity: medium
        aegis.io/llm-confidence: medium
        kyverno.io/category: Tekton
spec:
    description: A signed bundle is required
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
