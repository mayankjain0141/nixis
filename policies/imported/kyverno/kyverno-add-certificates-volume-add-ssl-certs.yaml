apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-add-certificates-volume-add-ssl-certs
    annotations:
        nixis.io/imported-from: nixis-import-1085826525.yaml
        nixis.io/severity: low
        nixis.io/llm-confidence: medium
        kyverno.io/category: Sample
spec:
    description: In some cases you would need to trust custom CA certificates for all the containers of a Pod. It makes sense to be in a ConfigMap so that you can automount them by only setting an annotation. This policy adds a volume to all containers in a Pod containing the certificate if the annotation called `inject-certs` with value `enabled` is found.
    matchConstraints:
        tools: []
    validations:
        - expression: 'false'
          message: 'Mutate rule (SSL certificate volume injection) — Nixis cannot mutate requests; verify pods with inject-certs=enabled annotation have the certificates volume mounted'
          action: AUDIT
    defaultAction: ALLOW
