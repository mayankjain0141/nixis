# IMPORT_TODO: JMESPath conditions in disallow-jenkins-pipeline-strategy/check-build-strategy could not be translated — kubectl pattern match generated as base condition only
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-disallow-jenkins-pipeline-strategy-check-build-strategy-build-openshift-io-v1-buildconfig
    annotations:
        aegis.io/imported-from: aegis-import-3684960707.yaml
        aegis.io/severity: medium
        kyverno.io/category: OpenShift
spec:
    description: The Jenkins Pipeline Build Strategy has been deprecated. This policy prevents its use. Use OpenShift Pipelines instead.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*")
          message: Jenkins Pipeline Build Strategy has been deprecated and is not allowed
          action: DENY
    defaultAction: ALLOW
