# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-exclude-namespaces-example-exclude-namespaces-dynamically-statefulset
    annotations:
        aegis.io/imported-from: aegis-import-1305823430.yaml
        aegis.io/severity: medium
        kyverno.io/category: Sample
spec:
    description: It's common where policy lookups need to consider a mapping to many possible values rather than a static mapping. This is a sample which demonstrates how to dynamically look up an allow list of Namespaces from a ConfigMap where the ConfigMap stores an array of strings. This policy validates that any StatefulSets created outside of the list of Namespaces have the label `foo` applied.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: StatefulSet") && !request.args.content.contains("foo:")'
          message: 'StatefulSet manifests must include the foo label — namespace allowlist from ConfigMap cannot be checked at request time; manual review required'
          action: AUDIT
    defaultAction: ALLOW
