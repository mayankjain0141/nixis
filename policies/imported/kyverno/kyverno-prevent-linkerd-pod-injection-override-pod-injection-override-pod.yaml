# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-prevent-linkerd-pod-injection-override-pod-injection-override-pod
    annotations:
        aegis.io/imported-from: aegis-import-1286063176.yaml
        aegis.io/severity: medium
        kyverno.io/category: Linkerd
spec:
    description: Setting the annotation on a Pod (or its controller) `linkerd.io/inject` to `disabled` may effectively disable mesh participation for that workload reducing security and visibility. This policy prevents setting the annotation `linkerd.io/inject` to `disabled` for Pods.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*(delete\s+pod|exec|run)")
          message: Pods may not disable sidecar injection.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
