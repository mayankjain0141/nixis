# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-require-image-checksum-require-image-checksum-pod
    annotations:
        aegis.io/imported-from: aegis-import-2663082090.yaml
        aegis.io/severity: medium
        kyverno.io/category: Sample
spec:
    description: Use of a SHA checksum when pulling an image is often preferable because tags are mutable and can be overwritten. This policy checks to ensure that all images use SHA checksums rather than tags.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*(delete\\s+pod|exec|run)")
          message: Images must use checksums rather than tags.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
