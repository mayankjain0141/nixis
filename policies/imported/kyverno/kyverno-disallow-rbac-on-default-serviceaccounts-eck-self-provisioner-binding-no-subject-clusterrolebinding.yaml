# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-disallow-rbac-on-default-serviceaccounts-eck-self-provisioner-binding-no-subject-clusterrolebinding
    annotations:
        aegis.io/imported-from: aegis-import-3829104712.yaml
        aegis.io/severity: medium
        kyverno.io/category: Security
spec:
    description: Prevents creation of ClusterRoleBindings that reference the self-provisioner cluster role without any subjects, which could allow privilege escalation when subjects are later added.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.matches("[\\s\\S]*kind:\\s*ClusterRoleBinding[\\s\\S]*") && request.args.content.contains("self-provisioner") && !request.args.content.contains("subjects:")'
          message: ClusterRoleBindings referencing the self-provisioner role without subjects are not allowed.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
