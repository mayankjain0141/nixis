# IMPORT_REVIEW: translated by Claude — cross-resource uniqueness cannot be enforced in single-request CEL; Bash pathway added to catch kubectl apply/patch on ingress with --rule or host change
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-unique-ingress-host-check-single-host-update-ingress
    annotations:
        aegis.io/imported-from: aegis-import-810378562.yaml
        aegis.io/severity: medium
        aegis.io/llm-confidence: medium
        kyverno.io/category: Sample
spec:
    description: 'An Ingress host is a URL at which services may be made available externally. In most cases, these hosts should be unique across the cluster to ensure no routing conflicts occur. This policy checks an incoming Ingress resource to ensure its hosts are unique to the cluster. It also ensures that only a single host may be specified in a given manifest. '
    matchConstraints:
        tools:
            - Write
            - Edit
            - Bash
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Ingress") && !request.args.content.contains("host:")'
          message: 'Ingress resources must specify a host — cross-resource hostname uniqueness cannot be enforced in single-request CEL'
          action: AUDIT
        - expression: 'tool == "Bash" && request.args.command.matches(".*kubectl.*(apply|patch|replace).*ingress.*")'
          message: 'kubectl update of Ingress — verify the host is unique across the cluster (cross-resource uniqueness cannot be checked in CEL)'
          action: AUDIT
    defaultAction: ALLOW
