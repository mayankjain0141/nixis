# IMPORT_TODO: JMESPath conditions in check-vpa-configuration/check-vpa-configuration could not be translated — kubectl pattern match generated as base condition only
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-check-vpa-configuration-check-vpa-configuration-replicaset
    annotations:
        aegis.io/imported-from: aegis-import-3101912360.yaml
        aegis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: 'VerticalPodAutoscaler (VPA) is useful to automatically adjust the resources assigned to Pods.  It requires defining a specific target resource by kind and name. There are no built-in  validation checks by the VPA controller to ensure that the target resource is associated with it.  This policy ensures that the matching kind has a matching VPA. '
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\.(yaml|yml|json)$") && request.args.content.contains("kind: VerticalPodAutoscaler")'
          message: Workload '{{request.object.kind}}/{{request.object.metadata.name}}'  requires a matching VerticalPodAutoscaler (VPA) in the  '{{request.object.metadata.namespace}}' namespace.
          action: AUDIT
    defaultAction: ALLOW
