# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-check-deprecated-apis-validate-v1-26-removals-autoscaling---horizontalpodautoscaler
    annotations:
        aegis.io/imported-from: aegis-import-283350505.yaml
        aegis.io/severity: low
        kyverno.io/category: Best Practices
spec:
    description: Kubernetes APIs are sometimes deprecated and removed after a few releases. As a best practice, older API versions should be replaced with newer versions. This policy validates for APIs that are deprecated or scheduled for removal. Note that checking for some of these resources may require modifying the Kyverno ConfigMap to remove filters. In the validate-v1-22-removals rule, the Lease kind has been commented out due to a check for this kind having a performance penalty on Kubernetes clusters with many leases. Its enabling should be attended carefully and is not recommended on large clusters. PodSecurityPolicy is removed in v1.25 so therefore the validate-v1-25-removals rule may not completely work on 1.25+. This policy requires Kyverno v1.7.4+ to function properly.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && (request.args.content.contains("apiVersion: autoscaling/v2beta1") || request.args.content.contains("apiVersion: autoscaling/v2beta2")) && request.args.content.contains("kind: HorizontalPodAutoscaler")'
          message: 'autoscaling/v2beta1 and autoscaling/v2beta2 HorizontalPodAutoscaler are deprecated and will be removed in v1.26. Use autoscaling/v2 instead. See: https://kubernetes.io/docs/reference/using-api/deprecation-guide/'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
