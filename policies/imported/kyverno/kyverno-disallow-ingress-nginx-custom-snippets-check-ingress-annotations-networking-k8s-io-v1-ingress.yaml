# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-disallow-ingress-nginx-custom-snippets-check-ingress-annotations-networking-k8s-io-v1-ingress
    annotations:
        aegis.io/imported-from: aegis-import-594319337.yaml
        aegis.io/severity: low
        kyverno.io/category: Security, NGINX Ingress
spec:
    description: 'Users that can create or update ingress objects can use the custom snippets  feature to obtain all secrets in the cluster (CVE-2021-25742). This policy  disables allow-snippet-annotations in the ingress-nginx configuration and  blocks *-snippet annotations on an Ingress. See: https://github.com/kubernetes/ingress-nginx/issues/7837'
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*")
          message: ingress-nginx custom snippets are not allowed
          action: DENY
    defaultAction: ALLOW
