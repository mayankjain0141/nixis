# IMPORT_REVIEW: translated by Claude — JMESPath pattern match approximated as CEL regex; verify naming pattern matches cluster convention
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-team-validate-ns-name-team-validate-ns-name-project
    annotations:
        aegis.io/imported-from: aegis-import-2161341959.yaml
        aegis.io/severity: medium
        aegis.io/llm-confidence: medium
        kyverno.io/category: OpenShift
spec:
    description: Naming patterns are commonplace in clusters where creation activities are granted to other users. In order to maintain organization, it is often such that patterns should be established for organizational consistency. This policy denies the creation of a Namespace if the name of the Namespace does not follow a specific naming defined by the cluster admins.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Project") && !request.args.content.matches(".*name:\\s+(team-|env-)[a-z].*")'
          message: 'Project names must follow the team-<name> or env-<name> pattern'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
