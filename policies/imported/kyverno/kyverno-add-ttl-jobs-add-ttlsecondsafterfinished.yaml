# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-add-ttl-jobs-add-ttlsecondsafterfinished
    annotations:
        nixis.io/imported-from: nixis-import-2461800083.yaml
        nixis.io/severity: medium
        nixis.io/llm-confidence: medium
        kyverno.io/category: Other
spec:
    description: Jobs which are user created can often pile up and consume excess space in the cluster. In Kubernetes 1.23, the TTL-after-finished controller is stable and will automatically clean up these Jobs if the ttlSecondsAfterFinished is specified. This policy adds the ttlSecondsAfterFinished field to an Job that does not have an ownerReference set if not already specified.
    matchConstraints:
        tools: []
    validations:
        - expression: 'false'
          message: 'Mutate rule (Job TTL injection) — Nixis cannot mutate requests; verify Jobs without ownerReferences set ttlSecondsAfterFinished to avoid orphaned job accumulation'
          action: AUDIT
    defaultAction: ALLOW
