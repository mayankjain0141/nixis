# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-validate-userid-groupid-fsgroup-validate-fsgroup-pod
    annotations:
        aegis.io/imported-from: aegis-import-834502682.yaml
        aegis.io/severity: medium
        kyverno.io/category: Sample
spec:
    description: All processes inside a Pod can be made to run with specific user and groupID by setting `runAsUser` and `runAsGroup` respectively. `fsGroup` can be specified to make sure any file created in the volume will have the specified groupID. This policy validates that these fields are set to the defined values.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*(delete\s+pod|exec|run)")
          message: fsgroup should be 2000.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
