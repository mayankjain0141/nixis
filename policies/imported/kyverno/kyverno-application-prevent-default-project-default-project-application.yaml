# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-application-prevent-default-project-default-project-application
    annotations:
        aegis.io/imported-from: aegis-import-3984070773.yaml
        aegis.io/severity: medium
        kyverno.io/category: Argo
spec:
    description: This policy prevents the use of the default project in an Application.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\.(yaml|yml|json)$") && request.args.content.contains("kind: Application") || request.args.content.contains("kind: AppProject")'
          message: The default project may not be used in an Application.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
