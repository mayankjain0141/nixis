# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-application-prevent-default-project-default-project-application
    annotations:
        nixis.io/imported-from: nixis-import-3984070773.yaml
        nixis.io/severity: medium
        kyverno.io/category: Argo
spec:
    description: This policy prevents the use of the default project in an Application.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Application") && request.args.content.matches(".*project:\\s*default.*")'
          message: The default project may not be used in an Application.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
