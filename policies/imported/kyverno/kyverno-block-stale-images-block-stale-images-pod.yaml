# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-block-stale-images-block-stale-images-pod
    annotations:
        aegis.io/imported-from: aegis-import-3881791677.yaml
        aegis.io/severity: medium
        kyverno.io/category: Other
spec:
    description: Images that are old usually have some open security vulnerabilities which are not patched. This policy checks the contents of every container image and inspects them for the create time. If it finds any image which was built more than 6 months ago this policy blocks the deployment.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: tool == "Bash" && request.args.command.matches("(?i)kubectl.*(delete\s+pod|exec|run)")
          message: Images built more than 6 months ago are prohibited.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
