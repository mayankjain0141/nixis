# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-block-velero-restore-block-velero-restore-to-protected-namespace-velero-io-v1-restore
    annotations:
        aegis.io/imported-from: aegis-import-911460776.yaml
        aegis.io/severity: low
        kyverno.io/category: Velero in CEL
spec:
    description: Velero allows on backup and restore operations and is designed to be run with full cluster admin permissions. It allows on cross namespace restore operations, which means you can restore backup of namespace A to namespace B. This policy protect restore operation into system or any protected namespaces, listed in deny condition section.  It checks the Restore CRD object and its namespaceMapping field. If destination match protected namespace then operation fails and warning message is throw.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Restore") && (request.args.content.contains(": kube-system") || request.args.content.contains(": kube-public") || request.args.content.contains(": kube-node-lease") || request.args.content.contains(": default"))'
          message: 'Velero Restore targets a protected namespace (kube-system, kube-public, kube-node-lease, or default). Restoring into system namespaces is not allowed — review namespaceMapping destination values.'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
