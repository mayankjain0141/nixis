# IMPORT_TODO: JMESPath conditions in validate-cron-schedule/validate-cron could not be translated — kubectl pattern match generated as base condition only
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-validate-cron-schedule-validate-cron-velero-io-v1-schedule
    annotations:
        aegis.io/imported-from: aegis-import-2273918750.yaml
        aegis.io/severity: low
        kyverno.io/category: Velero
spec:
    description: A Velero Schedule is given in Cron format and must be accurate to ensure operation. This policy validates that the schedule is a valid Cron format.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("kind: Schedule") && !request.args.content.contains("schedule:")'
          message: 'Velero Schedule resources must define a valid cron schedule'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
