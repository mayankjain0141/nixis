# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-imagepullpolicy-always-imagepullpolicy-always-pod
    annotations:
        aegis.io/imported-from: aegis-import-4136665146.yaml
        aegis.io/severity: medium
        kyverno.io/category: Sample
spec:
    description: If the `latest` tag is allowed for images, it is a good idea to have the imagePullPolicy field set to `Always` to ensure should that tag be overwritten that future pulls will get the updated image. This policy validates the imagePullPolicy is set to `Always` when the `latest` tag is specified explicitly or where a tag is not defined at all.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("image:") && request.args.content.contains(":latest") && !request.args.content.contains("imagePullPolicy: Always")'
          message: 'Images using the latest tag must set imagePullPolicy: Always'
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
