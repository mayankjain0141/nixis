# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-disallow-rbac-on-default-serviceaccounts-check-security-context-constraint-clusterrole
    annotations:
        aegis.io/imported-from: aegis-import-3829104712.yaml
        aegis.io/severity: medium
        kyverno.io/category: Security
spec:
    description: The default service account should not be bound to any cluster role. This policy ensures ClusterRole manifests do not grant permissions to the default service account via resourceNames.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.matches("[\\s\\S]*kind:\\s*ClusterRole[\\s\\S]*") && request.args.content.matches("[\\s\\S]*resourceNames:[\\s\\S]*[\\[,\\s]default[\\],\\s][\\s\\S]*")'
          message: Granting RBAC permissions to default service accounts via ClusterRole is not allowed.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
