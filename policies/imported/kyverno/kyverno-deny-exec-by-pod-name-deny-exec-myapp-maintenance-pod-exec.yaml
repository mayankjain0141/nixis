# IMPORT_TODO: JMESPath conditions in deny-exec-by-pod-name/deny-exec-myapp-maintenance could not be translated — kubectl pattern match generated as base condition only
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-deny-exec-by-pod-name-deny-exec-myapp-maintenance-pod-exec
    annotations:
        aegis.io/imported-from: aegis-import-2224021613.yaml
        aegis.io/severity: low
        kyverno.io/category: Sample
spec:
    description: The `exec` command may be used to gain shell access, or run other commands, in a Pod's container. While this can be useful for troubleshooting purposes, it could represent an attack vector and is discouraged. This policy blocks Pod exec commands to Pods beginning with the name `myapp-maintenance-`.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: 'tool == "Bash" && request.args.command.matches(".*kubectl\\s+exec.*myapp-maintenance.*")'
          message: Exec'ing into Pods called "myapp-maintenance" is not allowed.
          action: REQUIRE_APPROVAL
    defaultAction: ALLOW
