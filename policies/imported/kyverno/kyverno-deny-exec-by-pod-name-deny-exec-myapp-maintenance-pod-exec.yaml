# imported from: policies via nixis policy import
apiVersion: nixis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-deny-exec-by-pod-name-deny-exec-myapp-maintenance-pod-exec
    annotations:
        nixis.io/imported-from: nixis-import-2224021613.yaml
        nixis.io/severity: low
        kyverno.io/category: Sample
spec:
    description: The `exec` command may be used to gain shell access, or run other commands, in a Pod's container. While this can be useful for troubleshooting purposes, it could represent an attack vector and is discouraged. This policy blocks Pod exec commands to Pods beginning with the name `myapp-maintenance-`.
    matchConstraints:
        tools:
            - Bash
    validations:
        - expression: 'tool == "Bash" && request.args.command.matches(".*kubectl\\s+exec.*\\bmyapp-maintenance\\b.*")'
          message: Exec'ing into Pods called "myapp-maintenance" is not allowed.
          action: DENY
    defaultAction: ALLOW
