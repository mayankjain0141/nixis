# IMPORT_REVIEW: Duplicate-detection and targetRef kind check — Aegis enforces the allowed-kind rule via content checks; duplicate HPA detection across resources requires Kyverno background scan
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-prevent-duplicate-hpa-check-targetref-duplicates-horizontalpodautoscaler
    annotations:
        aegis.io/imported-from: aegis-import-2096262943.yaml
        aegis.io/severity: medium
        aegis.io/llm-confidence: medium
        kyverno.io/category: Other
spec:
    description: HorizontalPodAutoscaler (HPA) is useful to automatically adjust the number of pods in a deployment or replication controller. It requires defining a specific target resource by kind and name. There are no built-in validation checks by the HPA controller to prevent the creation of multiple HPAs which target the same resource. This policy has two rules, the first of which ensures that the only targetRef kinds accepted are one of either Deployment, StatefulSet, ReplicaSet, or DaemonSet. The second prevents the creation of duplicate HPAs by validating that any new HPA targets a unique resource.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: "(tool == \"Write\" || tool == \"Edit\") && request.args.path.matches(\".*\\\\.(yaml|yml|json)$\") && request.args.content.contains(\"kind: HorizontalPodAutoscaler\") && !(request.args.content.contains(\"kind: Deployment\") || request.args.content.contains(\"kind: StatefulSet\") || request.args.content.contains(\"kind: ReplicaSet\") || request.args.content.contains(\"kind: DaemonSet\"))"
          message: 'HorizontalPodAutoscaler scaleTargetRef.kind must be one of Deployment, StatefulSet, ReplicaSet, or DaemonSet'
          action: DENY
        - expression: "(tool == \"Write\" || tool == \"Edit\") && request.args.path.matches(\".*\\\\.(yaml|yml|json)$\") && request.args.content.contains(\"kind: HorizontalPodAutoscaler\")"
          message: 'HorizontalPodAutoscaler write detected — verify no duplicate HPA targets the same resource; cross-resource duplicate detection requires Kyverno'
          action: AUDIT
    defaultAction: ALLOW
