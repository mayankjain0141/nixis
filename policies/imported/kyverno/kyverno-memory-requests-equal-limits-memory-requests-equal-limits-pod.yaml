# IMPORT_TODO: Memory request/limit equality cannot be verified via content scan — CEL approximation flags files with memory resources for human review
# imported from: policies via aegis policy import
apiVersion: aegis.io/v1
kind: PolicyTemplate
metadata:
    name: kyverno-memory-requests-equal-limits-memory-requests-equal-limits-pod
    annotations:
        aegis.io/imported-from: aegis-import-3866710378.yaml
        aegis.io/severity: medium
        kyverno.io/category: Sample
spec:
    description: Pods which have memory limits equal to requests could be given a QoS class of Guaranteed if they also set CPU limits equal to requests. Guaranteed is the highest schedulable class. This policy checks that all containers in a given Pod have memory requests equal to limits.
    matchConstraints:
        tools:
            - Write
            - Edit
    validations:
        - expression: '(tool == "Write" || tool == "Edit") && request.args.path.matches(".*\\.(yaml|yml|json)$") && request.args.content.contains("resources:") && request.args.content.contains("memory:")'
          message: 'Container memory requests must equal limits — equality cannot be verified by content scan; manual review required'
          action: AUDIT
    defaultAction: ALLOW
