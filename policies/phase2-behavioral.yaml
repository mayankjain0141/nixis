# Phase 2 Behavioral Rules
# These rules use session-level behavioral signals rather than per-call signals.
# They are evaluated AFTER Phase 1 static rules when confidence is low.
#
# Behavioral signals available:
#   retry_after_deny    - true if agent is retrying a previously denied action
#   sequence_risk       - float64 score from sequence pattern matching [0,1]
#   rate_burst          - float64 normalized call rate burst indicator [0,1]
#   baseline_deviation  - float64 distance from baseline behavior [0,1]

rules:
  - name: retry_after_deny
    priority: 10
    action: deny
    severity: high
    confidence: 0.90
    description: >
      Blocks when an agent retries an action that was previously denied.
      A legitimate agent should stop or seek approval, not retry the blocked action.
    remediation: "If this action is required, add it to the allowlist or use AEGIS_MODE=audit for investigation."
    tags: [behavioral, persistence]
    condition:
      behavioral:
        retry_after_deny: true

  - name: sequence_risk_high
    priority: 20
    action: deny
    severity: high
    confidence: 0.88
    description: >
      Blocks when the session's recent actions match a known attack sequence pattern
      (e.g., sensitive file read followed by network exfiltration).
    tags: [behavioral, sequence]
    condition:
      behavioral:
        sequence_risk:
          gte: 0.85

  - name: rate_burst_high
    priority: 30
    action: throttle
    severity: medium
    confidence: 0.80
    description: >
      Throttles when call rate significantly exceeds the session baseline.
      A sudden burst of calls may indicate automated exfiltration or prompt injection loops.
    tags: [behavioral, rate]
    condition:
      behavioral:
        rate_burst:
          gte: 0.80

  - name: baseline_deviation_high
    priority: 40
    action: escalate
    severity: medium
    confidence: 0.75
    description: >
      Escalates when tool usage significantly deviates from the established session baseline.
      Requires at least 10 samples before baseline is established.
    tags: [behavioral, anomaly]
    condition:
      behavioral:
        baseline_deviation:
          gt: 0.70
