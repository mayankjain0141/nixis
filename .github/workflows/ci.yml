name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: dashboard/.nvmrc
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Build dashboard (required for go:embed)
        run: cd dashboard && npm ci && npm run build

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -timeout 120s ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12

  dashboard:
    name: Dashboard (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  ci-complete:
    name: CI complete
    runs-on: ubuntu-latest
    needs: [backend, dashboard]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.backend.result }}" != "success" ] || [ "${{ needs.dashboard.result }}" != "success" ]; then
            echo "backend: ${{ needs.backend.result }}"
            echo "dashboard: ${{ needs.dashboard.result }}"
            exit 1
          fi
